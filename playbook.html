    <script>
        const promptsData = JSON.parse('<?php echo json_encode($data); ?>'.replace('<?php echo json_encode($data); ?>', 'PROMPTS_DATA_PLACEHOLDER'));
        
        const app = {
            allPrompts: [],
            currentFilter: 'all',
            searchTerm: '',
            
            init() {
                this.loadData();
                this.setupEventListeners();
                this.renderCategories();
            },
            
            loadData() {
                // Will be populated by script injection
                this.allPrompts = window.PROMPTS_DATA || [];
            },
            
            setupEventListeners() {
                // Search
                document.getElementById('search').addEventListener('input', (e) => {
                    this.searchTerm = e.target.value.toLowerCase();
                    this.filterAndRender();
                });
                
                // Tier filters
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.tier;
                        this.filterAndRender();
                    });
                });
            },
            
            filterAndRender() {
                const filtered = this.allPrompts.filter(prompt => {
                    // Tier filter
                    if (this.currentFilter !== 'all' && prompt.tier.toLowerCase() !== this.currentFilter) {
                        return false;
                    }
                    
                    // Search filter
                    if (this.searchTerm) {
                        const searchable = [
                            prompt.title,
                            prompt.prompt,
                            prompt.useCase,
                            prompt.category
                        ].join(' ').toLowerCase();
                        
                        return searchable.includes(this.searchTerm);
                    }
                    
                    return true;
                });
                
                this.renderCategories(filtered);
            },
            
            renderCategories(prompts = this.allPrompts) {
                const container = document.getElementById('categories-container');
                const noResults = document.getElementById('no-results');
                
                // Group by category
                const grouped = {};
                prompts.forEach(p => {
                    if (!grouped[p.category]) grouped[p.category] = [];
                    grouped[p.category].push(p);
                });
                
                if (Object.keys(grouped).length === 0) {
                    container.innerHTML = '';
                    noResults.style.display = 'block';
                    return;
                }
                
                noResults.style.display = 'none';
                
                container.innerHTML = Object.entries(grouped).map(([category, items]) => {
                    const tiers = [...new Set(items.map(i => i.tier))];
                    const tierBadges = tiers.map(t => 
                        `<span class="tier-badge ${t.toLowerCase()}">${t}</span>`
                    ).join('');
                    
                    return `
                        <div class="category-card" data-category="${category}">
                            <div class="category-header">
                                <h3 class="category-title">${category}</h3>
                                <span class="prompt-count">${items.length}</span>
                            </div>
                            <div class="category-desc">Click to expand and view all ${items.length} prompts in this category</div>
                            <div class="category-tiers">${tierBadges}</div>
                            
                            <div class="prompts-list">
                                ${items.map(prompt => this.renderPrompt(prompt)).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Add category expand listeners
                document.querySelectorAll('.category-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.prompt-item')) return;
                        
                        const list = card.querySelector('.prompts-list');
                        card.classList.toggle('expanded');
                        list.classList.toggle('visible');
                    });
                });
                
                // Add prompt expand listeners
                document.querySelectorAll('.prompt-header').forEach(header => {
                    header.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const item = header.closest('.prompt-item');
                        const details = item.querySelector('.prompt-details');
                        item.classList.toggle('expanded');
                        details.classList.toggle('visible');
                    });
                });
                
                // Add copy button listeners
                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const content = btn.previousElementSibling.textContent;
                        navigator.clipboard.writeText(content);
                        btn.textContent = '✓ Copied!';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = 'Copy';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                });
            },
            
            renderPrompt(prompt) {
                return `
                    <div class="prompt-item">
                        <div class="prompt-header">
                            <div class="prompt-title-line">
                                <span class="prompt-number">#${prompt.number}</span>
                                <span class="prompt-title-text">${prompt.title}</span>
                            </div>
                            <span class="tier-badge ${prompt.tier.toLowerCase()}">${prompt.tier}</span>
                        </div>
                        
                        <div class="prompt-details">
                            ${prompt.prompt ? `
                                <div class="prompt-section">
                                    <div class="prompt-section-title">Prompt</div>
                                    <div class="prompt-content">
                                        <div style="padding-right: 80px;">${prompt.prompt}</div>
                                        <button class="copy-btn">Copy</button>
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${prompt.example ? `
                                <div class="prompt-section">
                                    <div class="prompt-section-title">Example Output</div>
                                    <div class="prompt-content">
                                        <div>${prompt.example}</div>
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${prompt.useCase ? `
                                <div class="prompt-section">
                                    <div class="prompt-section-title">Use Case</div>
                                    <div class="prompt-content">
                                        <div>${prompt.useCase}</div>
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${prompt.proTip ? `
                                <div class="prompt-section">
                                    <div class="prompt-section-title">💡 Pro Tip</div>
                                    <div class="prompt-content">
                                        <div>${prompt.proTip}</div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
        };

    "example": "**Standard Error Schema:**\\n```json\\n{\\n\\\"error\\\": {\\n\\\"code\\\": \\\"VALIDATION_ERROR\\\",\\n\\\"message\\\": \\\"One or more fields are invalid\\\",\\n\\\"status\\\": 400,\\n\\\"details\\\": [\\n{\\n\\\"field\\\": \\\"email\\\",\\n\\\"issue\\\": \\\"Invalid email format\\\",\\n\\\"value\\\": \\\"notanemail\\\"\\n}\\n],\\n\\\"request_id\\\": \\\"req_abc123\\\",\\n\\\"docs_url\\\": \\\"https://docs.example.com/errors#validation-error\\\"\\n}\\n}\\n```\\n**Common Scenarios:**\\n400 Validation Error: code=\\\"VALIDATION_ERROR\\\", details array with field-level errors\\n401 Unauthorized: code=\\\"INVALID_TOKEN\\\", message=\\\"API key is invalid or expired\\\"\\n403 Forbidden: code=\\\"INSUFFICIENT_PERMISSIONS\\\", message=\\\"Your plan doesn't include this feature\\\"\\n404 Not Found: code=\\\"RESOURCE_NOT_FOUND\\\", message=\\\"Order #12345 not found\\\"\\n429 Rate Limited: code=\\\"RATE_LIMIT_EXCEEDED\\\", message=\\\"Max 100 requests/hour\\\", includes retry_after header\\n500 Server Error: code=\\\"INTERNAL_ERROR\\\", message=\\\"Something went wrong\\\", request_id for support\\n**Use Case:** Standardize error handling across your entire API, making it easier for developers to catch and handle errors programmatically.\\n**Pro Tip:** Always include a `request_id` in error responses. When developers contact support, you can use it to trace exactly what went wrong in your logs.",

    "example": "**Method:** URL path versioning (`/api/v1/`, `/api/v2/`)\\n- Pros: Explicit, clear, easy to test different versions\\n- Cons: Requires routing logic for each version\\n**Breaking Changes (require new version):**\\n- Removing an endpoint or field\\n- Changing field data types (string → number)\\n- Changing authentication method\\n- Renaming fields or endpoints\\n- Changing error response structure\\n**Non-Breaking (can add to current version):**\\n- Adding new optional fields\\n- Adding new endpoints\\n- Adding new query parameters (optional)\\n- Expanding enum values (if clients don't validate)\\n**Deprecation Policy:**\\n- New version announced 3 months in advance\\n- Old version supported for 12 months after deprecation\\n- Emails at 90 days, 30 days, 7 days before shutdown\\n- Header in responses: `X-API-Deprecated: true; sunset=2024-12-31`\\n**Migration Guide:**\\n- Side-by-side comparison table of changes\\n- Code examples for v1 → v2\\n- Automated migration tool/script if possible\\n**Use Case:** Plan for API evolution without breaking existing integrations, maintaining trust with developers while enabling improvements.\\n**Pro Tip:** Operate v1 and v2 simultaneously during the transition period. Use feature flags to gradually roll out v2 to select users before forcing everyone to migrate.",

    "example": "**JWT Claims:**\\n```json\\n{\\n// Standard claims\\n\\\"iss\\\": \\\"https://api.yourservice.com\\\",\\n\\\"sub\\\": \\\"user_12345\\\",\\n\\\"aud\\\": \\\"yourservice-api\\\",\\n\\\"exp\\\": 1704981600,\\n\\\"iat\\\": 1704978000,\\n\\\"jti\\\": \\\"token_unique_id\\\",\\n// Custom claims\\n\\\"email\\\": \\\"user@example.com\\\",\\n\\\"role\\\": \\\"admin\\\",\\n\\\"permissions\\\": [\\\"read:all\\\", \\\"write:all\\\"],\\n\\\"plan\\\": \\\"premium\\\"\\n}\\n```\\n**Strategy:**\\n- **Access token:** Short-lived (15 min), contains user info, stored in memory\\n- **Refresh token:** Long-lived (7 days), stored in httpOnly cookie\\n- **Algorithm:** RS256 (asymmetric) for production (public key can verify, only server can sign)\\n**Token Flow:**\\n1. Login → Return access + refresh tokens\\n2. API requests → `Authorization: Bearer ACCESS_TOKEN`\\n3. Access expires → Use refresh token to get new access token\\n4. Refresh expires → Full re-authentication required\\n**Invalidation:**\\n- Maintain a \\\"revoked tokens\\\" cache (Redis) with TTL = token expiry\\n- On logout: Add jti to revoked list\\n- On token validation: Check revoked list\\n- Security breach: Rotate signing secret (invalidates all tokens)\\n**Verification (Node.js):**\\n```javascript\\nconst jwt = require('jsonwebtoken');\\nconst publicKey = fs.readFileSync('public.pem');\\ntry {\\nconst decoded = jwt.verify(token, publicKey, {\\nalgorithms: ['RS256'],\\nissuer: 'https://api.yourservice.com',\\naudience: 'yourservice-api'\\n});\\n// Token valid, use decoded.sub (user ID)\\n} catch (err) {\\n// Token invalid, expired, or revoked\\n}\\n```\\n**Use Case:** Modern web/mobile app authentication with stateless tokens that can be verified without database lookups.\\n**Pro Tip:** Don't put sensitive data in JWTs—they're base64 encoded, not encrypted. Anyone with the token can read the payload. Only include data you'd be okay exposing.",

    "example": "**Algorithm:** HMAC-SHA256\\n**Signature Calculation:**\\n1. Create signature payload: `timestamp.request_body`\\n2. Compute HMAC: `HMAC-SHA256(signing_secret, payload)`\\n3. Send in header: `X-Webhook-Signature: t=1704978000,v1=computed_signature`\\n**Sender Code (your API):**\\n```javascript\\nconst crypto = require('crypto');\\nfunction signWebhook(payload, secret) {\\nconst timestamp = Math.floor(Date.now() / 1000);\\nconst signedPayload = `${timestamp}.${JSON.stringify(payload)}`;\\nconst signature = crypto\\n.createHmac('sha256', secret)\\n.update(signedPayload)\\n.digest('hex');\\nreturn {\\nheader: `t=${timestamp},v1=${signature}`,\\ntimestamp\\n};\\n}\\n// Send webhook\\nconst payload = {event: 'order.created', data: {...}};\\nconst {header, timestamp} = signWebhook(payload, webhook.secret);\\nfetch(webhook.url, {\\nmethod: 'POST',\\nheaders: {\\n'Content-Type': 'application/json',\\n'X-Webhook-Signature': header\\n},\\nbody: JSON.stringify(payload)\\n});\\n```\\n**Receiver Code (customer):**\\n```javascript\\nfunction verifyWebhook(body, signature, secret) {\\nconst [t, v1] = signature.split(',').map(p => p.split('=')[1]);\\nconst timestamp = parseInt(t);\\n// Prevent replay attacks (reject older than 5 minutes)\\nconst now = Math.floor(Date.now() / 1000);\\nif (Math.abs(now - timestamp) > 300) {\\nthrow new Error('Webhook timestamp too old');\\n}\\n// Verify signature\\nconst signedPayload = `${timestamp}.${body}`;\\nconst expectedSignature = crypto\\n.createHmac('sha256', secret)\\n.update(signedPayload)\\n.digest('hex');\\nif (v1 !== expectedSignature) {\\nthrow new Error('Invalid signature');\\n}\\nreturn true;\\n}\\n```\\n**Secret Management:**\\n- Generate unique secret per webhook subscription\\n- Display secret only once at creation (like API keys)\\n- Provide rotation endpoint: generates new secret, returns both old and new for transition period\\n**Use Case:** Ensure webhook receivers can trust that requests actually came from your service and haven't been tampered with.\\n**Pro Tip:** Include the timestamp in the signature to prevent replay attacks. Without it, an attacker could intercept a webhook and replay it endlessly.\\n## Webhook Configuration & Payload Design",

    "example": "**Sender Security (your API):**\\n1. **HTTPS Only:** Reject webhook URLs using http://\\n2. **Signatures:** Always include HMAC signature (make verification mandatory in docs)\\n3. **Timeouts:** 10-second timeout per webhook (prevent hanging on slow receivers)\\n4. **Rate Limiting:** Max 100 webhooks/second per subscriber (prevent abuse)\\n5. **IP Whitelisting:** Optional feature—subscribers can restrict source IPs\\n6. **Retry Limits:** Max 7 attempts (prevent infinite retry loops)\\n7. **Prevent Loops:** Don't trigger webhooks for actions caused by API calls from the same subscriber\\n**Receiver Best Practices Guide:**\\n**1. Verify Signatures (MANDATORY)**\\n```javascript\\n// Always verify before processing\\nif (!verifySignature(request.body, request.headers['x-webhook-signature'], secret)) {\\nreturn res.status(401).send('Invalid signature');\\n}\\n```\\n**2. Respond Quickly**\\n- Return 200 OK immediately (within 3 seconds)\\n- Process webhook asynchronously (queue it, don't block response)\\n```javascript\\napp.post('/webhook', (req, res) => {\\n// Verify signature\\n// Add to job queue\\nqueue.add(req.body);\\nres.sendStatus(200);  // Respond ASAP\\n});\\n```\\n**3. Use HTTPS**\\n- Protect your endpoint with TLS\\n- Invalid certificates → webhook delivery fails\\n**4. Handle Duplicates**\\n- Use `id` field to track processed events\\n- Store in database/cache to detect duplicates\\n- Webhooks may be sent multiple times (retries)\\n**5. Validate Payload**\\n- Check `api_version` to handle schema changes\\n- Validate required fields exist\\n- Gracefully handle unknown event types\\n**6. Timeout Handling**\\n- If your processing takes >10 seconds, acknowledge receipt first\\n- Return 200, then process\\n**Use Case:** Secure your webhook system against common attacks (replay, tampering, DDoS) while providing clear guidance to receivers.\\n**Pro Tip:** Include a \\\"webhook health score\\\" in your dashboard showing subscribers their success rate     "example": "**Rate Limit Tiers:**\\n| Plan | Requests/min | Requests/hour | Requests/day |\\n|------|--------------|---------------|--------------|\\n| Free | 10 | 100 | 1,000 |\\n| Pro | 100 | 5,000 | 100,000 |\\n| Enterprise | 1,000 | 50,000 | Unlimited |\\n**Limiting Dimensions:**\\n- Primary: By API key (per-user)\\n- Secondary: By IP (prevents abuse before authentication)\\n- Per-endpoint: Expensive operations (search, reports) have tighter limits\\n- Example: /search → 10/min even on Pro plan\\n**Response Headers (on every request):**\\n```\\nX-RateLimit-Limit: 100\\nX-RateLimit-Remaining: 87\\nX-RateLimit-Reset: 1704978000\\nX-RateLimit-Retry-After: 45  (when exceeded)\\n```\\n**Error Response (429 Too Many Requests):**\\n```json\\n{\\n\\\"error\\\": {\\n\\\"code\\\": \\\"RATE_LIMIT_EXCEEDED\\\",\\n\\\"message\\\": \\\"You've exceeded your plan's rate limit of 100 requests/minute\\\",\\n\\\"limit\\\": 100,\\n\\\"reset_at\\\": \\\"2024-01-15T10:45:00Z\\\",\\n\\\"retry_after\\\": 45,\\n\\\"upgrade_url\\\": \\\"https://yourservice.com/upgrade\\\"\\n}\\n}\\n```\\n**Algorithm:** Token bucket\\n- Each API key gets a bucket with N tokens\\n- Each request consumes 1 token\\n- Tokens refill at rate R per second\\n- Burst allowance = bucket size\\n**Bypass Options:**\\n- Webhooks sent by your service: no rate limit (internal traffic)\\n- Health check endpoints: /ping, /status → unlimited\\n- Enterprise plan: API key tagged as `rate_limit_exempt`\\n**Use Case:** Prevent API abuse, ensure fair resource allocation, and create upgrade incentives for heavy users.\\n**Pro Tip:** Be generous with rate limits for new users. Let them hit real limits (90%+ of their quota) before selling upgrades. Theoretical limits no one reaches don't drive revenue.",

    "prompt": "Design a pagination system for list endpoints. Decide: (1) Pagination style (offset-based, cursor-based, or both), (2) Query parameters (?page=1&limit=20 or ?cursor=xxx&limit=20), (3) Response metadata (total count, next/previous URLs), (4) Default and max page sizes, (5) Sorting options, and (6) Example request/response. Consider performance for large datasets.",
    "example": "**Pagination Style:** Cursor-based (more efficient for large datasets)\\n**Query Parameters:**\\n```\\nGET /api/v1/orders?limit=20&cursor=eyJpZCI6MTIzNDU&order=desc\\n```\\n- `limit`: Items per page (default: 20, max: 100)\\n- `cursor`: Opaque token pointing to start of page\\n- `order`: `asc` or `desc` (default: `desc` for most recent first)\\n**Response Structure:**\\n```json\\n{\\n\\\"data\\\": [\\n{\\\"id\\\": 12345, \\\"total\\\": 99.99, \\\"created_at\\\": \\\"2024-01-15T10:00:00Z\\\"},\\n{\\\"id\\\": 12344, \\\"total\\\": 49.99, \\\"created_at\\\": \\\"2024-01-15T09:30:00Z\\\"},\\n// ... 18 more items\\n],\\n\\\"pagination\\\": {\\n\\\"next_cursor\\\": \\\"eyJpZCI6MTIzMjUs\\\",\\n\\\"has_more\\\": true,\\n\\\"count\\\": 20\\n}\\n}\\n```\\n**Cursor Implementation:**\\n- Cursor = base64(JSON({id: last_item_id, timestamp: last_item_timestamp}))\\n- Query: WHERE id < cursor.id ORDER BY id DESC LIMIT 20\\n- More efficient than OFFSET (doesn't skip rows)\\n**Metadata:**\\n- `next_cursor`: Token for next page (null if last page)\\n- `has_more`: Boolean (easier than checking if next_cursor is null)\\n- `count`: Items in current page\\n- No `total` count (expensive to compute on large tables)\\n**Sorting:**\\n- Default: Most recent first (created_at DESC)\\n- Allow `?sort=total:desc` or `?sort=created_at:asc`\\n- Cursor must encode sort field\\n**Alternative: Offset-based (simpler but slower)**\\n```\\nGET /api/v1/orders?page=2&limit=20\\nResponse: {data: [...], page: 2, per_page: 20, total: 1543, total_pages: 78}\\n```\\n**Use Case:** List large datasets (orders, users, products) efficiently without loading everything into memory or making users wait.\\n**Pro Tip:** Use cursor-based pagination for any list that could grow beyond 10,000 items. Offset-based is fine for admin dashboards with small datasets.",

    "prompt": "Design a search and filtering system for a list endpoint. Context: {{resource_type}}. Define: (1) Query parameter structure for filters (?status=active&created_after=2024-01-01), (2) Search vs. filter (full-text search vs. exact matches), (3) Combining multiple filters (AND/OR logic), (4) Operators (equals, contains, greater than, in, between), (5) Performance considerations (indexes, query limits), and (6) Example queries with responses. Make it powerful but not too complex.",
    "example": "**Resource: Orders**\\n**Filter Parameters:**\\n```\\nGET /api/v1/orders?\\nstatus=pending,processing      # IN operator (comma-separated)\\n&total_gte=100                # Greater than or equal\\n&total_lte=1000               # Less than or equal\\n&created_after=2024-01-01     # Date range\\n&customer_id=cus_123          # Exact match\\n&search=urgent                # Full-text search (any field)\\n```\\n**Operators:**\\n- No suffix: Exact match (`status=pending`)\\n- `_gte`: Greater than or equal (`total_gte=100`)\\n- `_lte`: Less than or equal (`total_lte=1000`)\\n- `_contains`: Substring match (`notes_contains=urgent`)\\n- Comma-separated: IN operator (`status=pending,shipped`)\\n**Combining Filters:**\\n- Multiple parameters = AND logic\\n- Example: `status=pending&total_gte=100` → \\\"pending AND total >= 100\\\"\\n- OR logic: Use comma-separation within same parameter\\n- Example: `status=pending,processing` → \\\"pending OR processing\\\"\\n**Search:**\\n- `?search=keyword` → Full-text search across multiple fields (customer name, email, order notes)\\n- Uses database FTS (Postgres: `ts_vector`, MySQL: `FULLTEXT`) or Elasticsearch\\n- Combined with filters: `?search=urgent&status=pending`\\n**Performance:**\\n- Indexed fields: status, customer_id, created_at, total\\n- Limit combinations: Max 5 filters per query (prevent slow queries)\\n- Query timeout: 5 seconds (return 503 if exceeded)\\n- Expensive searches: Require higher plan or lower rate limit\\n**Example Request:**\\n```\\nGET /api/v1/orders?status=pending,processing&total_gte=100&created_after=2024-01-01&limit=20\\n```\\n**Response:**\\n```json\\n{\\n\\\"data\\\": [/* orders matching filters */],\\n\\\"filters_applied\\\": {\\n\\\"status\\\": [\\\"pending\\\", \\\"processing\\\"],\\n\\\"total\\\": {\\\"gte\\\": 100},\\n\\\"created_at\\\": {\\\"after\\\": \\\"2024-01-01\\\"}\\n},\\n\\\"pagination\\\": {/* cursor info */}\\n}\\n```\\n**Use Case:** Enable API consumers to efficiently query for subsets of data without building complex query languages.\\n**Pro Tip:** Document which fields are indexed and fast to filter on. Guide users toward efficient queries to keep your database happy.",

    "title": "Error Handling & Retry Guidance",
    "category": "API Integration",
    "tier": "Starter",
    "prompt": "Create API error handling guidance for consumers. Include: (1) Error types and how to handle each (4xx vs. 5xx), (2) Which errors should trigger retries (and which shouldn't), (3) Retry-After header usage, (4) Exponential backoff recommendation, (5) Idempotency for safe retries, and (6) Circuit breaker pattern advice. Help developers build resilient integrations.",
    "example": "**Error Categories:**\\n**4xx Client Errors (Don't Retry):**\\n- **400 Bad Request:** Fix your request payload, then try again\\n- **401 Unauthorized:** Your API key is invalid/expired → refresh credentials\\n- **403 Forbidden:** You don't have permission → upgrade plan or request access\\n- **404 Not Found:** Resource doesn't exist → verify ID\\n- **422 Unprocessable:** Validation failed → fix data per error details\\n- **429 Rate Limited:** Wait for `Retry-After` seconds → respect limits\\n**5xx Server Errors (Retry with Backoff):**\\n- **500 Internal Server Error:** Temporary issue → retry\\n- **502 Bad Gateway:** Service temporarily down → retry\\n- **503 Service Unavailable:** Overloaded or maintenance → retry after `Retry-After`\\n- **504 Gateway Timeout:** Request took too long → retry with longer timeout\\n**Retry Logic:**\\n```javascript\\nasync function apiCall(url, options, maxRetries = 3) {\\nfor (let attempt = 0; attempt <= maxRetries; attempt++) {\\ntry {\\nconst response = await fetch(url, options);\\n// Success\\nif (response.ok) return response.json();\\n// Don't retry client errors\\nif (response.status >= 400 && response.status < 500) {\\nif (response.status === 429) {\\nconst retryAfter = response.headers.get('Retry-After') || 60;\\nawait sleep(retryAfter * 1000);\\ncontinue;  // Retry rate limits\\n}\\nthrow new Error(`Client error: ${response.status}`);\\n}\\n// Retry server errors\\nif (response.status >= 500) {\\nif (attempt < maxRetries) {\\nconst delay = Math.min(1000 × (2 ** attempt), 30000);  // Max 30s\\nawait sleep(delay);\\ncontinue;\\n}\\n}\\nthrow new Error(`API error: ${response.status}`);\\n} catch (err) {\\nif (attempt === maxRetries) throw err;\\nawait sleep(1000 × (2 ** attempt));\\n}\\n}\\n}\\n```\\n**Idempotency:**\\n- Use `Idempotency-Key` header for POST/PATCH requests\\n```\\nPOST /api/v1/orders\\nIdempotency-Key: unique_key_123\\n```\\n- Server tracks keys, returns cached response if duplicate\\n- Safe to retry without creating duplicates\\n**Circuit Breaker Pattern:**\\n- After 5 consecutive failures → open circuit (stop trying)\\n- Wait 60 seconds → try one request (half-open)\\n- If succeeds → close circuit (back to normal)\\n- If fails → stay open for another 60 seconds\\n**Use Case:** Educate API consumers on proper error handling, reducing support burden and improving integration reliability.\\n**Pro Tip:** Include a `/health` endpoint that returns 200 with status info. Consumers can check this before making real requests to detect outages early.",

    "example": "**Deprecation Process:**\\n**Step 1: Announcement (T-12 months)**\\n- Blog post: \\\"Announcing API v2, v1 sunset in 12 months\\\"\\n- Email to all API key holders\\n- Add banner to API docs\\n- Response header on v1 endpoints:\\n```\\nDeprecation: true\\nSunset: Sat, 31 Dec 2024 23:59:59 GMT\\nLink: <https://docs.api.com/migrate-v1-to-v2>; rel=\\\"deprecation\\\"\\n```\\n**Step 2: Reminders (T-6, T-3, T-1 months)**\\n- Email campaigns with urgency\\n- In-app notifications in dashboard\\n- Increase header visibility:\\n```\\nX-API-Deprecated: This endpoint will be removed on 2024-12-31. Migrate to v2: https://docs.api.com/migrate\\n```\\n**Step 3: Final Warning (T-30, T-7, T-1 days)**\\n- Daily emails to users still on v1\\n- Slack/Discord announcements\\n- Consider offering migration help (consulting, code review)\\n**Step 4: Sunset (T-0)**\\n- v1 endpoints return 410 Gone:\\n```json\\n{\\n\\\"error\\\": {\\n\\\"code\\\": \\\"ENDPOINT_RETIRED\\\",\\n\\\"message\\\": \\\"API v1 was retired on 2024-12-31. Please upgrade to v2.\\\",\\n\\\"migration_guide\\\": \\\"https://docs.api.com/migrate-v1-to-v2\\\",\\n\\\"support_email\\\": \\\"api-support@yourservice.com\\\"\\n}\\n}\\n```\\n**Migration Guide:**\\n- Side-by-side comparison table\\n- Breaking changes highlighted\\n- Code examples (before/after)\\n```javascript\\n// v1\\nconst res = await fetch('/api/v1/orders', {\\nheaders: {'X-API-Key': key}\\n});\\n// v2\\nconst res = await fetch('/api/v2/orders', {\\nheaders: {'Authorization': `Bearer ${key}`}\\n});\\n```\\n**Tracking Adoption:**\\n- Dashboard metric: % of traffic on v1 vs. v2\\n- List of users still on v1 (for targeted outreach)\\n- Goal: <5% v1 traffic before sunset\\n**Graceful Shutdown:**\\n- Option 1: Auto-redirect v1 → v2 if compatible (risky)\\n- Option 2: Extended support for enterprise customers (paid)\\n- Option 3: Hard cutoff (recommended after enough notice)\\n**Use Case:** Evolve your API without breaking existing integrations, giving users time to migrate while maintaining trust.\\n**Pro Tip:** Offer a \\\"migration service\\\" where your team helps high-value customers upgrade. Turn a painful deprecation into a relationship-building opportunity.",
