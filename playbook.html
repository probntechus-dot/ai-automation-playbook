to analytics database: category, resolution time, customer satisfaction, agent, AI confidence\n   - Update knowledge base if new issue pattern detected","example":"\\`\\`\\`json\n{\n  \"routing_rules\": {\n    \"critical_keywords\": [\"can't login\", \"site down\", \"payment failed\", \"data loss\"],\n    \"auto_resolve_categories\": [\"password reset\", \"how to export data\", \"change email\"],\n    \"escalation_triggers\": {\n      \"enterprise_customer_urgent\": \"notify_account_manager\",\n      \"bug_affecting_multiple\": \"page_engineering\",\n      \"security_concern\": \"immediate_escalation\"\n    }\n  },\n  \"ai_response_config\": {\n    \"auto_send_threshold\": 85,\n    \"suggest_threshold\": 60,\n    \"tone\": \"friendly and helpful\",\n    \"max_length\": 300,\n    \"always_include\": \"Let me know if you need anything else!\"\n  },\n  \"sla_times_minutes\": {\n    \"critical\": 15,\n    \"high\": 120,\n    \"medium\": 1440,\n    \"low\": 2880\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** 40% of simple tickets auto-resolved, average response time reduced from 4 hours to 12 minutes, customer satisfaction score improved from 3.8 to 4.6 stars, support team efficiency increased 3x.","useCase":"","proTip":""},{"number":4,"title":"Invoice → Extract Data → Accounting → Notify","prompt":"OVERVIEW:\nAutomated invoice processing system that extracts data from PDF/email invoices using OCR and AI, creates entries in accounting software, matches to purchase orders, and notifies stakeholders of payment due dates.\n\nTOOLS NEEDED:\n- n8n or Make\n- Gmail or Outlook (email monitoring)\n- OpenAI GPT-4 Vision or Mindee (invoice OCR)\n- QuickBooks or Xero (accounting software)\n- Slack (notifications)\n- Google Sheets or Airtable (invoice register)\n\nSTEP-BY-STEP FLOW:\n1. **Invoice Receipt:** \n   - Email trigger monitors inbox for invoices (from:*@vendor.com, subject:\"Invoice\")\n   - Downloads PDF attachments or captures email body\n2. **Data Extraction:**\n   - Send invoice PDF to OpenAI Vision API\n   - Prompt: \"Extract from this invoice: vendor name, invoice number, date, due date, line items with descriptions and amounts, subtotal, tax, total amount, payment terms, bank details\"\n   - Returns structured JSON\n3. **Validation:**\n   - Check if vendor exists in system\n   - Validate amounts (line items sum to subtotal)\n   - Check for duplicate invoice numbers\n   - If validation fails → route to review queue with issues flagged\n4. **PO Matching:**\n   - Search accounting system for matching purchase order by vendor + amount range\n   - If match found → link invoice to PO (3-way matching)\n   - If no match and amount >\\\\\\$1,000 → require manager approval\n   - If amount <\\\\\\$1,000 → auto-approve\n5. **Accounting Entry:**\n   - Create bill in QuickBooks/Xero\n   - Attach original invoice PDF\n   - Set due date for payment reminder\n   - Apply correct expense categories (use AI to suggest based on line item descriptions)\n6. **Notifications:**\n   - Slack message to #finance: \"New invoice from [Vendor]: \\$[Amount] due [Date]\"\n   - If >\\$10,000: Direct message to CFO for approval\n   - Add to invoice register spreadsheet\n7. **Payment Reminders:**\n   - 7 days before due date: Reminder to finance team\n   - 3 days before: Urgent reminder\n   - On due date: Payment confirmation check\n8. **Reconciliation:**\n   - After payment made, match bank transaction to invoice\n   - Update status to \"Paid\"\n   - Calculate: payment timing (early/on-time/late), early payment discounts captured","example":"\\`\\`\\`json\n{\n  \"extraction_prompt\": \"Extract all invoice data in JSON format with fields: vendor_name, invoice_number, invoice_date, due_date, line_items[], subtotal, tax, total, payment_terms, currency\",\n  \"approval_rules\": {\n    \"auto_approve_under\": 1000,\n    \"require_manager_approval\": 1000-10000,\n    \"require_cfo_approval\": 10000+\n  },\n  \"payment_reminders\": {\n    \"first_reminder_days\": 7,\n    \"urgent_reminder_days\": 3,\n    \"check_frequency\": \"daily at 9am\"\n  },\n  \"expense_categories_ai\": true,\n  \"duplicate_detection\": \"invoice_number + vendor_name\"\n}\n\\`\\`\\`\n\n**Expected Results:** 95% accuracy in data extraction, invoice processing time reduced from 15 minutes to 90 seconds, zero missed payment due dates, 89% of invoices auto-approved (no manual review needed), captured \\$12k in early payment discounts in first year.","useCase":"","proTip":""},{"number":5,"title":"Social Media Monitor → Sentiment Analysis → Alert","prompt":"OVERVIEW:\nReal-time brand monitoring system that tracks mentions across social platforms, analyzes sentiment and urgency using AI, and alerts the right team members for timely engagement or crisis management.\n\nTOOLS NEEDED:\n- n8n (workflow engine)\n- Twitter API, Reddit API, Instagram API (or use mention tracking service like Brand24)\n- OpenAI or Claude (sentiment analysis)\n- Slack (alerts)\n- Airtable (mention database)\n- Twilio (SMS for critical alerts)\n\nSTEP-BY-STEP FLOW:\n1. **Continuous Monitoring:**\n   - Cron trigger every 5 minutes\n   - Query APIs for mentions of: brand name, product names, CEO name, key hashtags\n   - Deduplication check (skip if already processed)\n2. **Content Enrichment:**\n   - Fetch author profile: follower count, verification status, influence score\n   - Capture full context: original post, any replies, engagement metrics\n3. **AI Sentiment Analysis:**\n   - Send post content to AI with prompt: \"Analyze sentiment (positive/neutral/negative/crisis), detect sarcasm, identify key topics mentioned, assess urgency (low/medium/high/critical), determine if response needed\"\n   - Return structured analysis with reasoning\n4. **Smart Routing:**\n   - **Positive + High engagement:** Forward to social media team for engagement (like/retweet/thank)\n   - **Neutral + Question:** Forward to support team with suggested response\n   - **Negative + Low urgency:** Add to weekly feedback review\n   - **Negative + Medium urgency:** Slack alert to social media manager\n   - **Crisis (threats, major complaints, viral negative):** Immediate Slack + SMS to PR team + CMO\n5. **Response Tracking:**\n   - If response sent, link it to original mention\n   - Track response time, resolution status\n   - Calculate sentiment shift (negative → neutral/positive after response)\n6. **Reporting:**\n   - Daily digest: mention volume, sentiment breakdown, trending topics\n   - Weekly report: brand health score, top engaging posts, crisis incidents, response rate\n7. **Trend Detection:**\n   - If seeing 10+ similar negative mentions in 1 hour → escalate as emerging issue\n   - AI clusters similar mentions to identify patterns","example":"\\`\\`\\`json\n{\n  \"monitoring\": {\n    \"keywords\": [\"@YourBrand\", \"#YourProduct\", \"Your Company Name\"],\n    \"platforms\": [\"twitter\", \"reddit\", \"instagram\", \"linkedin\"],\n    \"check_frequency_minutes\": 5,\n    \"languages\": [\"en\", \"es\"]\n  },\n  \"sentiment_thresholds\": {\n    \"crisis_keywords\": [\"scam\", \"lawsuit\", \"data breach\", \"hurt\", \"injured\"],\n    \"urgent_follower_count\": 10000,\n    \"viral_threshold_engagements\": 1000\n  },\n  \"routing\": {\n    \"positive_high_engagement\": \"#social-wins\",\n    \"question_any_sentiment\": \"#customer-support\",\n    \"negative_medium\": \"#social-media-manager\",\n    \"crisis\": [\"#crisis-team\", \"sms:+1234567890\"]\n  },\n  \"response_sla\": {\n    \"positive\": \"24 hours\",\n    \"neutral\": \"12 hours\",\n    \"negative\": \"2 hours\",\n    \"crisis\": \"15 minutes\"\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Average response time to customer mentions reduced from 8 hours to 22 minutes, prevented 2 potential PR crises through early detection, identified 47 brand advocates for partnership program, 78% of negative mentions resolved within SLA.","useCase":"","proTip":""},{"number":6,"title":"Job Application → AI Screen → Score → Notify","prompt":"OVERVIEW:\nAutomated candidate screening workflow that evaluates resumes and applications using AI, scores candidates against job requirements, schedules interviews for top candidates, and sends personalized responses to all applicants.\n\nTOOLS NEEDED:\n- n8n or Make\n- Greenhouse, Lever, or custom job board (ATS)\n- OpenAI GPT-4 or Claude (resume analysis)\n- Calendly (interview scheduling)\n- Gmail (applicant communication)\n- Airtable or Google Sheets (candidate database)\n\nSTEP-BY-STEP FLOW:\n1. **Application Received:**\n   - Webhook trigger from ATS when new application submitted\n   - Download resume (PDF) and parse application form data\n2. **Resume Parsing:**\n   - Use OpenAI Vision to extract: work experience, education, skills, years of experience, notable achievements, technologies used\n   - Parse into structured JSON\n3. **AI Screening:**\n   - Send job description + candidate data to AI\n   - Prompt: \"Score this candidate 0-100 for [Job Title] position. Evaluate: relevant experience (40%), technical skills match (30%), education fit (15%), career trajectory (15%). Provide score, strengths (3-5 points), concerns (if any), and interview recommendation.\"\n4. **Scoring & Routing:**\n   - **Score 80-100 (Strong Match):**\n     - Auto-send Calendly link for interview\n     - Slack notification to hiring manager with resume + AI analysis\n     - Add to \"Top Candidates\" pipeline stage\n   - **Score 60-79 (Potential):**\n     - Add to \"Review Needed\" pipeline\n     - Include in weekly hiring team meeting\n   - **Score 0-59 (Not a Fit):**\n     - Send polite rejection email with feedback\n     - Add to talent pool for future opportunities\n5. **Personalized Communication:**\n   - AI generates custom email based on score tier\n   - Strong matches: enthusiastic tone, mention specific strengths\n   - Potential: neutral tone, timeline expectations\n   - Rejections: respectful, constructive feedback, encouragement to apply again\n6. **Interview Scheduling (for strong candidates):**\n   - If candidate books interview via Calendly → update ATS\n   - Send calendar invite with: interview details, team member bios, what to prepare\n   - 24h before interview: Send reminder + Zoom link\n7. **Post-Interview:**\n   - After interview, hiring manager fills feedback form\n   - AI aggregates feedback + initial screen → final recommendation\n   - Decision: Advance, Reject, Need More Info\n8. **Analytics Tracking:**\n   - Log: time-to-screen, screen-to-interview rate, interview-to-offer rate\n   - AI screening accuracy (hiring manager agreement rate)\n   - Diversity metrics across pipeline stages","example":"\\`\\`\\`json\n{\n  \"job_requirements\": {\n    \"title\": \"Senior Backend Engineer\",\n    \"must_have\": [\"5+ years backend dev\", \"Python or Go\", \"API design\", \"SQL/NoSQL\"],\n    \"nice_to_have\": [\"AWS/GCP\", \"Microservices\", \"Team lead experience\"],\n    \"deal_breakers\": [\"Less than 3 years experience\", \"No backend experience\"]\n  },\n  \"scoring_weights\": {\n    \"relevant_experience\": 40,\n    \"technical_skills\": 30,\n    \"education_fit\": 15,\n    \"career_trajectory\": 15\n  },\n  \"routing_thresholds\": {\n    \"auto_interview\": 80,\n    \"manual_review\": 60,\n    \"auto_reject\": 59\n  },\n  \"communication\": {\n    \"response_time_hours\": 24,\n    \"rejection_feedback\": true,\n    \"talent_pool_opt_in\": true\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Reduced time-to-screen from 3 days to 2 hours, 92% hiring manager agreement with AI screening decisions, 40% increase in candidate response rate due to fast turnaround, screened 450 applications in first month with 15 strong matches (3.3% pass rate).","useCase":"","proTip":""},{"number":7,"title":"Meeting → Transcribe → Summary → Action Items","prompt":"OVERVIEW:\nAutomated meeting documentation workflow that records calls, transcribes them, generates AI summaries with key decisions and action items, and distributes to attendees with task assignments.\n\nTOOLS NEEDED:\n- n8n (workflow engine)\n- Zoom, Google Meet, or Teams (meeting platform)\n- AssemblyAI or Whisper (transcription)\n- OpenAI GPT-4 or Claude (summarization)\n- Notion or Confluence (documentation)\n- Todoist, Asana, or Linear (task management)\n- Gmail (distribution)\n\nSTEP-BY-STEP FLOW:\n1. **Meeting Recording:**\n   - Zoom cloud recording enabled\n   - Webhook fires when recording available\n   - Download audio/video file\n2. **Transcription:**\n   - Send audio to AssemblyAI\n   - Get back: full transcript with speaker labels, timestamps, confidence scores\n   - Identify speakers from participant list\n3. **AI Analysis:**\n   - Send transcript to AI with structured prompt:\n     - **Executive Summary:** 2-3 sentence overview\n     - **Key Discussion Points:** Bullet list of main topics\n     - **Decisions Made:** Specific decisions with context\n     - **Action Items:** Tasks with assigned person (if mentioned), due date, priority\n     - **Open Questions:** Unresolved items needing follow-up\n     - **Next Steps:** Recommended actions\n4. **Document Creation:**\n   - Create Notion page with:\n     - Meeting metadata (date, attendees, duration)\n     - AI-generated summary sections\n     - Full transcript (collapsed by default)\n     - Recording link\n5. **Task Distribution:**\n   - For each action item with assigned person:\n     - Create task in project management tool\n     - Set due date (if mentioned, else default +7 days)\n     - Link back to meeting notes\n     - Assign to person\n6. **Email Distribution:**\n   - Send summary email to all attendees within 15 minutes of meeting end\n   - Include: summary, action items table, Notion link, recording link\n   - CC: stakeholders who weren't in meeting but need awareness\n7. **Follow-Up:**\n   - 48 hours before action item due date: Reminder to assignee\n   - Weekly digest: All outstanding action items from meetings","example":"\\`\\`\\`json\n{\n  \"transcription\": {\n    \"speaker_labels\": true,\n    \"confidence_threshold\": 0.8,\n    \"punctuation\": true,\n    \"language\": \"en\"\n  },\n  \"summary_prompt\": \"Analyze this meeting transcript and extract: executive summary, key discussion points, decisions made, action items with owners and due dates, open questions, and next steps. Format as structured JSON.\",\n  \"action_item_defaults\": {\n    \"due_days_if_not_specified\": 7,\n    \"default_priority\": \"medium\",\n    \"auto_assign\": true\n  },\n  \"distribution\": {\n    \"send_within_minutes\": 15,\n    \"include_full_transcript\": false,\n    \"cc_stakeholders\": [\"manager@company.com\"]\n  },\n  \"reminders\": {\n    \"action_item_reminder_hours\": 48,\n    \"weekly_digest_day\": \"Monday\",\n    \"weekly_digest_time\": \"09:00\"\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Meeting notes delivered within 15 minutes vs 2-3 days with manual process, 95% accuracy in action item extraction, zero forgotten follow-ups, 67% reduction in \"wait, what did we decide?\" Slack messages, reclaimed 5 hours/week per team from manual note-taking.","useCase":"","proTip":""},{"number":8,"title":"Competitor Monitor → Price Change → Alert","prompt":"OVERVIEW:\nCompetitive intelligence system that continuously monitors competitor websites for price changes, product updates, and new features, then alerts relevant teams with analysis and recommended actions.\n\nTOOLS NEEDED:\n- n8n (workflow automation)\n- BrightData or Apify (web scraping)\n- OpenAI or Claude (change analysis)\n- PostgreSQL or Airtable (price history database)\n- Slack (alerts)\n- Google Sheets (competitor comparison dashboard)\n\nSTEP-BY-STEP FLOW:\n1. **Scheduled Monitoring:**\n   - Cron trigger: Daily at 6am for pricing pages, Weekly for features/product pages\n   - List of competitor URLs stored in config\n2. **Web Scraping:**\n   - For each competitor, fetch: pricing page, features page, product listings\n   - Extract: prices by tier, feature list, new product announcements\n   - Handle: login walls (store cookies), dynamic content (headless browser), CAPTCHAs (proxy rotation)\n3. **Change Detection:**\n   - Compare current data with last snapshot in database\n   - Calculate: price changes (amount, percentage), new features added, removed features, new products\n   - If no changes → stop workflow, log \"no changes\"\n   - If changes detected → continue to analysis\n4. **AI Impact Analysis:**\n   - Send changes to AI: \"Competitor X reduced their Enterprise plan from \\$999 to \\$799 (20% decrease). Our Enterprise plan is \\$899. Analyze: competitive positioning impact, urgency (low/medium/high), recommended response (price match, add value, differentiate, do nothing), estimated customer impact.\"\n   - Get structured response with reasoning\n5. **Alert Routing:**\n   - **Price Changes:** \n     - >15% decrease: Urgent Slack to #pricing + CEO\n     - 5-15% change: Notify #product-strategy\n     - <5% change: Log only\n   - **New Features:**\n     - Competitive feature we lack: Alert #product-team with customer request data\n     - Feature we have better: Share win with #sales\n   - **New Products:**\n     - Direct competition: Alert #leadership\n     - Adjacent market: Share with #strategy\n6. **Dashboard Update:**\n   - Update Google Sheets competitor matrix\n   - Columns: Competitor, Pricing Tiers, Key Features, Last Change Date, Our Position\n   - Conditional formatting: Red if competitor cheaper, Green if we're better value\n7. **Historical Tracking:**\n   - Store all changes in database with timestamp\n   - Generate monthly report: competitor pricing trends, feature velocity, market positioning shifts\n8. **Customer Impact:**\n   - Cross-reference: Are any of our customers also on competitor trials? (from CRM data)\n   - If competitor dropped price and we have at-risk customer → alert account manager","example":"\\`\\`\\`json\n{\n  \"competitors\": [\n    {\n      \"name\": \"Competitor A\",\n      \"pricing_url\": \"https://competitor-a.com/pricing\",\n      \"features_url\": \"https://competitor-a.com/features\",\n      \"check_frequency\": \"daily\"\n    }\n  ],\n  \"scraping\": {\n    \"timeout_seconds\": 30,\n    \"retry_attempts\": 3,\n    \"use_proxy\": true,\n    \"headless_browser\": true\n  },\n  \"alert_thresholds\": {\n    \"price_change_urgent\": 15,\n    \"price_change_notify\": 5,\n    \"new_feature_competitive\": true\n  },\n  \"analysis_prompt\": \"You are a competitive intelligence analyst. Analyze this competitor change and provide: impact_score (0-100), urgency (low/medium/high), recommended_action, reasoning\",\n  \"reporting\": {\n    \"weekly_digest\": true,\n    \"monthly_deep_dive\": true,\n    \"include_historical_trends\": true\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Detected 23 competitor price changes in first quarter (average 48 hours ahead of manual discovery), prevented loss of 3 enterprise deals by proactively adjusting pricing, identified 8 feature gaps leading to product roadmap adjustments, sales team 2.3x more confident in competitive positioning with real-time data.","useCase":"","proTip":""},{"number":9,"title":"Customer Churn Prediction → Retention Workflow","prompt":"OVERVIEW:\nProactive churn prevention system that analyzes customer behavior to predict churn risk, then triggers personalized retention workflows (check-ins, offers, product tips) before customers decide to leave.\n\nTOOLS NEEDED:\n- n8n or Make (workflow engine)\n- Your product database (usage data)\n- OpenAI or custom ML model (churn prediction)\n- HubSpot or Salesforce (CRM)\n- Intercom or Customer.io (customer messaging)\n- Slack (internal alerts)\n\nSTEP-BY-STEP FLOW:\n1. **Daily Churn Score Calculation:**\n   - Cron trigger: Daily at 8am\n   - Query product database for all active customers\n   - For each customer, collect metrics:\n     - Login frequency (last 7, 30, 90 days)\n     - Feature usage depth (how many features used)\n     - Support tickets (count, sentiment)\n     - Payment history (on-time, late, declined)\n     - Contract end date (proximity)\n     - Engagement with emails/content (open rates)\n     - NPS score (if available)\n2. **AI Churn Prediction:**\n   - Send metrics to ML model or GPT-4\n   - Prompt: \"Based on these customer behavior metrics, predict churn probability (0-100) and identify top 3 risk factors. Return JSON with: churn_score, risk_level (low/medium/high/critical), primary_risk_factors, recommended_intervention.\"\n3. **Risk Segmentation:**\n   - **Critical Risk (80-100):**\n     - Immediate: Assign to Customer Success Manager\n     - Slack alert to CSM + Account owner\n     - Same-day outreach required\n   - **High Risk (60-79):**\n     - Schedule check-in call within 3 days\n     - Send personalized \"How can we help?\" email\n   - **Medium Risk (40-59):**\n     - Enroll in automated re-engagement campaign\n     - Share product tips, case studies, feature highlights\n   - **Low Risk (0-39):**\n     - Continue normal engagement\n4. **Personalized Intervention Workflows:**\n   - **Critical - Low Usage:** \n     - CSM call: \"I noticed you haven't been using [Feature]. Can I show you how it could help with [customer's goal from onboarding]?\"\n     - Offer: 1-on-1 training session\n   - **Critical - Support Issues:**\n     - Escalate unresolved tickets\n     - Executive sponsor call to address concerns\n   - **High - Nearing Contract End:**\n     - Renewal conversation with special offer\n     - ROI report showing value delivered\n   - **Medium - Declining Engagement:**\n     - Email series: Success stories, tips, new features\n     - In-app messaging with helpful content\n5. **Outcome Tracking:**\n   - Track intervention type and customer response\n   - Did they: Increase usage, renew contract, churn anyway, go dormant\n   - Calculate: intervention success rate, time to re-engagement, saved MRR\n6. **Feedback Loop:**\n   - For customers who churned despite intervention:\n     - Conduct exit interview (manual or automated survey)\n     - Feed reasons back into churn model to improve predictions\n   - For customers who were retained:\n     - Identify which intervention worked\n     - Update playbook for similar cases\n7. **Reporting:**\n   - Weekly: At-risk customer list with assigned owners\n   - Monthly: Churn rate, saved MRR, intervention success rates, top churn reasons","example":"\\`\\`\\`json\n{\n  \"churn_signals\": {\n    \"usage_metrics\": {\n      \"logins_last_7_days\": {\"weight\": 25, \"threshold_low\": 1},\n      \"features_used_last_30_days\": {\"weight\": 20, \"threshold_low\": 3},\n      \"days_since_last_login\": {\"weight\": 15, \"threshold_high\": 14}\n    },\n    \"engagement_metrics\": {\n      \"support_tickets_last_90_days\": {\"weight\": 10, \"threshold_high\": 5},\n      \"email_open_rate\": {\"weight\": 10, \"threshold_low\": 20},\n      \"nps_score\": {\"weight\": 15, \"threshold_low\": 6}\n    },\n    \"business_metrics\": {\n      \"days_until_contract_end\": {\"weight\": 5, \"threshold_high\": 60}\n    }\n  },\n  \"intervention_playbooks\": {\n    \"low_usage\": [\"csm_call\", \"training_offer\", \"feature_tutorial_email\"],\n    \"support_issues\": [\"escalate_ticket\", \"executive_call\", \"apology_credit\"],\n    \"renewal_approaching\": [\"roi_report\", \"renewal_offer\", \"case_study\"],\n    \"declining_engagement\": [\"email_campaign\", \"in_app_tips\", \"webinar_invite\"]\n  },\n  \"sla\": {\n    \"critical_response_hours\": 4,\n    \"high_response_hours\": 72,\n    \"medium_response_days\": 7\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Reduced churn rate from 8% to 4.5% monthly, saved \\$180k MRR in first quarter through successful interventions, 68% of high-risk customers re-engaged after outreach, average 12-day early warning before customer would have churned, CSM team 3x more efficient with prioritized outreach list.","useCase":"","proTip":""},{"number":10,"title":"Daily Report → Aggregate → AI Analysis → Email","prompt":"OVERVIEW:\nAutomated business intelligence workflow that collects data from multiple sources daily, aggregates KPIs, uses AI to identify trends and insights, generates an executive summary, and emails it to leadership team.\n\nTOOLS NEEDED:\n- n8n (workflow orchestration)\n- Google Analytics, Stripe, HubSpot APIs (data sources)\n- PostgreSQL or BigQuery (data warehouse)\n- OpenAI GPT-4 or Claude (analysis & insights)\n- Google Sheets (data visualization)\n- SendGrid or Gmail (report distribution)\n\nSTEP-BY-STEP FLOW:\n1. **Scheduled Data Collection:**\n   - Cron trigger: Daily at 7am\n   - Parallel data fetching from:\n     - **Google Analytics:** Website traffic, conversion rate, top pages\n     - **Stripe:** MRR, new customers, churn, failed payments\n     - **HubSpot:** New leads, sales pipeline value, deals closed\n     - **Support System:** Ticket volume, resolution time, CSAT\n     - **Product Database:** Active users, feature adoption, error rates\n2. **Data Aggregation:**\n   - Normalize data from all sources into common format\n   - Calculate key metrics:\n     - Revenue: MRR, new MRR, churned MRR, net new MRR\n     - Customers: New, churned, net growth, churn rate %\n     - Marketing: Website visitors, conversion rate, cost per lead\n     - Sales: Pipeline value, close rate, average deal size\n     - Product: DAU/MAU, feature adoption %, error rate\n     - Support: Tickets opened/closed, backlog, avg resolution time\n   - Compare to: Yesterday, Last week, Last month, Same day last year\n3. **Trend Detection:**\n   - Calculate: 7-day moving average, week-over-week growth, anomaly detection\n   - Flag: Metrics outside normal range (>2 standard deviations)\n   - Identify: Metrics with significant changes (>20% week-over-week)\n4. **AI Analysis & Insights:**\n   - Send all metrics + trends to AI\n   - Prompt: \"You are a business analyst. Analyze this daily data. Provide:\n     1. **Executive Summary:** 2-3 sentence overview of business health\n     2.         "prompt": "Design a webhook signature system so recipients can verify requests are from your service. Specify: (1) Signature algorithm (HMAC-SHA256, etc.), (2) What data to include in signature (body, timestamp, etc.), (3) Header format for sending signature, (4) Timestamp validation to prevent replay attacks, (5) Secret sharing and rotation process, and (6) Example code for both signing (sender) and verifying (receiver). Make it secure and easy for developers to implement.",
        "example": "**Algorithm:** HMAC-SHA256\n**Signature Calculation:**\n1. Create signature payload: `timestamp.request_body`\n2. Compute HMAC: `HMAC-SHA256(signing_secret, payload)`\n3. Send in header: `X-Webhook-Signature: t=1704978000,v1=computed_signature`\n**Sender Code (your API):**\n```javascript\nconst crypto = require('crypto');\nfunction signWebhook(payload, secret) {\n  const timestamp = Math.floor(Date.now() / 1000);\n  const signedPayload = `${timestamp}.${JSON.stringify(payload)}`;\n  const signature = crypto\n    .createHmac('sha256', secret)\n    .update(signedPayload)\n    .digest('hex');\n  return {\n    header: `t=${timestamp},v1=${signature}`,\n    timestamp\n  };\n}\n// Send webhook\nconst payload = {event: 'order.created', data: {...}};\nconst {header, timestamp} = signWebhook(payload, webhook.secret);\nfetch(webhook.url, {\n  method: 'POST',\n  headers: {\n    'Content-Type': 'application/json',\n    'X-Webhook-Signature': header\n  },\n  body: JSON.stringify(payload)\n});\n```\n**Receiver Code (customer):**\n```javascript\nfunction verifyWebhook(body, signature, secret) {\n  const [t, v1] = signature.split(',').map(p => p.split('=')[1]);\n  const timestamp = parseInt(t);\n  // Prevent replay attacks (reject older than 5 minutes)\n  const now = Math.floor(Date.now() / 1000);\n  if (Math.abs(now - timestamp) > 300) {\n    throw new Error('Webhook timestamp too old');\n  }\n  // Verify signature\n  const signedPayload = `${timestamp}.${body}`;\n  const expectedSignature = crypto\n    .createHmac('sha256', secret)\n    .update(signedPayload)\n    .digest('hex');\n  if (v1 !== expectedSignature) {\n    throw new Error('Invalid signature');\n  }\n  return true;\n}\n```\n**Secret Management:**\n- Generate unique secret per webhook subscription\n- Display secret only once at creation (like API keys)\n- Provide rotation endpoint: generates new secret, returns both old and new for transition period",

        "example": "**Pagination Style:** Cursor-based (more efficient for large datasets)\n**Query Parameters:**\n```\nGET /api/v1/orders?limit=20&cursor=eyJpZCI6MTIzNDU&order=desc\n```\n- `limit`: Items per page (default: 20, max: 100)\n- `cursor`: Opaque token pointing to start of page\n- `order`: `asc` or `desc` (default: `desc` for most recent first)\n**Response Structure:**\n```json\n{\n  \"data\": [\n    {\"id\": 12345, \"total\": 99.99, \"created_at\": \"2024-01-15T10:00:00Z\"},\n    {\"id\": 12344, \"total\": 49.99, \"created_at\": \"2024-01-15T09:30:00Z\"},\n    // ... 18 more items\n  ],\n  \"pagination\": {\n    \"next_cursor\": \"eyJpZCI6MTIzMjUs\",\n    \"has_more\": true,\n    \"count\": 20\n  }\n}\n```\n**Cursor Implementation:**\n- Cursor = base64(JSON({id: last_item_id, timestamp: last_item_timestamp}))\n- Query: WHERE id < cursor.id ORDER BY id DESC LIMIT 20\n- More efficient than OFFSET (doesn't skip rows)\n**Metadata:**\n- `next_cursor`: Token for next page (null if last page)\n- `has_more`: Boolean (easier than checking if next_cursor is null)\n- `count`: Items in current page\n- No `total` count (expensive to compute on large tables)\n**Sorting:**\n- Default: Most recent first (created_at DESC)\n- Allow `?sort=total:desc` or `?sort=created_at:asc`\n- Cursor must encode sort field\n**Alternative: Offset-based (simpler but slower)**\n```\nGET /api/v1/orders?page=2&limit=20\nResponse: {data: [...], page: 2, per_page: 20, total: 1543, total_pages: 78}\n```",

        "example": "**Resource: Orders**\n**Filter Parameters:**\n```\nGET /api/v1/orders?\n  status=pending,processing      # IN operator (comma-separated)\n  &total_gte=100                # Greater than or equal\n  &total_lte=1000               # Less than or equal\n  &created_after=2024-01-01     # Date range\n  &customer_id=cus_123          # Exact match\n  &search=urgent                # Full-text search (any field)\n```\n**Operators:**\n- No suffix: Exact match (`status=pending`)\n- `_gte`: Greater than or equal (`total_gte=100`)\n- `_lte`: Less than or equal (`total_lte=1000`)\n- `_contains`: Substring match (`notes_contains=urgent`)\n- Comma-separated: IN operator (`status=pending,shipped`)\n**Combining Filters:**\n- Multiple parameters = AND logic\n- Example: `status=pending&total_gte=100` → \"pending AND total >= 100\"\n- OR logic: Use comma-separation within same parameter\n- Example: `status=pending,processing` → \"pending OR processing\"\n**Search:**\n- `?search=keyword` → Full-text search across multiple fields (customer name, email, order notes)\n- Uses database FTS (Postgres: `ts_vector`, MySQL: `FULLTEXT`) or Elasticsearch\n- Combined with filters: `?search=urgent&status=pending`\n**Performance:**\n- Indexed fields: status, customer_id, created_at, total\n- Limit combinations: Max 5 filters per query (prevent slow queries)\n- Query timeout: 5 seconds (return 503 if exceeded)\n- Expensive searches: Require higher plan or lower rate limit\n**Example Request:**\n```\nGET /api/v1/orders?status=pending,processing&total_gte=100&created_after=2024-01-01&limit=20\n```\n**Response:**\n```json\n{\n  \"data\": [/* orders matching filters */],\n  \"filters_applied\": {\n    \"status\": [\"pending\", \"processing\"],\n    \"total\": {\"gte\": 100},\n    \"created_at\": {\"after\": \"2024-01-01\"}\n  },\n  \"pagination\": {/* cursor info */}\n}\n```",

        "example": "**Error Categories:**\n**4xx Client Errors (Don't Retry):**\n- **400 Bad Request:** Fix your request payload, then try again\n- **401 Unauthorized:** Your API key is invalid/expired → refresh credentials\n- **403 Forbidden:** You don't have permission → upgrade plan or request access\n- **404 Not Found:** Resource doesn't exist → verify ID\n- **422 Unprocessable:** Validation failed → fix data per error details\n- **429 Rate Limited:** Wait for `Retry-After` seconds → respect limits\n**5xx Server Errors (Retry with Backoff):**\n- **500 Internal Server Error:** Temporary issue → retry\n- **502 Bad Gateway:** Service temporarily down → retry\n- **503 Service Unavailable:** Overloaded or maintenance → retry after `Retry-After`\n- **504 Gateway Timeout:** Request took too long → retry with longer timeout\n**Retry Logic:**\n```javascript\nasync function apiCall(url, options, maxRetries = 3) {\n  for (let attempt = 0; attempt <= maxRetries; attempt++) {\n    try {\n      const response = await fetch(url, options);\n      // Success\n      if (response.ok) return response.json();\n      // Don't retry client errors\n      if (response.status >= 400 && response.status < 500) {\n        if (response.status === 429) {\n          const retryAfter = response.headers.get('Retry-After') || 60;\n          await sleep(retryAfter * 1000);\n          continue;  // Retry rate limits\n        }\n        throw new Error(`Client error: ${response.status}`);\n      }\n      // Retry server errors\n      if (response.status >= 500) {\n        if (attempt < maxRetries) {\n          const delay = Math.min(1000 × (2 ** attempt), 30000);  // Max 30s\n          await sleep(delay);\n          continue;\n        }\n      }\n      throw new Error(`API error: ${response.status}`);\n    } catch (err) {\n      if (attempt === maxRetries) throw err;\n      await sleep(1000 × (2 ** attempt));\n    }\n  }\n}\n```\n**Idempotency:**\n- Use `Idempotency-Key` header for POST/PATCH requests\n```\nPOST /api/v1/orders\nIdempotency-Key: unique_key_123\n```\n- Server tracks keys, returns cached response if duplicate\n- Safe to retry without creating duplicates\n**Circuit Breaker Pattern:**\n- After 5 consecutive failures → open circuit (stop trying)\n- Wait 60 seconds → try one request (half-open)\n- If succeeds → close circuit (back to normal)\n- If fails → stay open for another 60 seconds",

let currentCategory = 0;

function init() {
  renderCategories();
  renderCategory(0);
  setupSearch();
}

function renderCategories() {
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = categories.map((cat, idx) => `
    <div class="category-item ${idx === 0 ? 'active' : ''}" onclick="selectCategory(${idx})">
      <div class="category-icon">${cat.icon}</div>
      <div class="category-info">
        <div class="category-name">${cat.name}</div>
      </div>
      <div class="category-count">${cat.prompts.length}</div>
    </div>
  `).join('');
}

function selectCategory(idx) {
  currentCategory = idx;
  document.querySelectorAll('.category-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderCategory(idx);
  document.getElementById('searchInput').value = '';
}

function renderCategory(idx) {
  const cat = categories[idx];
  const content = document.getElementById('contentArea');
  
  const header = `
    <div class="category-header">
      <h2>${cat.icon} ${cat.name}</h2>
      <p>${cat.desc} — ${cat.prompts.length} prompts</p>
    </div>
  `;
  
  const cards = cat.prompts.map(p => `
    <div class="prompt-card">
      <div class="prompt-header" onclick="togglePrompt(this)">
        <span class="prompt-num">#${p.num}</span>
        <span class="prompt-title">${escapeHtml(p.title)}</span>
        
        <span class="prompt-expand">+</span>
      </div>
      <div class="prompt-details">
        <div class="prompt-section">
          <div class="section-label">📋 PROMPT</div>
          <div class="prompt-text">${escapeHtml(p.prompt || '')}</div>
          <button class="copy-btn" onclick="copyText(this)">📋 Copy</button>
        </div>
        ${p.example ? `
        <div class="section-label">💡 EXAMPLE OUTPUT</div>
        <div class="example-text">${escapeHtml(p.example)}</div>
        ` : ''}
        ${p.useCase ? `
        <div class="section-label">📌 USE CASE</div>
        <div class="usecase-text">${escapeHtml(p.useCase)}</div>
        ` : ''}
        ${p.proTip ? `
        <div class="section-label">⭐ PRO TIP</div>
        <div class="protip-box">
          <div class="protip-label">Pro Tip</div>
          ${escapeHtml(p.proTip)}
        </div>
        ` : ''}
      </div>
    </div>
  `).join('');
  
  content.innerHTML = header + cards;
}

function togglePrompt(el) {
  el.parentElement.classList.toggle('expanded');
}

function copyText(btn) {
  const text = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy', 2000);
  });
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    
    if (!query) {
      renderCategory(currentCategory);
      return;
    }
    
    const results = [];
    categories.forEach(cat => {
      cat.prompts.forEach(p => {
        const searchable = `${p.title} ${p.prompt} ${p.useCase}`.toLowerCase();
        if (searchable.includes(query)) {
          results.push({...p, catName: cat.name, catIcon: cat.icon});
        }
      });
    });
    
    renderSearchResults(results, query);
  });
}

function renderSearchResults(results, query) {
  const content = document.getElementById('contentArea');
  
  if (results.length === 0) {
    content.innerHTML = `
      <div class="no-results">
        <span class="no-results-icon">🔍</span>
        <h3>No results for "${query}"</h3>
        <p>Try a different search term</p>
      </div>
    `;
    return;
  }
  
  const header = `
    <div class="category-header">
      <h2>🔍 Search Results</h2>
      <p>Found ${results.length} prompts matching "${query}"</p>
    </div>
  `;
  
  const cards = results.map(p => `
    <div class="prompt-card">
      <div class="prompt-header" onclick="togglePrompt(this)">
        <span class="prompt-num">#${p.num}</span>
        <span class="prompt-title">${p.catIcon} ${escapeHtml(p.title)}</span>
        
        <span class="prompt-expand">+</span>
      </div>
      <div class="prompt-details">
        <div class="prompt-section">
          <div class="section-label">📋 PROMPT</div>
          <div class="prompt-text">${escapeHtml(p.prompt || '')}</div>
          <button class="copy-btn" onclick="copyText(this)">📋 Copy</button>
        </div>
        ${p.example ? `
        <div class="section-label">💡 EXAMPLE OUTPUT</div>
        <div class="example-text">${escapeHtml(p.example)}</div>
        ` : ''}
        ${p.useCase ? `
        <div class="section-label">📌 USE CASE</div>
        <div class="usecase-text">${escapeHtml(p.useCase)}</div>
        ` : ''}
        ${p.proTip ? `
        <div class="section-label">⭐ PRO TIP</div>
        <div class="protip-box">
          <div class="protip-label">Pro Tip</div>
          ${escapeHtml(p.proTip)}
        </div>
        ` : ''}
      </div>
    </div>
  `).join('');
  
  content.innerHTML = header + cards;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

init();
</script>
