otification strategy (Slack/Email to whom), (5) A \"replay\" mechanism to retry failed tasks after fixing the issue, and (6) Common failure scenarios for this workflow and preventive filters. Assume this Zap processes 500+ items daily and failures are unacceptable.","example":"Main Zap: Webhook → Parse JSON → Create Airtable record → Send confirmation email\nError Zap (trigger: Zapier Manager - Task Error in Zap): \n- Log to Google Sheets: timestamp, Zap step that failed, input data, error message\n- Slack alert to #tech-alerts with clickable link to failed task\n- Add to Zapier Table \"Failed_Tasks\" with status \"Pending\"\nReplay: Weekly Zap checks \"Failed_Tasks\", attempts to reprocess with current data","useCase":"For revenue-critical workflows (payment processing, lead capture, customer onboarding) where a single failure could cost money or trust.","proTip":"Set up your error-catching Zap BEFORE launching the main Zap. You'll sleep better knowing failures are logged, not lost in the void."},{"number":6,"title":"AI Email Classifier","prompt":"Using ChatGPT or Claude in Zapier, create a prompt that categorizes incoming emails into specific buckets. My categories are: [list your categories]. The AI should analyze: subject line, sender, email body. Return ONLY the category name (exact match to my list) and a confidence score (0-100). If confidence is below 70, return \"MANUAL_REVIEW\". Input will be: {{email_subject}}, {{email_from}}, {{email_body}}. Make the prompt concise to minimize AI costs but accurate enough for production use.","example":"\"Analyze this email and categorize it. Categories: Sales_Inquiry, Support_Request, Partnership, Spam, Internal.\n\nEmail From: {{email_from}}\nSubject: {{email_subject}}\nBody: {{email_body}}\n\nReturn only JSON: {\"category\": \"exact_category_name\", \"confidence\": 85}\nIf unsure (confidence < 70): {\"category\": \"MANUAL_REVIEW\", \"confidence\": XX}\"","useCase":"Automate email triage for shared inboxes (info@, support@, sales@) by routing to correct team or workflow based on content.","proTip":"Include 2-3 example emails in your prompt with their correct categories. This \"few-shot learning\" dramatically improves accuracy and reduces misclassifications."},{"number":7,"title":"AI Data Extraction from Unstructured Text","prompt":"Write a ChatGPT/Claude prompt that extracts structured data from unstructured text input. I need to extract: [list fields like name, email, company, phone, request_type, urgency]. The input text is: {{raw_text}} (could be email body, form submission, chat transcript). Return ONLY valid JSON with these exact keys. If a field isn't found, use null. If you find multiple possible values, pick the most likely. Validate email format and phone format. Add a \"confidence\" field (low/medium/high) based on how complete the extraction was.","example":"\"Extract structured data from this text and return valid JSON only.\n\nRequired fields: name, email, company, phone, request_type, urgency\nText: {{raw_text}}\n\nRules:\n- Use null for missing fields\n- Validate email and phone formats\n- request_type must be one of: demo, support, sales, other\n- urgency: low, medium, high (infer from language)\n- Add confidence: low/medium/high\n\nReturn only this JSON structure:\n{\\\\\"name\\\\\": \\\\\"...\\\\\", \\\\\"email\\\\\": \\\\\"...\\\\\", \\\\\"company\\\\\": \\\\\"...\\\\\", \\\\\"phone\\\\\": \\\\\"...\\\\\", \\\\\"request_type\\\\\": \\\\\"...\\\\\", \\\\\"urgency\\\\\": \\\\\"...\\\\\", \\\\\"confidence\\\\\": \\\\\"...\\\\\"}\"","useCase":"Perfect for processing contact forms, inbound emails, or chat transcripts where users provide information in natural language rather than structured forms.","proTip":"Always request JSON output from AI steps—it's parseable by Zapier's built-in JSON formatter, making it easy to map fields to your CRM or database."},{"number":8,"title":"AI Content Summarizer for Digests","prompt":"Create a ChatGPT prompt that summarizes multiple items into a digest email. Input: an array of items (articles, support tickets, sales updates, etc.) formatted as {{item_title}} - {{item_description}}. Output: a well-formatted HTML email digest with: (1) A compelling subject line, (2) A brief intro (2 sentences), (3) Each item summarized in 1-2 sentences with the key takeaway highlighted, (4) Items grouped by priority/category if applicable, (5) A clear call-to-action at the end. Tone should be [professional/casual/urgent]. Keep total length under 300 words.","example":"\"Create a daily digest email from these support tickets.\n\nTickets:\n{{line_items}}\n\nFormat as HTML email:\n- Subject line: catchy, mentions number of tickets\n- Intro: brief overview of the day\n- Each ticket: Title (bold), 1-2 sentence summary, priority indicator (🔴 high, 🟡 medium, 🟢 low)\n- Group by priority\n- End with: 'Reply to this email to escalate any urgent items'\nTone: professional but friendly. Max 250 words.\"","useCase":"Automatically create daily/weekly digest emails from aggregated data (support tickets, sales updates, content mentions, bug reports) instead of forwarding individual items.","proTip":"Use a \"Looping by Zapier\" step before the AI call to batch multiple triggers into one digest, then send once daily. Saves AI costs and reduces email fatigue."},{"number":9,"title":"AI Response Generator with Brand Voice","prompt":"Generate an AI prompt for Claude/ChatGPT that writes responses maintaining my brand voice. Brand voice is: [describe your voice: friendly/formal, technical/simple, etc.]. Context: responding to {{customer_message}} about {{topic}}. Include these brand-specific rules: [list 3-5 rules like \"always use 'you' not 'one'\", \"keep sentences under 20 words\", \"end with a question\", etc.]. The AI should output a complete, ready-to-send response (not a draft). Length: [X] sentences. Include a subject line if email, or just body if chat/SMS.","example":"\"Write a customer support response in our brand voice.\n\nCustomer message: {{customer_message}}\nTopic: {{topic}}\n\nBrand voice rules:\n- Friendly but professional (like talking to a smart friend)\n- Use simple words, avoid jargon unless customer used it first\n- Keep sentences under 20 words\n- Always acknowledge their frustration if present\n- End with a clear next step or question\n- Sign off with 'Happy to help! - [Your Name]'\n\nWrite a complete email response (subject + body). Max 5 sentences in body.\"","useCase":"Auto-respond to common customer inquiries (shipping status, return policy, feature questions) while maintaining brand consistency.","proTip":"Create a \"brand voice document\" in Google Docs with 10-15 example responses. Reference it in your prompt: \"Match the tone of these examples: [link]\". AI will learn your style patterns."},{"number":10,"title":"AI Meeting Notes & Action Items","prompt":"Design a ChatGPT/Claude prompt that processes meeting transcripts into actionable summaries. Input: {{meeting_transcript}} (from Zoom, Google Meet, or manual notes). Output should include: (1) Meeting title (inferred from content), (2) Attendees mentioned, (3) Key decisions made (bullet list), (4) Action items with assigned person and due date if mentioned, (5) Important metrics or numbers discussed, (6) Follow-up questions or unresolved items, (7) One-sentence overall summary. Format as Markdown for easy copying to Notion/Confluence.","example":"\"Process this meeting transcript into structured notes.\n\nTranscript: {{meeting_transcript}}\n\nReturn in this Markdown format:\n\n# [Meeting Title - inferred from content]\n**Date:** [extract or use today]\n**Attendees:** [list if mentioned]\n\n## Key Decisions\n- [bullet list]\n\n## Action Items\n- [ ] [task] - @[person] - Due: [date if mentioned, else 'TBD']\n\n## Metrics Discussed\n- [any numbers, KPIs, goals]\n\n## Follow-up Needed\n- [unresolved questions]\n\n**Summary:** [1 sentence overall]\"","useCase":"Automatically document meetings by feeding Zoom transcripts through Zapier → AI → Notion/Slack, ensuring action items are never lost.","proTip":"Add a step that extracts @mentions and creates individual tasks in Asana/ClickUp assigned to those people. Meetings → Action in one automation."},{"number":11,"title":"Advanced Filter Logic Builder","prompt":"I need to create complex filter logic in Zapier for this rule: [describe your conditional logic in plain English, including AND/OR conditions]. Translate this into: (1) Exact Zapier filter format (field, condition, value), (2) Multiple filter groups if needed (AND within groups, OR between groups), (3) Any text formatting needed before filtering (lowercase, trim, etc.), (4) Edge cases this filter should handle, and (5) A test case that should PASS and one that should FAIL. Account for Zapier's filter limitations (no regex, limited operators).","example":"Rule: \"Continue if email is from our domain OR the subject contains 'urgent' AND status is not 'closed'\"\n\nZapier Filter Setup:\n- Add Formatter before filter: Lowercase {{email_from}}\n- Filter Group 1 (OR): \n  * (Text) email_from_lowercase | Contains | @ourcompany.com\n- Filter Group 2 (OR):\n  * (Text) email_subject | Contains | urgent\n  * (Text) status | Does not equal | closed\n  \nPass test: from random@gmail.com, subject \"URGENT: Server down\", status \"open\" ✅\nFail test: from random@gmail.com, subject \"Question\", status \"closed\" ❌","useCase":"Build sophisticated filtering logic that would normally require Code by Zapier, using only native Filter steps to save tasks.","proTip":"Zapier's filter UI is confusing—\"AND\" means ALL conditions in a group must match, \"OR\" means ANY group can match. Draw it out before building."},{"number":12,"title":"Date-Based Filter Logic","prompt":"Create date-based filter rules for this requirement: [describe timing logic, e.g., \"only process items created in the last 24 hours\" or \"only on weekdays between 9-5\"]. Specify: (1) Formatter steps needed to prepare dates (timezone conversion, format changes), (2) Exact filter conditions, (3) How to handle timezone differences between apps, (4) Current time/date fields available in Zapier, and (5) A calendar-based visual showing when this filter will PASS vs FAIL.","example":"Requirement: \"Only send notifications for events happening within the next 2 hours\"\n\nSetup:\n1. Formatter: Get current time in format \"YYYY-MM-DD HH:mm\" (timezone: America/New_York)\n2. Formatter: Convert {{event_start_time}} to same format and timezone\n3. Formatter: Calculate hours between now and event (use \"Add/Subtract Time\")\n4. Filter: \n   * (Number) hours_until_event | Less than | 2\n   * (Number) hours_until_event | Greater than | 0\n\nVisual: [Now: 2PM] → Event at 3:30PM (1.5hrs) = ✅ PASS | Event at 5PM (3hrs) = ❌ FAIL","useCase":"Time-sensitive automations like appointment reminders, deadline alerts, or business-hours-only processing.","proTip":"Always use Formatter to normalize dates BEFORE filtering. Different apps send dates in different formats/timezones, causing filter failures you won't notice until production."},{"number":13,"title":"Empty/Null Field Handling","prompt":"Design a filter strategy for handling missing or empty data. Scenario: [describe your data flow]. I need to: (1) Identify which fields might be empty/null, (2) Decide if empty fields should stop the Zap or take an alternate path, (3) Set up filters that catch empty/null/whitespace-only values, (4) Create a fallback path for incomplete data, and (5) Determine what \"empty\" means for each field type (text, number, date). Consider Zapier's quirky handling of empty values.","example":"Scenario: Creating contacts from form submissions where phone/company are optional\n\nStrategy:\n1. Required fields (name, email): Filter stops Zap if \"(Exists)\" = False OR \"(Text) length | Less than | 1\"\n2. Optional fields (phone, company): Use Paths\n   - Path A: Complete data (phone EXISTS) → Create full contact record\n   - Path B: Incomplete (phone does NOT exist) → Create contact, add to \"Needs_Phone\" list\n3. Whitespace handling: Add Formatter (Trim) before all filters\n4. Numbers: Empty = literally nothing (not zero)\n5. Dates: Check for \"Invalid Date\" or \"1970-01-01\" (common API errors)","useCase":"Prevent Zap failures from incomplete data while still processing what you CAN use, especially with user-submitted forms.","proTip":"Use \"Exists\" operator first, THEN check value. Checking a non-existent field causes errors. The order: Does it exist? → Is it valid? → Is it the right value?"},{"number":14,"title":"Multi-Value Field Filtering","prompt":"I need to filter based on a field that contains multiple values (tags, categories, line items). The field is: {{field_name}} formatted as [describe: comma-separated, array, etc.]. Filter requirement: [describe logic like \"contains ANY of these tags\" or \"has ALL required items\"]. Provide: (1) Formatter step to prepare the data, (2) Filter logic that works with Zapier's limitations, (3) Workarounds if direct filtering isn't possible, (4) How to handle partial matches, and (5) Example data that should pass/fail.","example":"Field: Tags (comma-separated string: \"urgent, sales, vip, follow-up\")\nRequirement: Continue only if tags include \"urgent\" OR \"vip\"\n\nSolution:\n1. Formatter: Text (Lowercase) → {{tags}}\n2. Filter (use OR groups):\n   * (Text) tags_lowercase | Contains | urgent\n   * (Text) tags_lowercase | Contains | vip\n\nCaveat: This catches partial matches (\"not_urgent\" would match). \nBetter solution: \n1. Formatter: Split Text (tags, separator: \",\")\n2. Loop through items (Looping by Zapier)\n3. Filter: (Text) loop_item | Exactly matches | urgent (OR) vip\n\nPass: \"urgent, sales\" ✅ | Fail: \"sales, follow-up\" ❌","useCase":"Filter based on CRM tags, product categories, form checkboxes, or any multi-select field from source apps.","proTip":"For complex multi-value logic, use Airtable as middleware. Send data there first, use Airtable's formulas to evaluate conditions, then trigger your main Zap based on Airtable's computed field."},{"number":15,"title":"Path Routing Based on Score/Priority","prompt":"Create a path-based routing system using a calculated score or priority. Input fields: [list the data points]. Scoring logic: [describe how to calculate priority, e.g., \"deal value × urgency level - days since last contact\"]. Design: (1) Formatter/Code steps to calculate the score, (2) Path configuration with score thresholds, (3) Actions for each priority tier (high/medium/low), (4) What happens to items that don't fit any path, and (5) How to adjust thresholds based on business rules. Make it easy to tune without rebuilding the Zap.","example":"Lead scoring for sales routing:\nInputs: deal_value, urgency (1-5), days_since_contact, industry\n\nScore calculation (Code by Zapier):\nscore = (deal_value / 1000) + (urgency × 10) - (days_since_contact × 0.5) + (industry === 'Enterprise' ? 20 : 0)\n\nPaths (eval'd in order):\n- Path A: score > 50 → \"Hot Lead\" → Slack CEO, assign to senior sales, call within 1hr\n- Path B: score 25-50 → \"Warm Lead\" → Assign via round-robin, email within 24hr\n- Path C: score 10-25 → \"Cold Lead\" → Add to nurture campaign\n- Path D: score < 10 → \"Disqualified\" → Send to marketing for long-term nurture\n\nNo match: Alert admin (indicates scoring error)","useCase":"Intelligently route leads, support tickets, or applications based on business value, not just static fields.","proTip":"Store your scoring thresholds in a Google Sheet (High: >50, Medium: 25-50, etc.). Use Lookup in Zapier to fetch them. Now you can adjust scoring rules without editing the Zap."},{"number":16,"title":"Formatter Step Combinations","prompt":"I need to transform this data: [describe input data and desired output]. Using only Zapier's built-in Formatter actions (Text, Numbers, Date/Time, Utilities), design a sequence of Formatter steps that achieves this transformation. Specify: (1) Each Formatter action in order, (2) The exact transform type (uppercase, split, extract number, etc.), (3) Input for each step (including references to previous steps), (4) Expected output after each step, and (5) Alternative approaches if multiple paths work. Avoid Code by Zapier if possible.","example":"Transform: \"john.doe@company.com\" → \"John Doe\" (first name + last name, capitalized)\n\nFormatter sequence:\n1. Text: Extract Pattern → Input: {{email}}, Pattern: \"Before @\" → Output: \"john.doe\"\n2. Text: Split Text → Input: Step 1 output, Separator: \".\" → Output: [\"john\", \"doe\"]\n3. Text: Capitalize (repeat for each) → Input: john → Output: \"John\"\n4. Text: Capitalize → Input: doe → Output: \"Doe\"\n5. Text: Join → Input: \"John\", \"Doe\", Separator: \" \" → Output: \"John Doe\"\n\nAlternative: Use Code by Zapier (1 step instead of 5, but uses more tasks)","useCase":"Clean and format data from triggers before sending to destination apps, ensuring consistency across your stack.","proTip":"Formatter steps are cheap (1 task each) but can compound quickly. If you need >3 Formatters in sequence, consider using a single Code step instead—it's the same task cost and easier to maintain."},{"number":17,"title":"Code by Zapier Template Generator","prompt":"Write production-ready JavaScript for Zapier's Code by Zapier action. Task: [describe what the code should do]. Requirements: (1) Use only the input fields I provide (list them), (2) Handle errors gracefully (return error object, don't crash), (3) Return output as JSON object with keys that Zapier can use in next steps, (4) Include comments explaining logic, (5) Add input validation, and (6) Keep it under 50 lines. Test with this sample input: [provide example]. Language: JavaScript (Zapier's default).","example":"Task: Calculate shipping cost based on weight, distance, and service level\n\nCode:\n\\`\\`\\`javascript\n// Input: weight_lbs, distance_miles, service_level (standard/express/overnight)\nconst weight = parseFloat(inputData.weight_lbs) || 0;\nconst distance = parseFloat(inputData.distance_miles) || 0;\nconst service = inputData.service_level || 'standard';\n\n// Validation\nif (weight <= 0 || distance <= 0) {\n  return {error: 'Invalid weight or distance', shipping_cost: 0};\n}\n\n// Rate table (\\$ per lb per 100 miles)\nconst rates = {standard: 0.50, express: 1.00, overnight: 2.00};\nconst rate = rates[service] || rates.standard;\n\n// Calculate\nconst cost = (weight × rate × (distance / 100)).toFixed(2);\n\n// Return\nreturn {\n  shipping_cost: parseFloat(cost),\n  service_level: service,\n  formula: \\`\\${weight}lbs × \\$\\${rate}/lb × \\${distance/100} units\\`\n};\n\\`\\`\\`","useCase":"When Zapier's built-in actions can't handle your calculation, transformation, or business logic—especially for pricing, scoring, or complex data manipulation.","proTip":"Test your Code step using Zapier's \"Test & Review\" with real data before turning it on. JavaScript errors in production will fail silently and you won't know until customers complain."},{"number":18,"title":"Array/List Processing with Code","prompt":"Create JavaScript for Zapier's Code by Zapier that processes an array of items. Input: {{line_items}} (array from Looping or webhook). Operation needed: [describe: filter, map, reduce, find duplicates, etc.]. Output: (1) The processed array, (2) A count of items, (3) Any items that were removed/modified, and (4) A summary field (total, average, max, etc. if applicable). Include error handling for empty arrays and malformed items. Return results as a Zapier-friendly object (arrays as comma-separated strings if needed).","example":"Task: Process order line items, filter out items under \\$10, calculate totals\n\nCode:\n\\`\\`\\`javascript\nconst items = inputData.line_items; // Array of {name, price, quantity}\n\n// Validate\nif (!Array.isArray(items) || items.length === 0) {\n  return {error: 'No items provided', filtered_items: '', total: 0};\n}\n\n// Filter items >= \\$10\nconst filtered = items.filter(item => {\n  const price = parseFloat(item.price) || 0;\n  return price >= 10;\n});\n\n// Calculate totals\nconst total = filtered.reduce((sum, item) => {\n  return sum + (parseFloat(item.price) × parseInt(item.quantity));\n}, 0);\n\n// Format for Zapier\nreturn {\n  filtered_items: filtered.map(i => i.name).join(', '),\n  item_count: filtered.length,\n  removed_count: items.length - filtered.length,\n  total_value: total.toFixed(2),\n  average_item: (total / filtered.length).toFixed(2)\n};\n\\`\\`\\`","useCase":"Process e-commerce orders, survey responses, or any multi-item data that needs filtering, totaling, or transformation before next steps.","proTip":"When returning arrays from Code, convert them to comma-separated strings or JSON strings. Zapier handles strings better than complex objects in subsequent steps."},{"number":19,"title":"Data Validation & Formatting","prompt":"Design a data validation and cleaning workflow for: [describe your data type: emails, phone numbers, dates, currency, etc.]. Create: (1) Formatter steps to normalize the format, (2) Validation logic (filter or code) to detect invalid data, (3) A path for valid data (continue) and invalid data (send to error log or manual review), (4) Examples of \"dirty\" data this should catch, and (5) The clean output format. Make it bulletproof for common user input errors.","example":"Data type: Phone numbers (US)\nInput examples: \"(555) 123-4567\", \"555-123-4567\", \"5551234567\", \"+1 555 123 4567\"\n\nCleaning workflow:\n1. Formatter: Text → Remove Special Characters (keep only digits)\n   Input: {{phone_raw}} → Output: \"5551234567\"\n2. Formatter: Text → Extract Pattern (digits only, 10 chars)\n   Input: Step 1 → Output: \"5551234567\"\n3. Filter: \n   * (Text) Length | Equals exactly | 10\n4. Path A (valid): Format to standard: (555) 123-4567\n5. Path B (invalid): Send to Google Sheets \"Invalid_Phones\" + Slack alert\n\nCatches: Too few digits, international formats, letters, special chars\nOutput: \"(555) 123-4567\" or ERROR flag","useCase":"Clean user-submitted data from forms before it enters your CRM, preventing garbage data that breaks reporting and sales outreach.","proTip":"Build a \"data quality dashboard\" in Google Sheets that logs all invalid/cleaned data. Review it monthly to spot patterns (like a form field that confuses users) and fix at the source."},{"number":20,"title":"Dynamic Field Mapping with Utilities","prompt":"I need to dynamically map fields from {{source_app}} to {{destination_app}} when field names don't match. Source fields: [list with examples]. Destination requirements: [list with examples]. Create: (1) A lookup table structure (Google Sheets or Formatter table), (2) Steps to match source fields to destination fields, (3) Handling for unmapped fields (default values or skip), (4) A way to update mappings without editing the Zap, and (5) Error handling for required fields that are missing. Make it maintainable by non-technical users.","example":"Source: Typeform (fields: \"What's your name?\", \"Email address\", \"Company size\")\nDestination: HubSpot (needs: firstname, lastname, email, company_employee_count)\n\nSetup:\n1. Create Google Sheet \"Field_Mappings\":\n   | Source_Field | Dest_Field | Transform | Default |\n   | What's your name? | firstname | split_first | - |\n   | Email address | email | lowercase | - |\n   | Company size | company_employee_count | number_only | 0 |\n\n2. Zapier steps:\n   - Lookup Spreadsheet Row: Match \"What's your name?\" → Get dest_field + transform\n   - Formatter: Apply transform (split, lowercase, etc.)\n   - Repeat for each field\n   - Filter: Required fields exist (email, firstname)\n   - HubSpot: Create Contact (using mapped fields)\n\n3. Updates: Marketing team edits Google Sheet, no Zap changes needed","useCase":"When integrating apps with different field schemas, or when you need flexible mappings that business users can adjust without developer help.","proTip":"Add a \"version\" column to your mapping sheet and include it in Slack notifications. When mappings change, the team knows data structure shifted."},{"number":21,"title":"Zapier Tables as Database","prompt":"Design a Zapier Tables schema to use as a lightweight database for [describe your use case]. Define: (1) Table name and purpose, (2) Column names with data types (text, number, date, boolean), (3) Which column(s) should be unique/required, (4) Relationships to other tables if needed (foreign keys), (5) Common queries/lookups you'll perform, and (6) How you'll handle updates vs. creates (upsert logic). Keep it simple—Tables isn't a full database, so avoid complex relationships.","example":"Use case: Lead tracking and routing\n\nTable: \"Leads\"\nColumns:\n- email (text, unique, required) ← primary identifier\n- name (text, required)\n- company (text)\n- status (text: new/contacted/qualified/closed) ← default \"new\"\n- assigned_to (text) ← salesperson email\n- source (text) ← where they came from\n- score (number) ← calculated lead score\n- created_at (date)\n- last_contact (date)\n\nQueries:\n- Find by email (check if lead exists before creating duplicate)\n- Find by status (route new leads)\n- Find by assigned_to (distribute evenly)\n\nUpsert logic: Search for email → If exists: update status/score → If not: create new\n\nNo relationships needed (keep it simple)","useCase":"Store automation state, manage queues, track assignments, or hold reference data without paying for a full database like Airtable or Postgres.","proTip":"Use Zapier Tables for automation logic (statuses, queues, locks) and Airtable for human-facing data (dashboards, reporting). Tables is faster for Zap lookups but has no UI for non-Zapier users."},{"number":22,"title":"Zapier Interfaces Form to Workflow","prompt":"Design a Zapier Interface (form) that triggers a workflow. Form purpose: [describe]. Create: (1) Form field definitions (field name, type, required/optional, validation rules), (2) Conditional field logic (show field X only if Y is selected), (3) The Zap workflow triggered on form submission, (4) Confirmation message/page shown to user, (5) How data is stored/routed after submission, and (6) Who should have access to the form (public URL, password, domain restriction). Make it user-friendly for non-technical users.","example":"Form: \"PTO Request Submission\"\n\nFields:\n1. Employee Name (text, required)\n2. Email (email, required, must end with @company.com)\n3. PTO Type (dropdown: Vacation, Sick, Personal) - required\n4. Start Date (date, required, must be future date)\n5. End Date (date, required, must be after start date)\n6. Manager (dropdown: pulled from Google Sheet \"Employees\") - required\n7. Notes (long text, optional)\n8. Conditional: If PTO Type = \"Sick\" → show \"Doctor's Note Required?\" (yes/no)\n\nWorkflow on submit:\n1. Create row in Google Sheets \"PTO_Requests\"\n2. Send Slack message to selected manager with approval buttons\n3. Send confirmation email to employee\n\nConfirmation: \"Your request has been submitted! {{manager}} will review it within 24 hours.\"\n\nAccess: Company domain only (@company.com emails)","useCase":"Replace static forms (Typeform, Google Forms) with forms that directly trigger sophisticated automation workflows, keeping everything in Zapier.","proTip":"Use Interfaces for internal tools (employee portals, request forms) where you need tight integration with Zapier workflows. Use Typeform for public forms with better design flexibility."},{"number":23,"title":"Approval Workflow with Interfaces","prompt":"Build an approval workflow using Zapier Interfaces (Tables + Forms). Process: [describe what needs approval]. Design: (1) Tables schema to store pending approvals, (2) Initial form to submit request, (3) Notification to approver (email/Slack) with link to approval interface, (4) Approval interface (shows request details + approve/deny buttons), (5) Workflow for both outcomes (approved → do X, denied → do Y), (6) Audit trail (who approved, when, why), and (7) Timeout logic (auto-escalate if no response in X days).","example":"Process: Expense report approval (>\\$500 needs manager approval)\n\nTables:\n- \"Expense_Requests\" (id, employee, amount, category, receipt_url, status, submitted_date)\n- \"Approvals\" (request_id, approver, decision, timestamp, notes)\n\nFlow:\n1. Employee submits form → Creates row in Expense_Requests (status: pending)\n2. If amount > \\$500 → Slack message to manager: \"New expense to review: [link to approval page]\"\n3. Approval page (Interface): Shows expense details, receipt image, approve/deny buttons + notes field\n4. On approve: \n   - Update status to \"approved\"\n   - Create approval record\n   - Trigger payment in Bill.com\n   - Notify employee via email\n5. On deny:\n   - Update status to \"denied\"\n   - Create approval record (include reason)\n   - Email employee with denial reason\n6. Timeout: Daily Zap checks pending requests >3 days old → Slack escalation to senior manager","useCase":"Any approval process (expenses, PTO, content publishing, vendor contracts) where you need structured decision-making with audit trails.","proTip":"Add a \"Comments\" table (many-to-one with Requests) so approvers can ask questions before deciding. Turns the interface into a mini discussion thread for each approval."},{"number":24,"title":"Chatbot with AI + Zapier Tables","prompt":"Design a simple chatbot workflow using Zapier. Platform: [Slack/Discord/SMS/etc.]. Purpose: [describe what the bot does]. Architecture: (1) Trigger (new message in channel/DM), (2) Zapier Tables to store conversation state/history, (3) ChatGPT/Claude to generate responses, (4) Response delivery, (5) How to handle context (remember previous messages), (6) Commands the bot should recognize (like \"/help\" or \"/reset\"), and (7) Fallback for questions it can't answer. Keep latency under 5 seconds per response.","example":"Platform: Slack DM\nPurpose: IT helpdesk bot (password resets, access requests)\n\nFlow:\n1. Trigger: New Slack DM to @ITBot\n2. Lookup Zapier Tables \"Conversations\" by user_id → get conversation_history\n3. Append new message to history\n4. Detect commands:\n   - \"/reset\" → Clear history, respond \"Starting fresh!\"\n   - \"/human\" → Alert IT team, respond \"Connecting you to a human...\"\n5. If no command → Send to ChatGPT:\n   Prompt: \"You're an IT helpdesk assistant. History: {{conversation_history}}. New message: {{message}}. \n   If it's a password reset: return 'PASSWORD_RESET_FLOW'. \n   If access request: return 'ACCESS_REQUEST_FLOW'.\n   Otherwise: provide helpful answer in <100 words.\"\n6. If response = \"PASSWORD_RESET_FLOW\" → Trigger separate password reset Zap\n7. Else → Send ChatGPT response to Slack\n8. Update conversation_history in Tables (keep last 10 messages)\n9. Timeout: Clear history after 1 hour of inactivity","useCase":"Automate first-line support, FAQs, or internal IT/HR questions with a conversational interface that feels natural but routes to workflows when needed.","proTip":"Don't try to make your Zapier chatbot handle everything. Use it for triage—answer simple questions, route complex ones to humans or specialized Zaps. It's a router, not a replacement for support staff."},{"number":25,"title":"Multi-Page Interface App","prompt":"Design a multi-page Zapier Interface app for [describe use case]. Pages needed: [list]. For each page, define: (1) Purpose and who accesses it, (2) Data source (which Tables or external APIs), (3) Components (tables, charts, forms, buttons), (4) Actions available (edit, delete, approve, etc.), (5) Navigation between pages, and (6) Permissions (role-based access if applicable). Make it a cohesive app, not just disconnected forms.","example":"App: \"Sales Lead Management Portal\"\n\nPages:\n1. **Dashboard** (all sales team)\n   - Purpose: Overview of lead pipeline\n   - Data: Zapier Tables \"Leads\" aggregated by status\n   - Components: 4 metric cards (New/Contacted/Qualified/Closed counts), bar chart of leads by source, table of \"My Open Leads\"\n   - Actions: Click lead → go to Lead Detail page\n   - Navigation: Top menu (Dashboard | My Leads | All Leads | Settings)\n\n2. **Lead Detail** (owner + managers)\n   - Purpose: View/edit single lead\n   - Data: Single row from \"Leads\" table\n   - Components: Form (pre-filled), timeline of activities, notes section\n   - Actions: Update status, reassign, add note, mark as closed\n   - Navigation: Back to Dashboard, Next/Previous lead\n\n3. **All Leads** (managers only)\n   - Purpose: Manage team's leads\n   - Data: All leads from \"Leads\" table, filterable\n   - Components: Searchable/sortable table, filters (status, assigned_to, source)\n   - Actions: Bulk reassign, export to CSV, delete\n   - Navigation: Click row → Lead Detail\n\n4. **Settings** (admins only)\n   - Purpose: Configure lead sources, statuses, team members\n   - Data: \"Config\" table\n   - Components: Editable lists, add/remove buttons\n   - Actions: Add source, edit status names, manage users","useCase":"Build internal tools (CRM, inventory, project management, ticketing) without coding, replacing spreadsheet-based workflows with proper apps.","proTip":"Start with Tables + simple forms, then gradually add pages as users request features. Don't over-engineer v1—ship a working MVP and iterate based on real usage."}]},{"file":"04-api-integration.md","name":"API Integration & Planning","icon":"🔌","desc":"REST API design, auth, webhooks","prompts":[{"number":1,"title":"API Endpoint Design","prompt":"Act as an API architect. I need to design a REST API for [describe your system/service]. Resources to expose: [list entities like users, orders, products]. For each resource, specify: (1) RESTful endpoint paths (with proper pluralization), (2) HTTP methods (GET/POST/PUT/PATCH/DELETE) and what they do, (3) URL parameters vs. body parameters, (4) Expected request/response formats (JSON structure), (5) Status codes for success/error scenarios, and (6) Any nested resources or relationships. Follow REST best practices.","example":"Resource: Orders\n\nEndpoints:\n- GET /api/v1/orders → List all orders (paginated)\n  Query params: ?page=1&limit=20&status=pending\n  Response: 200 {orders: [...], total: 150, page: 1}\n  \n- GET /api/v1/orders/:id → Get single order\n  Response: 200 {order: {...}} | 404 {error: \"Order not found\"}\n  \n- POST /api/v1/orders → Create new order\n  Body: {customer_id, items: [{product_id, quantity}], shipping_address}\n  Response: 201 {order: {...}} | 400 {error: \"Invalid items\"}\n  \n- PATCH /api/v1/orders/:id → Update order (partial)\n  Body: {status: \"shipped\", tracking_number: \"...\"}\n  Response: 200 {order: {...}} | 404/400\n  \n- DELETE /api/v1/orders/:id → Cancel order\n  Response: 204 (no content) | 404 | 409 {error: \"Cannot cancel shipped order\"}\n  \n- GET /api/v1/orders/:id/items → Get order items (nested resource)","useCase":"Planning a new API or documenting an existing one to ensure consistency, clarity, and proper REST conventions.","proTip":"Always version your API (/v1/, /v2/) from day one. When you need to make breaking changes, you'll thank yourself for this foresight."},{"number":2,"title":"API Documentation Generator","prompt":"Generate comprehensive API documentation for this endpoint. Endpoint: {{method}} {{path}}. Provide: (1) A clear description of what it does, (2) Authentication requirements, (3) Request format with parameter table (name, type, required, description, example), (4) All possible response codes with example JSON, (5) Rate limiting info, (6) A complete cURL example, and (7) Common error scenarios and how to handle them. Format as Markdown suitable for developer portals.","example":"## POST /api/v1/webhooks/subscribe\n\n**Description:** Subscribe to webhook events for real-time notifications.\n\n**Authentication:** API Key in header: \\`Authorization: Bearer YOUR_API_KEY\\`\n\n**Request Parameters:**\n| Parameter | Type | Required | Description | Example |\n|-----------|------|----------|-------------|---------|\n| url | string | Yes | HTTPS endpoint to receive webhooks | https://example.com/hook |\n| events | array | Yes | Event types to subscribe to | [\"order.created\", \"order.shipped\"] |\n| secret | string | No | Secret for signature verification | \"whsec_abc123...\" |\n\n**Responses:**\n- **201 Created**\n\\`\\`\\`json\n{\n  \"subscription_id\": \"sub_abc123\",\n  \"url\": \"https://example.com/hook\",\n  \"events\": [\"order.created\"],\n  \"created_at\": \"2024-01-15T10:30:00Z\"\n}\n\\`\\`\\`\n\n- **400 Bad Request** - Invalid URL or events\n- **401 Unauthorized** - Missing/invalid API key\n- **429 Too Many Requests** - Rate limit exceeded (max 100/hour)\n\n**cURL Example:**\n\\`\\`\\`bash\ncurl -X POST https://api.example.com/v1/webhooks/subscribe \\\\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\\\n  -H \"Content-Type: application/json\" \\\\\n  -d '{\"url\":\"https://example.com/hook\",\"events\":[\"order.created\"]}'\n\\`\\`\\`","useCase":"Create developer-friendly documentation that reduces support questions and accelerates API adoption.","proTip":"Include a \"Try It\" interactive section in your docs using tools like Swagger/OpenAPI. Developers can test your API right in the browser without writing code."},{"number":3,"title":"API Error Response Schema","prompt":"Design a consistent error response schema for my API. Requirements: (1) A standard JSON structure for all errors, (2) Fields that help developers debug (error code, message, details), (3) HTTP status code to JSON error mapping, (4) Human-readable messages AND machine-readable codes, (5) Optional debugging info (request_id, docs_url), and (6) Examples for common scenarios (validation errors, auth failures, rate limits, server errors). Make it developer-friendly and consistent.","example":"**Standard Error Schema:**\n\\`\\`\\`json\n{\n  \"error\": {\n    \"code\": \"VALIDATION_ERROR\",\n    \"message\": \"One or more fields are invalid\",\n    \"status\": 400,\n    \"details\": [\n      {\n        \"field\": \"email\",\n        \"issue\": \"Invalid email format\",\n        \"value\": \"notanemail\"\n      }\n    ],\n    \"request_id\": \"req_abc123\",\n    \"docs_url\": \"https://docs.example.com/errors#validation-error\"\n  }\n}\n\\`\\`\\`\n\n**Common Scenarios:**\n\n400 Validation Error: code=\"VALIDATION_ERROR\", details array with field-level errors\n401 Unauthorized: code=\"INVALID_TOKEN\", message=\"API key is invalid or expired\"\n403 Forbidden: code=\"INSUFFICIENT_PERMISSIONS\", message=\"Your plan doesn't include this feature\"\n404 Not Found: code=\"RESOURCE_NOT_FOUND\", message=\"Order #12345 not found\"\n429 Rate Limited: code=\"RATE_LIMIT_EXCEEDED\", message=\"Max 100 requests/hour\", includes retry_after header\n500 Server Error: code=\"INTERNAL_ERROR\", message=\"Something went wrong\", request_id for support","useCase":"Standardize error handling across your entire API, making it easier for developers to catch and handle errors programmatically.","proTip":"Always include a \\`request_id\\` in error responses. When developers contact support, you can use it to trace exactly what went wrong in your logs."},{"number":4,"title":"API Versioning Strategy","prompt":"Design an API versioning strategy for my service. Context: [describe your API and expected changes over time]. Decide: (1) Versioning method (URL path /v1/, header, query param), (2) What constitutes a breaking change requiring a new version, (3) How long to support old versions (deprecation policy), (4) How to communicate deprecations to users, (5) Backwards-compatible vs. breaking change examples, and (6) Migration guides when versions change. Balance stability for existing users with innovation.","example":"**Method:** URL path versioning (\\`/api/v1/\\`, \\`/api/v2/\\`)\n- Pros: Explicit, clear, easy to test different versions\n- Cons: Requires routing logic for each version\n\n**Breaking Changes (require new version):**\n- Removing an endpoint or field\n- Changing field data types (string → number)\n- Changing authentication method\n- Renaming fields or endpoints\n- Changing error response structure\n\n**Non-Breaking (can add to current version):**\n- Adding new optional fields\n- Adding new endpoints\n- Adding new query parameters (optional)\n- Expanding enum values (if clients don't validate)\n\n**Deprecation Policy:**\n- New version announced 3 months in advance\n- Old version supported for 12 months after deprecation\n- Emails at 90 days, 30 days, 7 days before shutdown\n- Header in responses: \\`X-API-Deprecated: true; sunset=2024-12-31\\`\n\n**Migration Guide:**\n- Side-by-side comparison table of changes\n- Code examples for v1 → v2\n- Automated migration tool/script if possible","useCase":"Plan for API evolution without breaking existing integrations, maintaining trust with developers while enabling improvements.","proTip":"Operate v1 and v2 simultaneously during the transition period. Use feature flags to gradually roll out v2 to select users before forcing everyone to migrate."},{"number":5,"title":"API Request/Response Schema Validator","prompt":"Create a JSON Schema definition for validating API requests and responses. Resource: {{resource_name}}. Include: (1) Schema for POST/PUT request body with field types, required/optional, validation rules (min/max, pattern, enum), (2) Schema for response body, (3) Nested object and array handling, (4) Examples of valid and invalid payloads, and (5) How to use this schema in API docs and validation middleware. Use JSON Schema Draft 7 format.","example":"**Resource: Create Product**\n\nRequest Schema:\n\\`\\`\\`json\n{\n  \"\\$schema\": \"http://json-schema.org/draft-07/schema#\",\n  \"type\": \"object\",\n  \"required\": [\"name\", \"price\", \"sku\"],\n  \"properties\": {\n    \"name\": {\n      \"type\": \"string\",\n      \"minLength\": 3,\n      \"maxLength\": 200,\n      \"description\": \"Product name\"\n    },\n    \"price\": {\n      \"type\": \"number\",\n      \"minimum\": 0.01,\n      \"multipleOf\": 0.01,\n      \"description\": \"Price in USD\"\n    },\n    \"sku\": {\n      \"type\": \"string\",\n      \"pattern\": \"^[A-Z0-9-]+\\$\",\n      \"description\": \"Stock keeping unit\"\n    },\n    \"category\": {\n      \"type\": \"string\",\n      \"enum\": [\"electronics\", \"clothing\", \"home\", \"other\"]\n    },\n    \"tags\": {\n      \"type\": \"array\",\n      \"items\": {\"type\": \"string\"},\n      \"maxItems\": 10\n    },\n    \"variants\": {\n      \"type\": \"array\",\n      \"items\": {\n        \"type\": \"object\",\n        \"required\": [\"size\", \"stock\"],\n        \"properties\": {\n          \"size\": {\"type\": \"string\"},\n          \"stock\": {\"type\": \"integer\", \"minimum\": 0}\n        }\n      }\n    }\n  }\n}\n\\`\\`\\`\n\n**Valid:** \\`{\"name\": \"T-Shirt\", \"price\": 19.99, \"sku\": \"TS-001\", \"tags\": [\"cotton\", \"sale\"]}\\`\n**Invalid:** \\`{\"name\": \"AB\", \"price\": -5}\\` (name too short, negative price, missing SKU)","useCase":"Auto-validate API requests before processing, returning clear validation errors and preventing bad data from entering your system.","proTip":"Use your JSON Schemas to auto-generate API documentation, client SDKs, and validation code. Write once, use everywhere."},{"number":6,"title":"OAuth 2.0 Flow Design","prompt":"Design an OAuth 2.0 implementation for my API. Context: [describe your service and why users need to connect]. Specify: (1) Which OAuth flow to use (Authorization Code, Client Credentials, etc.) and why, (2) Scopes to define (what permissions users can grant), (3) The complete flow with URLs and redirects, (4) Token expiration and refresh strategy, (5) Security considerations (PKCE, state parameter), and (6) Example code for the authorization redirect and token exchange. Make it production-ready and secure.","example":"**Flow:** Authorization Code with PKCE (for web/mobile apps)\n\n**Scopes:**\n- \\`read:orders\\` - View order history\n- \\`write:orders\\` - Create and modify orders\n- \\`read:profile\\` - View user profile\n- \\`admin\\` - Full account access\n\n**Flow Steps:**\n1. **User clicks \"Connect\"** → Your app redirects to:\n\\`\\`\\`\nhttps://api.yourservice.com/oauth/authorize?\n  response_type=code&\n  client_id=YOUR_CLIENT_ID&\n  redirect_uri=https://yourapp.com/callback&\n  scope=read:orders write:orders&\n  state=random_csrf_token&\n  code_challenge=BASE64URL(SHA256(code_verifier))&\n  code_challenge_method=S256\n\\`\\`\\`\n\n2. **User approves** → Redirected back to your app:\n\\`\\`\\`\nhttps://yourapp.com/callback?code=AUTH_CODE&state=random_csrf_token\n\\`\\`\\`\n\n3. **Exchange code for token:**\n\\`\\`\\`bash\ncurl -X POST https://api.yourservice.com/oauth/token \\\\\n  -d client_id=YOUR_CLIENT_ID \\\\\n  -d code=AUTH_CODE \\\\\n  -d redirect_uri=https://yourapp.com/callback \\\\\n  -d code_verifier=ORIGINAL_VERIFIER \\\\\n  -d grant_type=authorization_code\n\\`\\`\\`\n\nResponse:\n\\`\\`\\`json\n{\n  \"access_token\": \"eyJ0eXAi...\",\n  \"token_type\": \"Bearer\",\n  \"expires_in\": 3600,\n  \"refresh_token\": \"eyJ0eXAi...\",\n  \"scope\": \"read:orders write:orders\"\n}\n\\`\\`\\`\n\n4. **Use token:** \\`Authorization: Bearer ACCESS_TOKEN\\`\n\n5. **Refresh:** Exchange refresh_token for new access_token when expired\n\n**Security:**\n- PKCE prevents code interception\n- State parameter prevents CSRF\n- Short access token expiry (1 hour), long refresh token (30 days)\n- HTTPS only for all OAuth URLs","useCase":"Allow users to securely connect your service to third-party apps without sharing passwords (like \"Sign in with Google\").","proTip":"Never store access tokens in localStorage (vulnerable to XSS). Use httpOnly cookies or in-memory storage with refresh tokens in secure cookies."},{"number":7,"title":"API Key Management System","prompt":"Design an API key authentication system. Requirements: (1) How API keys are generated (format, entropy), (2) Storage strategy (hashing, encryption), (3) Key rotation and revocation process, (4) Rate limiting per key, (5) Usage tracking and analytics, (6) Security best practices (prefix for identification, last-used tracking), and (7) User-facing UI for key management (create, view, delete, rotate). Make it secure and user-friendly.","example":"**Key Format:**\n- Prefix for identification: \\`sk_live_\\` (production) or \\`sk_test_\\` (testing)\n- Random component: 32 characters (base62 for URL-safety)\n- Full key: \\`sk_example_REPLACE\\`\n\n**Generation:**\n\\`\\`\\`javascript\nconst prefix = environment === 'production' ? 'sk_live_' : 'sk_test_';\nconst randomBytes = crypto.randomBytes(24); // 192 bits\nconst apiKey = prefix + randomBytes.toString('base64url');\n\\`\\`\\`\n\n**Storage:**\n- Store SHA-256 hash of full key (never plaintext)\n- Show full key ONCE at creation (user must save it)\n- Store prefix in plaintext for filtering/display\n\n**Security Features:**\n- Rate limit: 1000 requests/hour per key (configurable)\n- IP whitelist (optional)\n- Expiration date (optional)\n- Last used timestamp (detect unused keys)\n- Automatic rotation reminder (every 90 days)\n\n**User Dashboard:**\n- List keys: shows prefix (sk_live_xxx...xxx), name, created date, last used, status\n- Create new: Name → generates key → show ONCE with \"Copy\" button\n- Rotate: Generates new key, marks old as \"deprecated\" for 30 days\n- Delete: Immediate revocation","useCase":"Provide simple, secure authentication for server-to-server integrations where OAuth is overkill.","proTip":"Add a \"name\" field when creating keys (like \"Production Server\" or \"Staging Environment\"). Users with multiple keys will thank you."},{"number":8,"title":"JWT Token Structure Design","prompt":"Design a JWT (JSON Web Token) structure for authentication. Define: (1) Claims to include (standard + custom), (2) Token expiration strategy, (3) Signing algorithm and secret management, (4) Where tokens are stored (cookies vs. headers), (5) Refresh token pattern, (6) How to invalidate tokens (logout, security breach), and (7) Example token payload and verification code. Balance security with performance.","example":"**JWT Claims:**\n\\`\\`\\`json\n{\n  // Standard claims\n  \"iss\": \"https://api.yourservice.com\",\n  \"sub\": \"user_12345\",\n  \"aud\": \"yourservice-api\",\n  \"exp\": 1704981600,\n  \"iat\": 1704978000,\n  \"jti\": \"token_unique_id\",\n  \n  // Custom claims\n  \"email\": \"user@example.com\",\n  \"role\": \"admin\",\n  \"permissions\": [\"read:all\", \"write:all\"],\n  \"plan\": \"premium\"\n}\n\\`\\`\\`\n\n**Strategy:**\n- **Access token:** Short-lived (15 min), contains user info, stored in memory\n- **Refresh token:** Long-lived (7 days), stored in httpOnly cookie\n- **Algorithm:** RS256 (asymmetric) for production (public key can verify, only server can sign)\n\n**Token Flow:**\n1. Login → Return access + refresh tokens\n2. API requests → \\`Authorization: Bearer ACCESS_TOKEN\\`\n3. Access expires → Use refresh token to get new access token\n4. Refresh expires → Full re-authentication required\n\n**Invalidation:**\n- Maintain a \"revoked tokens\" cache (Redis) with TTL = token expiry\n- On logout: Add jti to revoked list\n- On token validation: Check revoked list\n- Security breach: Rotate signing secret (invalidates all tokens)\n\n**Verification (Node.js):**\n\\`\\`\\`javascript\nconst jwt = require('jsonwebtoken');\nconst publicKey = fs.readFileSync('public.pem');\n\ntry {\n  const decoded = jwt.verify(token, publicKey, {\n    algorithms: ['RS256'],\n    issuer: 'https://api.yourservice.com',\n    audience: 'yourservice-api'\n  });\n  // Token valid, use decoded.sub (user ID)\n} catch (err) {\n  // Token invalid, expired, or revoked\n}\n\\`\\`\\`","useCase":"Modern web/mobile app authentication with stateless tokens that can be verified without database lookups.","proTip":"Don't put sensitive data in JWTs—they're base64 encoded, not encrypted. Anyone with the token can read the payload. Only include data you'd be okay exposing."},{"number":9,"title":"Multi-Tenant API Authentication","prompt":"Design authentication for a multi-tenant SaaS API. Context: [describe your SaaS product]. Define: (1) How to identify which tenant a request belongs to (subdomain, header, token claim), (2) Tenant isolation strategy (separate databases, shared with tenant_id column), (3) API key scoping (per-tenant or per-user), (4) Admin vs. user permissions within a tenant, (5) Cross-tenant access prevention, and (6) Handling tenant switching for users who belong to multiple tenants. Ensure strict data isolation.","example":"**Tenant Identification:**\n- Method: Subdomain + JWT claim validation\n- Request to \\`https://acme.yourservice.com/api/...\\` → extracts \"acme\" as tenant\n- JWT must include \\`\"tenant\": \"acme\"\\` claim\n- Server validates: JWT tenant matches subdomain (prevents token reuse across tenants)\n\n**Data Isolation:**\n- Shared database with \\`tenant_id\\` column on every table\n- Row-level security: All queries automatically filtered by tenant_id\n- DB user has restricted access via \\`SET app.current_tenant = 'acme'\\`\n\n**API Key Scoping:**\n- Keys are per-tenant: \\`sk_acme_live_...\\`\n- Each key associated with tenant_id in database\n- Key format includes tenant for quick validation\n- Users can have different roles per tenant\n\n**Permissions:**\n\\`\\`\\`json\n{\n  \"user_id\": \"user_123\",\n  \"tenant\": \"acme\",\n  \"role\": \"admin\",  // within this tenant\n  \"permissions\": [\"users:read\", \"users:write\", \"billing:read\"]\n}\n\\`\\`\\`\n\n**Tenant Switching:**\n- User belongs to multiple tenants: stored in \\`user_tenants\\` table\n- After login, user selects tenant → new JWT issued with that tenant claim\n- UI provides tenant switcher → re-authenticates with new tenant context\n\n**Cross-Tenant Prevention:**\n- Every API endpoint validates: req.tenant === jwt.tenant === resource.tenant_id\n- Database queries: WHERE tenant_id = :current_tenant (enforced at ORM level)\n- Logging: All actions tagged with tenant_id for audit","useCase":"Build a SaaS platform where multiple companies use your service and their data must never mix (like Slack, Shopify, or HubSpot).","proTip":"Use tenant_id as a partition key in your database for better performance and to enable per-tenant backups/exports if needed."},{"number":10,"title":"Webhook Signature Verification","prompt":"Design a webhook signature system so recipients can verify requests are from your service. Specify: (1) Signature algorithm (HMAC-SHA256, etc.), (2) What data to include in signature (body, timestamp, etc.), (3) Header format for sending signature, (4) Timestamp validation to prevent replay attacks, (5) Secret sharing and rotation process, and (6) Example code for both signing (sender) and verifying (receiver). Make it secure and easy for developers to implement.","example":"**Algorithm:** HMAC-SHA256\n\n**Signature Calculation:**\n1. Create signature payload: \\`timestamp.request_body\\`\n2. Compute HMAC: \\`HMAC-SHA256(signing_secret, payload)\\`\n3. Send in header: \\`X-Webhook-Signature: t=1704978000,v1=computed_signature\\`\n\n**Sender Code (your API):**\n\\`\\`\\`javascript\nconst crypto = require('crypto');\n\nfunction signWebhook(payload, secret) {\n  const timestamp = Math.floor(Date.now() / 1000);\n  const signedPayload = \\`\\${timestamp}.\\${JSON.stringify(payload)}\\`;\n  const signature = crypto\n    .createHmac('sha256', secret)\n    .update(signedPayload)\n    .digest('hex');\n  \n  return {\n    header: \\`t=\\${timestamp},v1=\\${signature}\\`,\n    timestamp\n  };\n}\n\n// Send webhook\nconst payload = {event: 'order.created', data: {...}};\nconst {header, timestamp} = signWebhook(payload, webhook.secret);\n\nfetch(webhook.url, {\n  method: 'POST',\n  headers: {\n    'Content-Type': 'application/json',\n    'X-Webhook-Signature': header\n  },\n  body: JSON.stringify(payload)\n});\n\\`\\`\\`\n\n**Receiver Code (customer):**\n\\`\\`\\`javascript\nfunction verifyWebhook(body, signature, secret) {\n  const [t, v1] = signature.split(',').map(p => p.split('=')[1]);\n  const timestamp = parseInt(t);\n  \n  // Prevent replay attacks (reject older than 5 minutes)\n  const now = Math.floor(Date.now() / 1000);\n  if (Math.abs(now - timestamp) > 300) {\n    throw new Error('Webhook timestamp too old');\n  }\n  \n  // Verify signature\n  const signedPayload = \\`\\${timestamp}.\\${body}\\`;\n  const expectedSignature = crypto\n    .createHmac('sha256', secret)\n    .update(signedPayload)\n    .digest('hex');\n  \n  if (v1 !== expectedSignature) {\n    throw new Error('Invalid signature');\n  }\n  \n  return true;\n}\n\\`\\`\\`\n\n**Secret Management:**\n- Generate unique secret per webhook subscription\n- Display secret only once at creation (like API keys)\n- Provide rotation endpoint: generates new secret, returns both old and new for transition period","useCase":"Ensure webhook receivers can trust that requests actually came from your service and haven't been tampered with.","proTip":"Include the timestamp in the signature to prevent replay attacks. Without it, an attacker could intercept a webhook and replay it endlessly."},{"number":11,"title":"Webhook Event Schema Design","prompt":"Design webhook event payloads for my service. Events to support: [list]. For each event, define: (1) Event name/type (naming convention), (2) Payload structure (what data to include), (3) Metadata fields (id, timestamp, api_version), (4) Nested vs. flat structure decision, (5) Sensitive data handling (PII, secrets), and (6) Example JSON for each event. Make payloads consistent across all events.","example":"**Naming Convention:** \\`resource.action\\` (e.g., \\`order.created\\`, \\`customer.updated\\`, \\`payment.failed\\`)\n\n**Common Envelope:**\n\\`\\`\\`json\n{\n  \"id\": \"evt_1A2B3C4D5E\",\n  \"type\": \"order.created\",\n  \"created_at\": \"2024-01-15T10:30:00Z\",\n  \"api_version\": \"2024-01-01\",\n  \"data\": {\n    // Event-specific payload\n  }\n}\n\\`\\`\\`\n\n**Event Examples:**\n\n**order.created**\n\\`\\`\\`json\n{\n  \"id\": \"evt_123\",\n  \"type\": \"order.created\",\n  \"created_at\": \"2024-01-15T10:30:00Z\",\n  \"api_version\": \"2024-01-01\",\n  \"data\": {\n    \"order_id\": \"ord_456\",\n    \"customer\": {\n      \"id\": \"cus_789\",\n      \"email\": \"customer@example.com\",\n      \"name\": \"John Doe\"\n    },\n    \"items\": [\n      {\n        \"product_id\": \"prod_111\",\n        \"name\": \"Widget\",\n        \"quantity\": 2,\n        \"price\": 19.99\n      }\n    ],\n    \"total\": 39.98,\n    \"status\": \"pending\",\n    \"created_at\": \"2024-01-15T10:30:00Z\"\n  }\n}\n\\`\\`\\`\n\n**payment.failed**\n\\`\\`\\`json\n{\n  \"id\": \"evt_124\",\n  \"type\": \"payment.failed\",\n  \"created_at\": \"2024-01-15T10:35:00Z\",\n  \"api_version\": \"2024-01-01\",\n  \"data\": {\n    \"payment_id\": \"pay_999\",\n    \"order_id\": \"ord_456\",\n    \"amount\": 39.98,\n    \"currency\": \"USD\",\n    \"failure_reason\": \"insufficient_funds\",\n    \"card_last4\": \"4242\",\n    \"retry_allowed\": true\n  }\n}\n\\`\\`\\`\n\n**Sensitive Data:**\n- Never include full credit card numbers, SSNs, passwords\n- Include IDs, not full PII (receiver can fetch details via API if needed)\n- Use last4 digits for cards, masked email (user@***.com) if necessary","useCase":"Define what data to send in webhooks so consumers know exactly what to expect and can parse events reliably.","proTip":"Send minimal data in webhooks (IDs + key fields only). If the receiver needs full details, they can call your API. This keeps webhooks small and reduces PII exposure."},{"number":12,"title":"Webhook Retry Logic","prompt":"Design a webhook retry strategy for failed deliveries. Specify: (1) Retry schedule (how many attempts, delays between), (2) Success criteria (200-299 status codes?), (3) What happens after max retries (dead letter queue, alert, disable), (4) Exponential backoff strategy, (5) How receivers can manually retry, and (6) Logging/alerting for failed webhooks. Balance persistence with avoiding overwhelming failing endpoints.","example":"**Retry Schedule:**\n- Initial attempt: immediate\n- Retry 1: after 5 seconds\n- Retry 2: after 25 seconds (5 × 5)\n- Retry 3: after 125 seconds (25 × 5)\n- Retry 4: after 625 seconds (~10 min)\n- Retry 5: after 3125 seconds (~52 min)\n- Retry 6: after 15625 seconds (~4.3 hours)\n- **Total:** 7 attempts over ~5 hours\n\n**Success Criteria:**\n- HTTP status 200-299 = success, stop retrying\n- 400-499 = client error, stop retrying (won't succeed without changes)\n- 500-599 or timeout = server error, continue retrying\n\n**Exponential Backoff:**\n\\`\\`\\`javascript\nconst delay = Math.min(\n  baseDelay × (2 ** attemptNumber),\n  maxDelay  // cap at 1 hour\n);\n\\`\\`\\`\n\n**After Max Retries:**\n- Move to \"Failed Webhooks\" table (dead letter queue)\n- Send email to webhook owner: \"Webhook failed after 7 attempts\"\n- Disable webhook if failure rate > 90% over 24 hours\n- Provide manual retry button in dashboard\n\n**Logging:**\n- Log every attempt: timestamp, status code, response time, error message\n- Dashboard: Show recent deliveries with status (✅ success, ⚠️ retrying, ❌ failed)\n- Alerts: Slack notification if webhook consistently failing (3+ failures in row)\n\n**Manual Retry:**\n- Webhook dashboard: \"Failed Deliveries\" tab\n- Each event: \"Retry Now\" button → immediate re-send\n- Bulk action: \"Retry All\" for mass re-send","useCase":"Ensure webhooks are reliably delivered even when recipient servers have temporary issues, without spamming failing endpoints forever.","proTip":"Add jitter to your retry delays (random ±10%) to prevent \"thundering herd\" if many webhooks failed simultaneously."},{"number":13,"title":"Webhook Testing & Debugging Tools","prompt":"Design webhook testing features for developers. Include: (1) Test webhook endpoint (send fake event to their URL), (2) Webhook request inspector (show exact HTTP request/response), (3) Replay functionality (resend past events), (4) Local development support (ngrok-style tunneling or test URLs), (5) Sample event library (copy-paste example payloads), and (6) Webhook verification guide. Make it easy for developers to test before going live.","example":"**Test Endpoint Feature:**\n- Dashboard: \"Send Test Event\" button\n- User selects event type (order.created, payment.failed, etc.)\n- Option to customize payload or use default\n- Click \"Send\" → fires webhook immediately\n- Shows result: status code, response body, delivery time\n\n**Request Inspector:**\n- Every webhook logged in dashboard\n- Click to expand: full HTTP request\n\\`\\`\\`\nPOST /webhook HTTP/1.1\nHost: customer.com\nContent-Type: application/json\nX-Webhook-Signature: t=123,v1=abc...\nX-Event-Type: order.created\n\n{\"id\": \"evt_123\", \"type\": \"order.created\", ...}\n\\`\\`\\`\n- Response captured:\n\\`\\`\\`\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{\"received\": true}\n\\`\\`\\`\n\n**Replay:**\n- Any past webhook: \"Resend\" button\n- Useful for debugging or re-triggering after fixing receiver bug\n- Same signature, new timestamp\n\n**Local Development:**\n- Provide webhook.site-style public URL: \\`https://inspect.yourservice.com/user123\\`\n- Events sent there appear in real-time dashboard\n- Great for testing before deploying to production\n\n**Sample Events Library:**\n\\`\\`\\`json\n// Copy-paste examples for every event type\n{\n  \"order.created\": {...},\n  \"customer.updated\": {...},\n  \"payment.failed\": {...}\n}\n\\`\\`\\`\n\n**Verification Guide:**\n\\`\\`\\`\n1. Copy your webhook secret: whsec_abc123\n2. Use this code to verify signatures:\n   [insert code example]\n3. Send a test event to confirm it works\n\\`\\`\\`","useCase":"Reduce support burden by giving developers everything they need to test and debug webhooks independently.","proTip":"Provide a CLI tool (npm package) that starts a local webhook receiver and tunnels it to your service for testing. Developers love this."},{"number":14,"title":"Webhook Security Best Practices","prompt":"Outline webhook security measures for both sender and receiver. Cover: (1) Signature verification (mandatory or optional?), (2) HTTPS enforcement, (3) IP whitelisting options, (4) Rate limiting per endpoint, (5) Timeout handling, (6) Preventing webhook abuse (loops, DDoS), and (7) Receiver best practices guide. Make webhooks secure by default.","example":"**Sender Security (your API):**\n\n1. **HTTPS Only:** Reject webhook URLs using http://\n2. **Signatures:** Always include HMAC signature (make verification mandatory in docs)\n3. **Timeouts:** 10-second timeout per webhook (prevent hanging on slow receivers)\n4. **Rate Limiting:** Max 100 webhooks/second per subscriber (prevent abuse)\n5. **IP Whitelisting:** Optional feature—subscribers can restrict source IPs\n6. **Retry Limits:** Max 7 attempts (prevent infinite retry loops)\n7. **Prevent Loops:** Don't trigger webhooks for actions caused by API calls from the same subscriber\n\n**Receiver Best Practices Guide:**\n\n**1. Verify Signatures (MANDATORY)**\n\\`\\`\\`javascript\n// Always verify before processing\nif (!verifySignature(request.body, request.headers['x-webhook-signature'], secret)) {\n  return res.status(401).send('Invalid signature');\n}\n\\`\\`\\`\n\n**2. Respond Quickly**\n- Return 200 OK immediately (within 3 seconds)\n- Process webhook asynchronously (queue it, don't block response)\n\\`\\`\\`javascript\napp.post('/webhook', (req, res) => {\n  // Verify signature\n  // Add to job queue\n  queue.add(req.body);\n  res.sendStatus(200);  // Respond ASAP\n});\n\\`\\`\\`\n\n**3. Use HTTPS**\n- Protect your endpoint with TLS\n- Invalid certificates → webhook delivery fails\n\n**4. Handle Duplicates**\n- Use \\`id\\` field to track processed events\n- Store in database/cache to detect duplicates\n- Webhooks may be sent multiple times (retries)\n\n**5. Validate Payload**\n- Check \\`api_version\\` to handle schema changes\n- Validate required fields exist\n- Gracefully handle unknown event types\n\n**6. Timeout Handling**\n- If your processing takes >10 seconds, acknowledge receipt first\n- Return 200, then process","useCase":"Secure your webhook system against common attacks (replay, tampering, DDoS) while providing clear guidance to receivers.","proTip":"Include a \"webhook health score\" in your dashboard showing subscribers their success rate and average response time. Publicly shame slow/failing endpoints to encourage fixes."},{"number":15,"title":"Webhook Event Filtering & Subscriptions","prompt":"Design a webhook subscription system with granular filtering. Features: (1) Event type selection (subscribe to specific events only), (2) Filtering by attributes (e.g., only orders >\\$100), (3) Subscription management API/UI, (4) Multiple webhooks per account (different URLs for different events), (5) Event preview/documentation, and (6) Subscription validation (test URL before saving). Give subscribers control over what they receive.","example":"**Subscription Model:**\n\\`\\`\\`json\n{\n  \"id\": \"sub_abc123\",\n  \"url\": \"https://customer.com/webhooks/orders\",\n  \"secret\": \"whsec_xyz789\",\n  \"events\": [\"order.created\", \"order.shipped\"],\n  \"filters\": {\n    \"order.created\": {\n      \"total\": {\"gte\": 100},  // Only orders >= \\$100\n      \"status\": {\"in\": [\"pending\", \"processing\"]}\n    }\n  },\n  \"active\": true,\n  \"created_at\": \"2024-01-15T10:00:00Z\"\n}\n\\`\\`\\`\n\n**Subscription UI:**\n- **Step 1:** Enter webhook URL\n- **Step 2:** Select events (checkboxes for all available events)\n- **Step 3:** Add filters (optional)\n  - \"Only trigger when...\" dropdowns\n  - Example: \"order total is greater than \\$100\"\n  - Multiple conditions with AND/OR logic\n- **Step 4:** Test webhook (sends sample event)\n- **Step 5:** Save\n\n**Multiple Subscriptions:**\n- User can create multiple webhooks:\n  - Webhook 1: All orders → https://erp.company.com/orders\n  - Webhook 2: High-value orders → https://crm.company.com/vip-orders\n  - Webhook 3: Failed payments → https://billing.company.com/alerts\n\n**Event Documentation:**\n- Event browser: Shows all available events with example payloads\n- Click event → See full schema + when it fires\n- \"Test this event\" button → send to your URL\n\n**URL Validation:**\n- Before saving: Send validation webhook\n\\`\\`\\`json\n{\n  \"type\": \"webhook.validation\",\n  \"url\": \"https://customer.com/webhooks\",\n  \"timestamp\": 123456789\n}\n\\`\\`\\`\n- Receiver must return 200 + echo a challenge code\n- Prevents typos in URLs","useCase":"Let sophisticated users fine-tune webhook subscriptions to receive only relevant events, reducing noise and processing costs.","proTip":"Offer webhook \"templates\" for common use cases (like \"E-commerce Essentials\" = order created/shipped/refunded). Makes setup faster for new users."},{"number":16,"title":"Rate Limiting Strategy","prompt":"Design a rate limiting system for my API. Define: (1) Rate limit tiers (per plan: free/pro/enterprise), (2) Limit dimensions (per API key, per IP, per endpoint), (3) Time windows (per second/minute/hour), (4) Response headers (X-RateLimit-*), (5) Error response when exceeded, (6) Upgrade path messaging, and (7) Bypass options for webhooks or internal services. Balance fairness with revenue.","example":"**Rate Limit Tiers:**\n\n| Plan | Requests/min | Requests/hour | Requests/day |\n|------|--------------|---------------|--------------|\n| Free | 10 | 100 | 1,000 |\n| Pro | 100 | 5,000 | 100,000 |\n| Enterprise | 1,000 | 50,000 | Unlimited |\n\n**Limiting Dimensions:**\n- Primary: By API key (per-user)\n- Secondary: By IP (prevents abuse before authentication)\n- Per-endpoint: Expensive operations (search, reports) have tighter limits\n  - Example: /search → 10/min even on Pro plan\n\n**Response Headers (on every request):**\n\\`\\`\\`\nX-RateLimit-Limit: 100\nX-RateLimit-Remaining: 87\nX-RateLimit-Reset: 1704978000\nX-RateLimit-Retry-After: 45  (when exceeded)\n\\`\\`\\`\n\n**Error Response (429 Too Many Requests):**\n\\`\\`\\`json\n{\n  \"error\": {\n    \"code\": \"RATE_LIMIT_EXCEEDED\",\n    \"message\": \"You've exceeded your plan's rate limit of 100 requests/minute\",\n    \"limit\": 100,\n    \"reset_at\": \"2024-01-15T10:45:00Z\",\n    \"retry_after\": 45,\n    \"upgrade_url\": \"https://yourservice.com/upgrade\"\n  }\n}\n\\`\\`\\`\n\n**Algorithm:** Token bucket\n- Each API key gets a bucket with N tokens\n- Each request consumes 1 token\n- Tokens refill at rate R per second\n- Burst allowance = bucket size\n\n**Bypass Options:**\n- Webhooks sent by your service: no rate limit (internal traffic)\n- Health check endpoints: /ping, /status → unlimited\n- Enterprise plan: API key tagged as \\`rate_limit_exempt\\`","useCase":"Prevent API abuse, ensure fair resource allocation, and create upgrade incentives for heavy users.","proTip":"Be generous with rate limits for new users. Let them hit real limits (90%+ of their quota) before selling upgrades. Theoretical limits no one reaches don't drive revenue."},{"number":17,"title":"Pagination Strategy Design","prompt":"Design a pagination system for list endpoints. Decide: (1) Pagination style (offset-based, cursor-based, or both), (2) Query parameters (?page=1&limit=20 or ?cursor=xxx&limit=20), (3) Response metadata (total count, next/previous URLs), (4) Default and max page sizes, (5) Sorting options, and (6) Example request/response. Consider performance for large datasets.","example":"**Pagination Style:** Cursor-based (more efficient for large datasets)\n\n**Query Parameters:**\n\\`\\`\\`\nGET /api/v1/orders?limit=20&cursor=eyJpZCI6MTIzNDU&order=desc\n\\`\\`\\`\n\n- \\`limit\\`: Items per page (default: 20, max: 100)\n- \\`cursor\\`: Opaque token pointing to start of page\n- \\`order\\`: \\`asc\\` or \\`desc\\` (default: \\`desc\\` for most recent first)\n\n**Response Structure:**\n\\`\\`\\`json\n{\n  \"data\": [\n    {\"id\": 12345, \"total\": 99.99, \"created_at\": \"2024-01-15T10:00:00Z\"},\n    {\"id\": 12344, \"total\": 49.99, \"created_at\": \"2024-01-15T09:30:00Z\"},\n    // ... 18 more items\n  ],\n  \"pagination\": {\n    \"next_cursor\": \"eyJpZCI6MTIzMjUs\",\n    \"has_more\": true,\n    \"count\": 20\n  }\n}\n\\`\\`\\`\n\n**Cursor Implementation:**\n- Cursor = base64(JSON({id: last_item_id, timestamp: last_item_timestamp}))\n- Query: WHERE id < cursor.id ORDER BY id DESC LIMIT 20\n- More efficient than OFFSET (doesn't skip rows)\n\n**Metadata:**\n- \\`next_cursor\\`: Token for next page (null if last page)\n- \\`has_more\\`: Boolean (easier than checking if next_cursor is null)\n- \\`count\\`: Items in current page\n- No \\`total\\` count (expensive to compute on large tables)\n\n**Sorting:**\n- Default: Most recent first (created_at DESC)\n- Allow \\`?sort=total:desc\\` or \\`?sort=created_at:asc\\`\n- Cursor must encode sort field\n\n**Alternative: Offset-based (simpler but slower)**\n\\`\\`\\`\nGET /api/v1/orders?page=2&limit=20\nResponse: {data: [...], page: 2, per_page: 20, total: 1543, total_pages: 78}\n\\`\\`\\`","useCase":"List large datasets (orders, users, products) efficiently without loading everything into memory or making users wait.","proTip":"Use cursor-based pagination for any list that could grow beyond 10,000 items. Offset-based is fine for admin dashboards with small datasets."},{"number":18,"title":"Search & Filtering API Design","prompt":"Design a search and filtering system for a list endpoint. Context: {{resource_type}}. Define: (1) Query parameter structure for filters (?status=active&created_after=2024-01-01), (2) Search vs. filter (full-text search vs. exact matches), (3) Combining multiple filters (AND/OR logic), (4) Operators (equals, contains, greater than, in, between), (5) Performance considerations (indexes, query limits), and (6) Example queries with responses. Make it powerful but not too complex.","example":"**Resource: Orders**\n\n**Filter Parameters:**\n\\`\\`\\`\nGET /api/v1/orders?\n  status=pending,processing      # IN operator (comma-separated)\n  &total_gte=100                # Greater than or equal\n  &total_lte=1000               # Less than or equal\n  &created_after=2024-01-01     # Date range\n  &customer_id=cus_123          # Exact match\n  &search=urgent                # Full-text search (any field)\n\\`\\`\\`\n\n**Operators:**\n- No suffix: Exact match (\\`status=pending\\`)\n- \\`_gte\\`: Greater than or equal (\\`total_gte=100\\`)\n- \\`_lte\\`: Less than or equal (\\`total_lte=1000\\`)\n- \\`_contains\\`: Substring match (\\`notes_contains=urgent\\`)\n- Comma-separated: IN operator (\\`status=pending,shipped\\`)\n\n**Combining Filters:**\n- Multiple parameters = AND logic\n- Example: \\`status=pending&total_gte=100\\` → \"pending AND total >= 100\"\n- OR logic: Use comma-separation within same parameter\n- Example: \\`status=pending,processing\\` → \"pending OR processing\"\n\n**Search:**\n- \\`?search=keyword\\` → Full-text search across multiple fields (customer name, email, order notes)\n- Uses database FTS (Postgres: \\`ts_vector\\`, MySQL: \\`FULLTEXT\\`) or Elasticsearch\n- Combined with filters: \\`?search=urgent&status=pending\\`\n\n**Performance:**\n- Indexed fields: status, customer_id, created_at, total\n- Limit combinations: Max 5 filters per query (prevent slow queries)\n- Query timeout: 5 seconds (return 503 if exceeded)\n- Expensive searches: Require higher plan or lower rate limit\n\n**Example Request:**\n\\`\\`\\`\nGET /api/v1/orders?status=pending,processing&total_gte=100&created_after=2024-01-01&limit=20\n\\`\\`\\`\n\n**Response:**\n\\`\\`\\`json\n{\n  \"data\": [/* orders matching filters */],\n  \"filters_applied\": {\n    \"status\": [\"pending\", \"processing\"],\n    \"total\": {\"gte\": 100},\n    \"created_at\": {\"after\": \"2024-01-01\"}\n  },\n  \"pagination\": {/* cursor info */}\n}\n\\`\\`\\`","useCase":"Enable API consumers to efficiently query for subsets of data without building complex query languages.","proTip":"Document which fields are indexed and fast to filter on. Guide users toward efficient queries to keep your database happy."},{"number":19,"title":"Error Handling & Retry Guidance","prompt":"Create API error handling guidance for consumers. Include: (1) Error types and how to handle each (4xx vs. 5xx), (2) Which errors should trigger retries (and which shouldn't), (3) Retry-After header usage, (4) Exponential backoff recommendation, (5) Idempotency for safe retries, and (6) Circuit breaker pattern advice. Help developers build resilient integrations.","example":"**Error Categories:**\n\n**4xx Client Errors (Don't Retry):**\n- **400 Bad Request:** Fix your request payload, then try again\n- **401 Unauthorized:** Your API key is invalid/expired → refresh credentials\n- **403 Forbidden:** You don't have permission → upgrade plan or request access\n- **404 Not Found:** Resource doesn't exist → verify ID\n- **422 Unprocessable:** Validation failed → fix data per error details\n- **429 Rate Limited:** Wait for \\`Retry-After\\` seconds → respect limits\n\n**5xx Server Errors (Retry with Backoff):**\n- **500 Internal Server Error:** Temporary issue → retry\n- **502 Bad Gateway:** Service temporarily down → retry\n- **503 Service Unavailable:** Overloaded or maintenance → retry after \\`Retry-After\\`\n- **504 Gateway Timeout:** Request took too long → retry with longer timeout\n\n**Retry Logic:**\n\\`\\`\\`javascript\nasync function apiCall(url, options, maxRetries = 3) {\n  for (let attempt = 0; attempt <= maxRetries; attempt++) {\n    try {\n      const response = await fetch(url, options);\n      \n      // Success\n      if (response.ok) return response.json();\n      \n      // Don't retry client errors\n      if (response.status >= 400 && response.status < 500) {\n        if (response.status === 429) {\n          const retryAfter = response.headers.get('Retry-After') || 60;\n          await sleep(retryAfter * 1000);\n          continue;  // Retry rate limits\n        }\n        throw new Error(\\`Client error: \\${response.status}\\`);\n      }\n      \n      // Retry server errors\n      if (response.status >= 500) {\n        if (attempt < maxRetries) {\n          const delay = Math.min(1000 × (2 ** attempt), 30000);  // Max 30s\n          await sleep(delay);\n          continue;\n        }\n      }\n      \n      throw new Error(\\`API error: \\${response.status}\\`);\n      \n    } catch (err) {\n      if (attempt === maxRetries) throw err;\n      await sleep(1000 × (2 ** attempt));\n    }\n  }\n}\n\\`\\`\\`\n\n**Idempotency:**\n- Use \\`Idempotency-Key\\` header for POST/PATCH requests\n\\`\\`\\`\nPOST /api/v1/orders\nIdempotency-Key: unique_key_123\n\\`\\`\\`\n- Server tracks keys, returns cached response if duplicate\n- Safe to retry without creating duplicates\n\n**Circuit Breaker Pattern:**\n- After 5 consecutive failures → open circuit (stop trying)\n- Wait 60 seconds → try one request (half-open)\n- If succeeds → close circuit (back to normal)\n- If fails → stay open for another 60 seconds","useCase":"Educate API consumers on proper error handling, reducing support burden and improving integration reliability.","proTip":"Include a \\`/health\\` endpoint that returns 200 with status info. Consumers can check this before making real requests to detect outages early."},{"number":20,"title":"API Versioning & Deprecation Notices","prompt":"Design an API deprecation and sunsetting process. Define: (1) How to announce deprecations (blog, email, response headers), (2) Deprecation headers on old endpoints, (3) Sunset date timeline (6 months? 12 months?), (4) Migration guides (what changed, code examples), (5) Metrics to track adoption of new version, and (6) Graceful shutdown process. Minimize disruption for existing users.","example":"**Deprecation Process:**\n\n**Step 1: Announcement (T-12 months)**\n- Blog post: \"Announcing API v2, v1 sunset in 12 months\"\n- Email to all API key holders\n- Add banner to API docs\n- Response header on v1 endpoints:\n\\`\\`\\`\nDeprecation: true\nSunset: Sat, 31 Dec 2024 23:59:59 GMT\nLink: <https://docs.api.com/migrate-v1-to-v2>; rel=\"deprecation\"\n\\`\\`\\`\n\n**Step 2: Reminders (T-6, T-3, T-1 months)**\n- Email campaigns with urgency\n- In-app notifications in dashboard\n- Increase header visibility:\n\\`\\`\\`\nX-API-Deprecated: This endpoint will be removed on 2024-12-31. Migrate to v2: https://docs.api.com/migrate\n\\`\\`\\`\n\n**Step 3: Final Warning (T-30, T-7, T-1 days)**\n- Daily emails to users still on v1\n- Slack/Discord announcements\n- Consider offering migration help (consulting, code review)\n\n**Step 4: Sunset (T-0)**\n- v1 endpoints return 410 Gone:\n\\`\\`\\`json\n{\n  \"error\": {\n    \"code\": \"ENDPOINT_RETIRED\",\n    \"message\": \"API v1 was retired on 2024-12-31. Please upgrade to v2.\",\n    \"migration_guide\": \"https://docs.api.com/migrate-v1-to-v2\",\n    \"support_email\": \"api-support@yourservice.com\"\n  }\n}\n\\`\\`\\`\n\n**Migration Guide:**\n- Side-by-side comparison table\n- Breaking changes highlighted\n- Code examples (before/after)\n\\`\\`\\`javascript\n// v1\nconst res = await fetch('/api/v1/orders', {\n  headers: {'X-API-Key': key}\n});\n\n// v2\nconst res = await fetch('/api/v2/orders', {\n  headers: {'Authorization': \\`Bearer \\${key}\\`}\n});\n\\`\\`\\`\n\n**Tracking Adoption:**\n- Dashboard metric: % of traffic on v1 vs. v2\n- List of users still on v1 (for targeted outreach)\n- Goal: <5% v1 traffic before sunset\n\n**Graceful Shutdown:**\n- Option 1: Auto-redirect v1 → v2 if compatible (risky)\n- Option 2: Extended support for enterprise customers (paid)\n- Option 3: Hard cutoff (recommend
