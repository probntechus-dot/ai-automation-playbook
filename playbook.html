ed after enough notice)","useCase":"Evolve your API without breaking existing integrations, giving users time to migrate while maintaining trust.","proTip":"Offer a \"migration service\" where your team helps high-value customers upgrade. Turn a painful deprecation into a relationship-building opportunity."}]},{"file":"05-crm-database.md","name":"CRM & Database Automation","icon":"🗄️","desc":"HubSpot, Salesforce, Airtable workflows","prompts":[{"number":1,"title":"HubSpot Contact Lifecycle Automation","prompt":"Automate HubSpot contact lifecycle stages based on [engagement criteria]. Show me the trigger, lifecycle stage transitions, associated workflows, notification setup, and reporting integration.","example":"\"Lifecycle automation: Trigger → Contact property 'email_opened' changes to true, Condition → If demo_requested = true AND email_score > 50, Action → Update lifecycle stage to 'Marketing Qualified Lead', Enroll in 'MQL Nurture' workflow, Notify sales via Slack with {{contact.name}} and {{contact.company}}, Log to Google Sheets dashboard. Stage flow: Subscriber → Lead → MQL → SQL → Opportunity → Customer.\"","useCase":"Automatically moving contacts through your sales funnel based on behavior","proTip":"Use HubSpot's score properties to trigger lifecycle changes—more reliable than counting individual actions."},{"number":2,"title":"HubSpot Deal Pipeline Automation","prompt":"Create an automated HubSpot deal progression system for [sales process]. Define stage triggers, automated tasks for sales reps, deal scoring logic, and closed-won/lost automation sequences.","example":"\"SaaS sales pipeline: Stage 1 'Demo Scheduled' → Auto-create task 'Prepare demo' 2 days before, Stage 2 'Demo Complete' → Trigger email sequence, update deal score based on company size + industry, Stage 3 'Proposal Sent' → Set reminder task after 3 days, Stage 4 'Negotiation' → Notify sales manager if deal > \\$50k, Stage 5 'Closed Won' → Create customer record, trigger onboarding workflow, Slack celebration. Closed Lost → Tag reason, move to nurture list.\"","useCase":"Standardizing sales process and ensuring no deals fall through cracks","proTip":"Set up deal probability % that auto-updates based on stage—helps forecast revenue accurately."},{"number":3,"title":"HubSpot Form to Multi-System Sync","prompt":"Sync HubSpot form submissions to [external systems]. Show me the webhook trigger, data mapping between platforms, deduplication logic, and bidirectional sync if needed.","example":"\"Form submission sync to Salesforce + Slack: Trigger → HubSpot form 'Contact Us' submitted, Data mapping → {HubSpot email → SF Email, phone → SF Phone, company → SF Account.Name}, Deduplication → Check if {{email}} exists in SF (HTTP API search), If exists → update record, If new → create contact + link to account, Slack notification → Post to #leads with formatted message. Bidirectional: SF stage updates → webhook back to HubSpot deal stage.\"","useCase":"Keeping HubSpot in sync with your other business tools","proTip":"Use HubSpot's native integrations when available—they handle deduplication and field mapping automatically."},{"number":4,"title":"HubSpot Email Campaign Performance Tracker","prompt":"Track and report on HubSpot email campaign performance for [campaign type]. Pull metrics, calculate key KPIs, compare to benchmarks, and visualize results in [dashboard tool].","example":"\"Weekly newsletter tracking: Every Monday at 9 AM, HTTP GET HubSpot email analytics API for campaign ID {{campaignId}}, Extract metrics → {sent: {{data.sent}}, opened: {{data.opened}}, clicked: {{data.clicked}}}, Calculate KPIs → Open Rate: {{opened/sent*100}}%, CTR: {{clicked/opened*100}}%, Compare to benchmark (20% open, 3% CTR), Push to Google Sheets → append row with date, metrics, vs benchmark. Conditional Slack alert if open rate < 15%.\"","useCase":"Monitoring email performance without manual exports","proTip":"Schedule reports to run after enough time for opens/clicks—24 hours for opens, 48-72 for accurate click data."},{"number":5,"title":"HubSpot Lead Scoring Enhancement","prompt":"Build an advanced HubSpot lead scoring system incorporating [custom criteria]. Define scoring rules, integrate external data sources, implement score decay over time, and trigger actions at score thresholds.","example":"\"Advanced scoring: Base HubSpot score + external enrichment → On contact create/update, call Clearbit API with {{email}}, add points: Employee count >100 (+20), Industry = Tech (+15), Job title contains 'Director' (+25), Engagement: Email open (+5), Link click (+10), Demo request (+50). Score decay: Scheduled scenario decrements -5 points if no activity in 30 days. Thresholds: Score >80 → auto-assign to sales, Score 50-79 → marketing nurture, Score <50 → long-term drip.\"","useCase":"Creating sophisticated lead qualification beyond basic engagement","proTip":"Document your scoring model in a Google Sheet—sales teams need to understand why leads score high/low."},{"number":6,"title":"Salesforce Opportunity Automation","prompt":"Automate Salesforce opportunity management for [sales scenario]. Define creation triggers, field auto-population, stage progression rules, and team notifications.","example":"\"Opportunity auto-creation: Trigger → Lead converted in Salesforce, Create opportunity → {Name: {{Lead.Company}} - {{Lead.Product_Interest}}, Amount: {{Lead.Est_Budget}}, CloseDate: +30 days, Stage: 'Qualification'}, Auto-populate → Industry from Account, Owner from Lead.Owner, Notification → Chatter post tagging owner + sales manager, Email to owner with opportunity summary. Stage rule: If Amount > \\$100k → require manager approval before 'Proposal' stage.\"","useCase":"Standardizing opportunity creation and ensuring complete data","proTip":"Use Salesforce Process Builder for simple automations, Make.com for cross-platform or complex logic."},{"number":7,"title":"Salesforce to Data Warehouse Sync","prompt":"Sync Salesforce data to [data warehouse/analytics platform] for reporting. Show me the extraction schedule, incremental vs full sync strategy, data transformation needs, and performance optimization.","example":"\"Salesforce → BigQuery sync: Daily at 2 AM, extract → SOQL query: SELECT Id, Name, Stage, Amount, CloseDate FROM Opportunity WHERE LastModifiedDate >= YESTERDAY (incremental), Transform → flatten related objects (Account.Name → account_name), convert SF date format to ISO, Load → BigQuery table 'opportunities' with WRITE_APPEND, Deduplication → MERGE statement on Id, Performance → batch 5000 records per API call (Salesforce limit), total ~10k opportunities = 2 API calls.\"","useCase":"Building custom analytics and reports beyond Salesforce's built-in capabilities","proTip":"Use Salesforce's bulk API for initial full sync (>2000 records), then switch to REST API for daily incremental updates."},{"number":8,"title":"Salesforce Case Assignment Logic","prompt":"Implement intelligent Salesforce case routing based on [criteria]. Define assignment rules, priority escalation, workload balancing, and SLA tracking.","example":"\"Smart case routing: Trigger → Case created, Priority determination → VIP account (+high priority) OR Amount > \\$10k (+high), Severity from subject keywords ('urgent', 'down'), Assignment logic → High priority → senior support queue, Check queue size, if >10 cases → escalate to manager, Standard cases → round-robin assignment tracking last_assigned_agent in Data Store, SLA → Create task 'First response' due in 2 hours (high) or 24 hours (standard), Slack alert if SLA breach risk.\"","useCase":"Ensuring cases reach the right team members quickly with balanced workload","proTip":"Store assignment state in Make Data Store instead of Salesforce custom objects—faster and no storage limits."},{"number":9,"title":"Salesforce Account Hierarchy Sync","prompt":"Manage complex Salesforce account hierarchies across [subsidiary/parent relationships]. Handle parent account updates cascading to children, hierarchy visualization, and cross-object reporting.","example":"\"Account hierarchy management: Trigger → Parent Account field updated, Find children → SOQL: SELECT Id FROM Account WHERE ParentId = {{trigger.id}}, Iterator over children → Update {Industry: {{parent.industry}}, Territory: {{parent.territory}}}, Maintain custom field hierarchy_path: {{parent.name}} > {{child.name}}, Visualization → Export hierarchy to Google Sheets with indentation levels, Reporting → Roll up child opportunity amounts to parent using Aggregate function.\"","useCase":"Managing enterprise accounts with multiple subsidiaries or divisions","proTip":"Use Salesforce's standard ParentId field instead of custom lookups—enables built-in hierarchy views and roll-up summaries."},{"number":10,"title":"Salesforce CPQ Quote Generation","prompt":"Automate Salesforce CPQ quote creation and document generation for [product/service]. Handle product selection, pricing rules, discount approvals, and PDF quote delivery.","example":"\"CPQ automation: Trigger → Opportunity stage = 'Proposal', Create Quote → link to opportunity, Add quote lines → iterate over {{opportunity.products}}, apply price book, Discount logic → if quantity > 10 apply 15% discount, if > 50 require approval (update quote status 'Pending Approval', task to sales director), Generate PDF → Salesforce API render template with quote data, Upload to opportunity files, Email to contact → {{opportunity.contact.email}} with PDF attached, Log activity.\"","useCase":"Speeding up quote generation and reducing pricing errors","proTip":"Store approved discount thresholds in a Google Sheet—easier for sales ops to update than hardcoded values."},{"number":11,"title":"Airtable as CRM Backend","prompt":"Set up Airtable as a lightweight CRM for [business type]. Design the base structure, create automation for lead capture, implement pipeline views, and integrate with communication tools.","example":"\"Freelancer CRM in Airtable: Tables → 1) Leads {Name, Email, Company, Status, Source}, 2) Projects {Name, Lead (linked), Budget, Stage}, 3) Communications {Lead (linked), Type, Date, Notes}, Automation → Typeform submission → Create Lead record, Status = 'New', Slack notification, Views → Kanban by Status, Calendar by Follow-up Date, Integration → When Status → 'Proposal Sent', trigger Make scenario to generate proposal doc from template.\"","useCase":"Managing client relationships without enterprise CRM complexity","proTip":"Use Airtable's linked records feature heavily—it replaces complex database joins with simple dropdown selection."},{"number":12,"title":"Airtable Multi-Step Form Backend","prompt":"Use Airtable as database backend for [multi-step process]. Design data collection flow, handle partial submissions, implement approval workflows, and trigger post-completion actions.","example":"\"Job application system: Step 1 → Basic info creates Airtable record (Status: 'Draft'), returns record ID, Step 2 → Update record with experience, Step 3 → Update with documents (attachment field), Final → Status: 'Submitted', Trigger → Airtable automation or webhook to Make, Make scenario → Email hiring manager, Create task in Asana, Approval → Manager updates Status: 'Interview', triggers calendar invite send. Partial handling → 'Draft' records auto-delete after 7 days (scheduled scenario).\"","useCase":"Building custom application or onboarding flows","proTip":"Return the Airtable record ID to the user's browser—enables them to resume partial applications later."},{"number":13,"title":"Airtable Inventory Management","prompt":"Manage inventory using Airtable with automated reordering and stock alerts for [product type]. Track quantities, trigger low-stock alerts, generate purchase orders, and sync with e-commerce platform.","example":"\"Product inventory base: Tables → 1) Products {SKU, Name, Current_Stock, Min_Stock, Supplier}, 2) Stock_Movements {Product (linked), Quantity, Type (In/Out), Date}, 3) Purchase_Orders {Products (linked), Quantity, Status}, Automation → When Current_Stock < Min_Stock, create PO record, email supplier with {{product.name}} and {{quantity_needed}}, Slack alert to ops team, E-commerce sync → Shopify order webhook → reduce Current_Stock, create Stock_Movement record.\"","useCase":"Simple inventory tracking for small businesses without complex ERP systems","proTip":"Use Airtable's rollup fields to calculate total stock value—sum of (Current_Stock × Unit_Price) across all products."},{"number":14,"title":"Airtable Content Calendar Automation","prompt":"Build an automated content calendar in Airtable for [content type]. Schedule posts, assign to team members, track status, and auto-publish to [platforms].","example":"\"Social media calendar: Table → {Content, Scheduled_Date, Platform (multi-select), Status, Assigned_To, Media (attachment)}, Views → Calendar by Scheduled_Date, Kanban by Status, Automation → Daily at 8 AM, Make scenario queries Airtable for records WHERE Scheduled_Date = TODAY AND Status = 'Approved', Iterator → post to platform (LinkedIn/Twitter API), update Status = 'Published', Post_URL = {{response.url}}, Slack confirmation with post links.\"","useCase":"Managing multi-platform content publication from one central calendar","proTip":"Use Airtable's 'Last modified time' field to track when content was approved—helps audit workflow timing."},{"number":15,"title":"Airtable Customer Support Ticketing","prompt":"Create a customer support ticket system in Airtable with [SLA tracking]. Handle ticket creation, assignment, priority escalation, and customer notifications.","example":"\"Support ticketing: Table → {Ticket_ID (auto-number), Customer (linked), Subject, Status, Priority, Assigned_Agent, Created, SLA_Due (formula)}, Ticket creation → Form submission or email to Make webhook → create record, auto-assign using round-robin from Agents table, email customer with ticket #, SLA formula → IF(Priority='High', Created+2 hours, Created+24 hours), Escalation → Scheduled scenario checks WHERE SLA_Due < NOW AND Status != 'Resolved' → Slack alert, update Priority, Customer updates → Airtable automation on Status = 'Resolved' sends CSAT survey.\"","useCase":"Lightweight helpdesk alternative to Zendesk for small teams","proTip":"Use Airtable's form view for customer-facing ticket submission—cleaner than exposing the full base interface."},{"number":16,"title":"Bidirectional CRM-Database Sync","prompt":"Sync data bidirectionally between [CRM] and [database/tool]. Handle conflict resolution, field mapping, sync frequency, and maintain data integrity.","example":"\"HubSpot ↔ PostgreSQL sync: Direction 1 (HubSpot → PostgreSQL): Webhook on contact update → upsert to customers table using email as key, map {hubspot_contact_id, email, name, company, last_activity}, Direction 2 (PostgreSQL → HubSpot): Scheduled hourly, query WHERE updated_at > {{last_sync_time}}, update HubSpot contact via API, Conflict resolution → timestamp comparison, latest update wins, log conflicts to Google Sheets, Data integrity → validate email format before sync, skip null emails.\"","useCase":"Keeping your CRM and operational database in sync","proTip":"Always sync based on 'last modified' timestamp to avoid reprocessing unchanged records—saves operations and API calls."},{"number":17,"title":"Data Enrichment Pipeline","prompt":"Enrich [CRM/database] records with external data from [enrichment source]. Identify enrichment triggers, API integration, data merging strategy, and cost optimization.","example":"\"Contact enrichment with Clearbit: Trigger → New contact in HubSpot with company domain, Make HTTP → GET Clearbit Company API (https://company.clearbit.com/v2/companies/find?domain={{domain}}), Response mapping → {employee_count, industry, tech_stack, funding}, Update HubSpot → custom properties, Cost optimization → check if company already enriched (custom property 'clearbit_enriched' = true), skip if yes, saves API calls, Fallback → if Clearbit returns null, try Hunter.io for basic company info.\"","useCase":"Automatically enhancing lead data for better sales intelligence","proTip":"Enrich in batches during off-hours instead of real-time—much cheaper and avoids rate limiting issues."},{"number":18,"title":"Cross-Platform Customer 360 View","prompt":"Aggregate customer data from [multiple sources] into unified 360-degree view in [destination]. Handle identity resolution, data deduplication, and real-time updates.","example":"\"Customer 360 (HubSpot + Stripe + Zendesk → Airtable): Identity resolution → match on email across platforms, Airtable table 'Customers' → {Email (unique), Name, Company, Total_MRR (from Stripe), Support_Tickets (count from Zendesk), Last_Contact (from HubSpot)}, Real-time → webhooks from each platform trigger Make scenarios, upsert Airtable record, Deduplication → email normalization (lowercase, trim), check for existing record before create, Rollup → linked records calculate ticket_count, sum_charges.\"","useCase":"Creating complete customer profiles for sales and support teams","proTip":"Use a master data table in Airtable or PostgreSQL as single source of truth—easier than trying to sync between multiple CRMs."},{"number":19,"title":"Scheduled Data Backup and Archiving","prompt":"Automatically backup [CRM/database] data to [storage location] on [schedule]. Include incremental vs full backup strategy, data format, retention policy, and restore testing.","example":"\"Weekly HubSpot backup to Google Drive: Schedule → Every Sunday 3 AM, Extract → HubSpot API get all contacts (pagination handling), all deals, all companies, Format → JSON array per object type, Create files → contacts_YYYY-MM-DD.json, Upload to Google Drive folder 'HubSpot Backups', Retention → Keep weekly backups for 3 months, monthly backups for 1 year, delete older (scheduled cleanup scenario), Restore test → Monthly scenario attempts to parse backup JSON and reports row counts to verify integrity.\"","useCase":"Protecting critical business data from accidental deletion or corruption","proTip":"Store backups in a different cloud provider than your production data—protects against vendor-specific outages."},{"number":20,"title":"Real-Time Data Quality Monitoring","prompt":"Monitor data quality in [CRM/database] and auto-correct or alert on issues for [data types]. Define quality rules, validation logic, correction automation, and reporting dashboard.","example":"\"HubSpot data quality monitoring: Quality rules → 1) Email format valid, 2) Phone number has country code, 3) Company name not null if deal exists, 4) Lifecycle stage matches deal stage, Trigger → Contact/deal updated webhook, Validation → run regex checks, Correction → Auto-fix phone (add +1 if US and missing), trim whitespace from names, Alert → If can't auto-fix, create task for sales ops with {{issue_description}}, Dashboard → Google Sheets with daily report: total records checked, issues found, auto-fixed count, manual review count.\"","useCase":"Maintaining clean CRM data to improve reporting and automation reliability","proTip":"Focus on fixing data at entry point (form validation) rather than cleaning afterward—prevention beats cure."}]},{"file":"06-content-automation.md","name":"Content Automation","icon":"📝","desc":"Automate content creation & distribution","prompts":[{"number":1,"title":"Multi-Platform Social Post Generator","prompt":"You are a social media content strategist. I will provide you with a topic or news item. Generate 5 platform-optimized posts for: Twitter/X, LinkedIn, Instagram, Facebook, and TikTok. For each platform:\n\n- Match the platform's tone and format (Twitter: concise & punchy, LinkedIn: professional insights, Instagram: visual-first with storytelling, Facebook: community-focused, TikTok: trend-aware hooks)\n- Include relevant hashtags (3-5 per platform)\n- Suggest posting time (best engagement window)\n- Add a CTA specific to each platform's user behavior\n\nTopic: [INSERT TOPIC]\nBrand voice: [casual/professional/humorous/inspirational]\nTarget audience: [DESCRIBE AUDIENCE]","example":"- **Twitter/X:** \"🚀 AI just changed the game again. New study shows 73% productivity boost with automation. The question isn't IF you'll adopt it—it's WHEN. #AIAutomation #FutureOfWork #ProductivityHack\"\n- **LinkedIn:** \"Fascinating research just published: Organizations implementing AI automation are seeing an average 73% increase in team productivity. Here's what the data reveals about the future of work... [Read more]\"\n- **Instagram:** \"Swipe to see how AI is transforming workplaces 👉✨ 73% more productive teams, happier employees, and innovation at scale. Which slide surprised you most? 💭 #AIRevolution #WorkSmart #TechTrends\"","useCase":"Perfect for agencies managing multiple client accounts, brands maintaining cross-platform presence, or solopreneurs who need to batch-create a week's worth of content in minutes.","proTip":"Add \"Tone Analysis: [paste competitor post]\" at the end of the prompt to have AI match a specific brand's voice across all platforms."},{"number":2,"title":"Viral Hook Generator for Short-Form Video","prompt":"Generate 10 scroll-stopping hooks for a short-form video (TikTok/Reels/Shorts) about: [TOPIC]\n\nRequirements:\n- Each hook must be 5-8 words maximum\n- Use pattern interrupts (surprising stats, controversial takes, direct challenges, or curiosity gaps)\n- Include one hook using each of these proven formulas:\n  1. The Shocking Stat: \"X% of people don't know...\"\n  2. The Mistake: \"Stop doing [common thing]...\"\n  3. The Secret: \"Here's what [authority] won't tell you...\"\n  4. The Challenge: \"Bet you can't...\"\n  5. The Transformation: \"From [bad] to [good] in [time]...\"\n- Rate each hook's viral potential (1-10)\n\nTarget audience: [DESCRIBE]\nNiche: [SPECIFY]","example":"1. \"Stop using ChatGPT like this... ❌\" (Viral Score: 9/10)\n2. \"87% of automation fails. Here's why.\" (Viral Score: 8/10)\n3. \"I automated my job in 4 hours.\" (Viral Score: 9/10)","useCase":"Content creators struggling with the first 3 seconds of video—the make-or-break moment. Use this before filming to test multiple angles.","proTip":"Feed the AI your top 3 performing videos first with \"Analyze why these hooks worked: [paste hooks]\" to train it on your specific audience's preferences."},{"number":3,"title":"Content Repurposing Engine","prompt":"I have created a piece of long-form content. Repurpose it into 12 different content assets for maximum reach:\n\n**Original Content:** [PASTE BLOG POST / VIDEO SCRIPT / PODCAST TRANSCRIPT]\n\n**Generate:**\n1. Twitter thread (8-12 tweets with strong opening hook)\n2. LinkedIn carousel outline (10 slides with headlines only)\n3. 3 Instagram captions (short/medium/long formats)\n4. Email newsletter version (conversational tone, 300 words)\n5. YouTube Short script (30-second version)\n6. Pinterest pin descriptions (3 variations)\n7. Podcast intro teaser (60 seconds)\n8. Quote graphics text (5 pull quotes)\n9. Infographic data points (7 key statistics or steps)\n10. FAQ section (5 Q&As derived from content)\n11. Reddit post (value-first, non-promotional)\n12. Newsletter subject lines (5 A/B test options)\n\nMaintain core message but optimize each format for its platform's algorithm and user behavior.","example":"**Twitter Thread:**\n🧵 Your automation workflow is broken. Here's why (and how to fix it):\n\n1/ Most people automate the wrong things first. They chase \"cool\" over \"profitable.\" Big mistake.\n\n2/ Start with the \\$1,000/hour tasks, not the \\$10/hour ones...\n\n**LinkedIn Carousel Slide 3:**\nHeadline: \"The 3 Automation Mistakes Costing You \\$50K/Year\"\nSubtext: Mistake #1: Automating before documenting","useCase":"Maximizes ROI on every piece of content you create. One blog post becomes 50+ social posts, emails, and assets. Essential for lean content teams.","proTip":"Save this output as a template, then feed it into your automation tool (Make/Zapier) to trigger content distribution automatically when you publish new content."},{"number":4,"title":"Engagement Response AI Assistant","prompt":"You are my social media engagement assistant. I'll paste comments/replies from my posts, and you'll generate thoughtful, on-brand responses that boost engagement and build community.\n\n**Brand Voice:** [professional/friendly/humorous/inspiring]\n**Response Style:** [concise/detailed/question-based/storytelling]\n**Goals:** [drive to profile/encourage discussion/provide value/build relationships]\n\n**For each comment, provide:**\n1. A personalized response (2-3 sentences)\n2. A follow-up question to continue conversation\n3. Whether to like/heart the comment\n4. Urgency level (respond now / within 1 hour / within 24 hours)\n\n**Comments to respond to:**\n[PASTE COMMENTS]","example":"**Comment:** \"This is interesting but how do I get started with AI automation?\"\n\n**Response:** \"Great question! The best starting point is identifying one repetitive task you do daily—something that takes 30+ minutes. That's your automation MVP. What task immediately comes to mind for you?\"\n\n**Action:** ❤️ Like the comment\n**Urgency:** Within 1 hour (shows high engagement intent)","useCase":"Maintain active engagement without spending 2 hours/day replying to comments. Especially valuable when posts go viral and you have hundreds of comments.","proTip":"Batch process comments 3x per day (morning/lunch/evening). Copy all comments into one prompt for consistent voice across all responses."},{"number":5,"title":"Weekly Content Calendar Generator","prompt":"Create a 7-day social media content calendar based on my business goals and audience insights.\n\n**Business Info:**\n- Industry: [YOUR INDUSTRY]\n- Main offer: [PRODUCT/SERVICE]\n- Target audience: [DEMOGRAPHICS + PAIN POINTS]\n- Content pillars: [3-5 THEMES e.g., education, inspiration, entertainment, promotion]\n\n**Calendar Requirements:**\n- 3 posts per day across platforms (specify which platforms)\n- Mix of content types: 40% educational, 30% engaging/entertaining, 20% promotional, 10% user-generated/testimonials\n- Include trending topics/hashtags for this week\n- Suggest best posting times based on audience timezone: [TIMEZONE]\n- Each post includes: Platform, Time, Format (video/carousel/image/text), Caption draft, Hashtags, CTA\n\n**Output Format:** Table with columns: Day | Time | Platform | Content Type | Topic | Caption (first 20 words) | Hashtags | CTA","example":"| Day | Time | Platform | Type | Topic | Caption | Hashtags | CTA |\n|-----|------|----------|------|-------|---------|----------|-----|\n| Mon | 9 AM | LinkedIn | Carousel | Automation ROI | \"The hidden costs of manual work... Slide 1: You're losing \\$847/week\" | #Automation #ROI | Link in comments |\n| Mon | 2 PM | Instagram | Reel | Tool Tutorial | \"Watch me automate email responses in 90 seconds...\" | #AITools #Tutorial | Save for later |","useCase":"Plan once, execute all week. Eliminates daily \"what should I post?\" stress. Perfect for maintaining consistent presence while focusing on business operations.","proTip":"Ask AI to \"analyze my top 10 performing posts from last month [paste analytics]\" first, then include that insight in this prompt for data-driven content planning."},{"number":6,"title":"SEO Blog Post Outline Generator","prompt":"Create a comprehensive SEO-optimized blog post outline for the keyword: \"[PRIMARY KEYWORD]\"\n\n**Research Requirements:**\n1. Analyze top 10 ranking articles for this keyword (I'll provide URLs or you use your knowledge)\n2. Identify content gaps they're missing\n3. Find related long-tail keywords to target\n\n**Outline Structure:**\n- SEO Title (60 characters, include primary keyword)\n- Meta Description (155 characters, compelling + keyword)\n- H1 Headline (different from title, emotional hook)\n- Introduction (150 words: hook, problem, promise, preview)\n- 5-8 H2 sections (each with 2-3 H3 subsections)\n- FAQ section (5 questions based on \"People Also Ask\")\n- Conclusion with clear CTA\n- Internal linking opportunities (suggest 5 related topics)\n- External linking strategy (3 authoritative sources to cite)\n\n**Content Depth:** Target 2,500-3,000 words\n**Target Audience:** [DESCRIBE]\n**Angle/Unique POV:** [WHAT MAKES THIS DIFFERENT]","example":"**SEO Title:** \"AI Automation Tools: 15 Best Platforms to 10x Productivity (2026)\"\n**Meta:** \"Discover the top AI automation tools saving teams 20+ hours/week. Expert comparison, pricing, and real use cases. Find your perfect automation stack.\"\n**H1:** \"Stop Working Harder: These AI Tools Do the Heavy Lifting for You\"\n\n**Introduction:**\nYou're working 60-hour weeks, yet your to-do list never shrinks. Sound familiar? The problem isn't your work ethic—it's your workflow...","useCase":"Streamline blog production from research to outline in 10 minutes. Writers get a clear roadmap, and SEO is baked in from the start.","proTip":"After generating the outline, ask: \"Write section H2.3 in full with examples and data\" to draft one section at a time, maintaining quality over speed."},{"number":7,"title":"Keyword Cluster Topic Planner","prompt":"I want to dominate search rankings for the topic: \"[CORE TOPIC]\"\n\nCreate a topical authority content cluster:\n\n**Pillar Page:**\n- Main topic (high-volume, competitive keyword)\n- Target word count and structure\n\n**Cluster Content (15-20 articles):**\n- Group keywords into subtopics\n- Each cluster article should:\n  - Target specific long-tail keyword (search volume 100-1000)\n  - Link back to pillar page\n  - Cover unique angle competitor's miss\n\n**Deliverables:**\n1. Pillar page outline (main topic comprehensive guide)\n2. 15 cluster article topics with target keywords\n3. Internal linking map (visual structure)\n4. Publishing sequence (which to write first for maximum SEO impact)\n5. Estimated timeline to topical authority (based on 2 posts/week)\n\n**My Domain Authority:** [DA SCORE]\n**Content Resources:** [solo writer/small team/agency]","example":"**Pillar Page:** \"The Complete Guide to AI Automation\" (Target: 5,000 words)\n\n**Cluster Articles:**\n1. \"AI Automation for Gmail: Complete Setup Guide\" → Links to Pillar § Email Automation\n2. \"Zapier vs Make vs n8n: Which Automation Tool Wins?\" → Links to Pillar § Tool Comparison\n3. \"ROI Calculator: Is AI Automation Worth It?\" → Links to Pillar § Business Case\n\n**Publishing Sequence:**\nWeek 1-2: Cluster articles 3, 7, 12 (quick wins, low competition)\nWeek 3: Pillar page (with internal links established)\nWeek 4-8: Remaining clusters (funnel traffic to pillar)","useCase":"Build topical authority in a niche instead of random blog posts. Search engines favor comprehensive topic coverage. Expect rankings in 3-6 months.","proTip":"Publish the pillar page only after 5-8 cluster articles are live. This creates instant internal linking and signals to Google you're an authority."},{"number":8,"title":"Blog Introduction Hook Writer","prompt":"Write 5 different opening hooks for a blog post titled: \"[BLOG TITLE]\"\n\n**Each hook should:**\n- Be 3-4 sentences (100 words max)\n- Use a different psychological trigger:\n  1. Curiosity Gap: Tease valuable info without revealing it\n  2. Shocking Stat: Lead with surprising data\n  3. Personal Story: Relatable anecdote that mirrors reader's pain\n  4. Contrarian Take: Challenge common belief\n  5. Direct Benefit: Promise clear outcome in specific timeframe\n\n- End with a transition sentence that leads into the main content\n- Use active voice, second-person (\"you\"), and present tense\n\n**Target Reader:** [DESCRIBE AVATAR]\n**Main Promise of Article:** [WHAT THEY'LL LEARN/GAIN]","example":"**Hook 1 (Curiosity Gap):**\n\"There's a reason 90% of automation projects fail within 6 months—and it has nothing to do with the technology. I discovered this pattern after auditing 200+ failed workflows, and the culprit is something you're probably doing right now. Here's what everyone gets wrong...\"\n\n**Hook 2 (Shocking Stat):**\n\"\\$2.3 million. That's how much money companies waste per year on automation tools they never properly implement. If you've bought Zapier, Make, or any automation platform and barely use it, you're not alone. This guide fixes that.\"","useCase":"The first 3 sentences determine if readers stay or bounce. Test multiple hooks to find what resonates with your audience. A/B test these in email subject lines too.","proTip":"Run these hooks through a readability checker (Hemingway Editor) and aim for Grade 6-8 reading level for maximum accessibility."},{"number":9,"title":"SEO Meta Data Generator","prompt":"Generate SEO-optimized meta data for my blog post:\n\n**Article Title:** [TITLE]\n**Primary Keyword:** [KEYWORD]\n**Article Summary:** [2-3 SENTENCE SUMMARY]\n**Target Audience:** [WHO IS THIS FOR]\n\n**Create:**\n1. **SEO Title Tag** (55-60 characters):\n   - Include primary keyword near the beginning\n   - Add power word (Best, Complete, Ultimate, Essential, Proven)\n   - Include year if relevant (2026)\n   - Make it click-worthy\n\n2. **Meta Description** (150-155 characters):\n   - Compelling benefit-driven copy\n   - Include primary keyword naturally\n   - End with CTA (Learn how, Discover, Get started)\n\n3. **URL Slug** (3-5 words, keyword-focused)\n\n4. **Focus Keyphrase variations** (5 semantic alternatives)\n\n5. **Image Alt Text** for featured image (describe + keyword)","example":"1. **SEO Title:** \"AI Automation Tools: 15 Best Platforms to Save 20 Hours/Week (2026)\" [59 chars]\n2. **Meta Description:** \"Compare the top AI automation tools for business. Real pricing, features, and ROI data. Find your perfect automation stack today.\" [154 chars]\n3. **URL Slug:** \\`/ai-automation-tools-2026\\`\n4. **Focus Keyphrase Variations:**\n   - best AI automation software\n   - top automation platforms\n   - AI workflow tools\n   - business automation solutions\n   - intelligent automation systems\n5. **Image Alt Text:** \"Comparison dashboard of top AI automation tools showing features and pricing for business workflow optimization\"","useCase":"Eliminate guesswork from SEO basics. Paste your article, get publication-ready meta data in seconds. Especially helpful for bulk content optimization.","proTip":"Use this for updating old blog posts too—refreshing meta data can boost rankings 10-30% without rewriting content."},{"number":10,"title":"Internal Linking Suggestion Engine","prompt":"I'm publishing a new blog post and need strategic internal linking recommendations.\n\n**New Article:**\n- Title: [NEW POST TITLE]\n- Primary topic: [MAIN TOPIC]\n- Key sections: [H2 HEADLINES]\n\n**Existing Content Library:**\n[PASTE LIST OF PUBLISHED ARTICLES WITH URLS - or describe your content categories]\n\n**Generate:**\n1. **Links TO this new article:** Which 5 existing articles should link to this new post? Specify exact paragraph/section where link fits naturally.\n\n2. **Links FROM this new article:** Which 5-8 existing articles should this new post link to? For each:\n   - Suggested anchor text (keyword-rich but natural)\n   - Where in the new article to place it (introduction, specific H2 section, conclusion)\n   - Why this link adds value for the reader\n\n3. **Pillar Page Opportunity:** Does this article warrant a new pillar page, or should it link to an existing one?\n\n4. **Orphan Page Check:** Identify any existing articles with zero internal links that should connect to this topic.","example":"**Links TO this new article (from existing posts):**\n1. **From:** \"Getting Started with AI Automation\" \n   **Section:** \"Choosing the Right Tools\" (paragraph 3)\n   **Anchor text:** \"compare the best AI automation platforms\"\n   **Reason:** Readers evaluating tools need detailed comparison\n\n2. **From:** \"Zapier Tutorial for Beginners\"\n   **Section:** Conclusion\n   **Anchor text:** \"explore Zapier alternatives\"\n   **Reason:** Natural next step for readers wanting options\n\n**Links FROM this new article:**\n1. **To:** \"ROI Calculator for Automation Tools\"\n   **Anchor:** \"calculate your potential ROI\"\n   **Placement:** H2.3 \"Pricing Comparison\" section\n   **Value:** Helps readers justify investment with real numbers","useCase":"Strong internal linking boosts SEO (helps Google understand site structure), increases pageviews, and reduces bounce rate. This systematizes link building instead of random guessing.","proTip":"Update this quarterly. Export your sitemap, feed it to AI, and ask \"find orphan pages and broken internal link opportunities\" to maintain site health."},{"number":11,"title":"Welcome Email Sequence Builder","prompt":"Create a 5-email welcome sequence for new subscribers to my [PRODUCT/SERVICE].\n\n**Business Context:**\n- What I offer: [PRODUCT/SERVICE DESCRIPTION]\n- Target audience: [DEMOGRAPHICS + PAIN POINTS]\n- Main conversion goal: [free trial / purchase / book call / download lead magnet]\n- Brand voice: [professional/casual/humorous/inspirational]\n\n**Sequence Structure:**\n\n**Email 1 (Immediate):** Welcome + Deliver Promise\n- Subject line (3 options)\n- Deliver what they signed up for\n- Set expectations (what emails they'll receive)\n- Quick win or valuable tip\n\n**Email 2 (Day 2):** Education + Social Proof\n- Subject line (3 options)\n- Teach something valuable (non-promotional)\n- Include testimonial or case study\n- Soft CTA\n\n**Email 3 (Day 4):** Story + Relatability\n- Subject line (3 options)\n- Personal story or customer journey\n- Build emotional connection\n- Show transformation\n\n**Email 4 (Day 7):** Value + Soft Pitch\n- Subject line (3 options)\n- More free value (tool/template/guide)\n- Introduce offer naturally\n- Clear CTA without pressure\n\n**Email 5 (Day 10):** Conversion Push\n- Subject line (3 options)\n- Scarcity or urgency (ethical)\n- Overcome objections\n- Strong CTA with incentive\n\nFor each email provide: Subject line options, preview text, body (300-400 words), CTA button text, P.S. line","example":"**Email 1: Welcome + Deliver Promise**\n\n**Subject Lines:**\nA) \"Here's your AI Automation Starter Kit 🚀\"\nB) \"Welcome! Your automation journey starts now\"\nC) \"You're in! Here's what happens next...\"\n\n**Preview Text:** \"Your free tools + a 5-minute quick win inside\"\n\n**Body:**\nHey [First Name],\n\nWelcome to the automation revolution! 🎉\n\nYou just joined 47,000+ professionals who are automating their way to 20+ free hours every week. Smart move.\n\nHere's your AI Automation Starter Kit (as promised):\n→ [Link] 10 Copy-Paste Automation Templates\n→ [Link] ROI Calculator Spreadsheet\n→ [Link] Tool Comparison Cheat Sheet\n\n**Quick Win (Do this today):** Automate your email responses in 5 minutes using [specific tool]. [Link to tutorial]\n\nOver the next 10 days, I'll send you my best strategies for building bulletproof automation workflows. No fluff, just actionable playbooks.\n\nHere's what's coming:\n- Day 2: The 3 automation mistakes costing you \\$50K/year\n- Day 4: How I automated client onboarding (case study)\n- Day 7: Free workflow template library\n- Day 10: Special offer (you'll want to see this)\n\nReply to this email with your biggest automation question—I read every response.\n\nLet's build something amazing,\n[Your Name]\n\nP.S. Stuck on where to start? [Link] Here's my \"First Automation\" guide for total beginners.\n\n**CTA Button:** \"Get My Free Templates\"","useCase":"Welcome sequences convert 5-10x better than single emails. This builds trust over 10 days and warms subscribers to your offer naturally.","proTip":"Track open rates for each subject line variation and keep the winner. After 90 days, A/B test new subject lines to optimize continuously."},{"number":12,"title":"Cart Abandonment Recovery Sequence","prompt":"Create a 3-email cart abandonment sequence to recover lost sales for my [PRODUCT/SERVICE].\n\n**Product Info:**\n- Product name: [NAME]\n- Price: [PRICE]\n- Main benefit: [CORE VALUE PROPOSITION]\n- Common objections: [LIST TOP 3 REASONS PEOPLE DON'T BUY]\n\n**Sequence Goals:**\n- Recover 15-30% of abandoned carts\n- Overcome objections without being pushy\n- Use urgency ethically\n\n**Email 1 (1 hour after abandonment):** Gentle Reminder\n- Subject: Friendly \"you forgot something\" tone\n- Show what's in their cart\n- One-click return to checkout\n- No pressure, just helpfulness\n\n**Email 2 (24 hours later):** Address Objections\n- Subject: Overcome hesitation\n- Answer common questions/concerns\n- Social proof (reviews, testimonials)\n- Risk reversal (guarantee, trial, money-back)\n- Add moderate urgency\n\n**Email 3 (48 hours later):** Final Incentive\n- Subject: Last chance + special offer\n- Limited-time discount (10-20%) OR exclusive bonus\n- FOMO trigger\n- Clear deadline\n- Strong CTA\n\nFor each email include: Subject line (3 variations), preview text, body copy, CTA button text, design notes (what to highlight visually)","example":"**Email 1: Gentle Reminder (Send 1 hour after abandonment)**\n\n**Subject Lines:**\nA) \"Did something go wrong? 🤔\"\nB) \"You left this behind...\"\nC) \"Your cart is waiting for you\"\n\n**Preview Text:** \"Complete your order in one click—no rush!\"\n\n**Body:**\nHey [First Name],\n\nI noticed you were checking out the **AI Automation Playbook** but didn't complete your order.\n\nNo worries—life happens! Maybe you got distracted, or needed to double-check something.\n\n**Your cart:**\n✓ AI Automation Playbook (\\$197)\n✓ Bonus: 100 Ready-to-Use Workflow Templates\n\n[Big Button: Complete My Order →]\n\nEverything's still waiting for you. If you have questions or ran into a technical issue, just reply to this email—I'm here to help!\n\nBest,\n[Your Name]\n\nP.S. Your cart is saved for 48 hours. After that, we can't guarantee the bonus templates will still be available.\n\n**Design Notes:** Show product image, keep design clean, make CTA button large and green.","useCase":"Cart abandonment sequences recover 15-30% of lost sales automatically. Essential for any online business. Set this once, earn forever.","proTip":"Don't offer the discount in Email 1. Make them \"earn\" it by reading Email 3—this trains subscribers to open all emails, boosting future engagement."},{"number":13,"title":"Re-Engagement Email for Inactive Subscribers","prompt":"Write a re-engagement email to win back inactive subscribers (no opens in 90+ days).\n\n**Goals:**\n- Determine who still wants to receive emails (clean list, improve deliverability)\n- Remind them why they subscribed\n- Give them a compelling reason to re-engage\n- Make unsubscribing easy (reduce spam complaints)\n\n**Include:**\n- Attention-grabbing subject line (you're fighting inbox clutter)\n- Personal, conversational tone (not corporate)\n- Quick recap of value they've missed\n- Simple CTA to confirm interest\n- Easy unsubscribe option (prominent, guilt-free)\n\n**Business Context:**\n- What value do you provide subscribers: [DESCRIBE]\n- What's new/changed since they went inactive: [UPDATES]\n- Incentive to re-engage (optional): [DISCOUNT/FREE RESOURCE/EXCLUSIVE ACCESS]","example":"**Subject Lines:**\nA) \"Did I lose you? 💔\"\nB) \"Break up or make up?\"\nC) \"[First Name], are we still friends?\"\nD) \"I haven't heard from you in a while...\"\n\n**Preview Text:** \"Stay or go? Your choice (no hard feelings)\"\n\n**Body:**\n\nHey [First Name],\n\nI noticed you haven't opened my emails in a while.\n\nMaybe they're ending up in spam. Maybe your priorities changed. Maybe I'm just not delivering what you need anymore.\n\nWhatever the reason—no judgment.\n\nBut I do want to ask: **Do you still want to hear from me?**\n\n**If YES:** [Big Green Button: Yes, Keep Me Subscribed!]\n\nYou'll get my best automation workflows, AI tools, and time-saving strategies (like always). Plus, I just dropped a free bonus: [Link] 20 New Workflow Templates (exclusive for active subscribers).\n\n**If NO:** [Small Text Link: Unsubscribe here]\n\nI'd rather have 1,000 engaged readers than 10,000 ghosts. If you're out, I totally understand. No hard feelings—really.\n\n**Still on the fence?** Here's what you missed recently:\n→ How to automate client onboarding (saves 8 hours/week)\n→ The AI tool that writes my email campaigns (it's free)\n→ Case study: \\$4K/month passive income workflow\n\nIf any of that sounds interesting, click \"Yes\" above and let's reconnect.\n\nOtherwise, thanks for the time we had together. Truly.\n\n[Your Name]\n\nP.S. Not sure? Just reply to this email with \"maybe\" and tell me what you'd like to see more of. I read every response.","useCase":"Send this to subscribers who haven't engaged in 90 days. Improves email deliverability (ESP's reward engagement), cleans dead weight, and re-activates 5-15% of inactive subscribers.","proTip":"Segment those who click \"Yes\"—they're hot leads. Put them in a special re-engagement nurture sequence for 7 days with your best content."},{"number":14,"title":"Product Launch Email Sequence","prompt":"Create a 7-email product launch sequence using Jeff Walker's Product Launch Formula structure.\n\n**Product Details:**\n- Product name: [NAME]\n- Price: [PRICE]\n- Launch date: [DATE]\n- Cart open period: [X DAYS]\n- Main benefit: [TRANSFORMATION PROMISE]\n- Target audience: [DESCRIBE]\n\n**Launch Sequence:**\n\n**Pre-Launch (3 emails):**\n1. **Pre-Launch Email 1 (7 days before):** Opportunity - Introduce big idea/problem\n2. **Pre-Launch Email 2 (5 days before):** Transformation - Show what's possible\n3. **Pre-Launch Email 3 (3 days before):** Ownership - Help them see themselves succeeding\n\n**Launch (4 emails):**\n4. **Launch Day (Cart Opens):** The offer is live\n5. **Day 2:** Social proof + case study\n6. **Day 4:** Objection handling + FAQ\n7. **Final Day (Cart Closes):** Scarcity + last chance\n\n**Each email needs:**\n- Subject line (3 options)\n- Preview text\n- Opening hook\n- Core content (story/teaching/proof)\n- CTA specific to that email's goal\n- P.S. line\n\n**Tone:** [inspirational/educational/urgent/conversational]","example":"**Pre-Launch Email 1: Opportunity (7 days before launch)**\n\n**Subject Lines:**\nA) \"The automation secret nobody's talking about\"\nB) \"What if you could reclaim 20 hours every week?\"\nC) \"I'm about to reveal something game-changing\"\n\n**Preview Text:** \"Most people are automating the WRONG things...\"\n\n**Body:**\n\n[First Name],\n\nHere's a truth that might sting a little:\n\n**Most people who try automation fail.**\n\nNot because the tools don't work. Not because they're not smart enough.\n\nThey fail because they automate the wrong things, in the wrong order, with the wrong strategy.\n\nI learned this the hard way. In 2024, I spent \\$12K on automation tools, watched 100+ hours of tutorials, and built 50+ workflows.\n\n**Result?** I saved maybe 2 hours a week. Pathetic ROI.\n\nThen I discovered the missing piece—a framework that changed everything:\n\n**The Automation Playbook Method.**\n\nIt's not about tools. It's about a proven sequence:\n1. Audit → 2. Prioritize → 3. Automate → 4. Optimize\n\nOnce I cracked this, everything clicked. I went from 2 hours saved to 23 hours saved per week. My revenue doubled because I had time to focus on \\$1,000/hour tasks instead of \\$10/hour busywork.\n\n**Next week, I'm opening the vault.**\n\nI'm launching something I've spent 6 months building—a complete system that takes you from automation chaos to time freedom in 30 days.\n\nNo fluff. No theory. Just copy-paste workflows and the exact framework I use.\n\nI'll share more details soon. For now, just know this:\n\n**If automation hasn't worked for you yet, it's not your fault. You just didn't have the playbook.**\n\nStay tuned.\n\n[Your Name]\n\nP.S. Quick question: What's the #1 task you wish you could automate? Reply and tell me—I read every response, and I might feature your answer in an upcoming email.","useCase":"Product launches using this email sequence consistently convert 3-8% of email lists. A 10,000-person list can generate \\$59K-\\$157K in a 5-day launch.","proTip":"The pre-launch emails are more important than the sales emails. They build anticipation and desire. Skip these and your launch will flop. Nail these and people will be refreshing their inbox waiting to buy."},{"number":15,"title":"Post-Purchase Onboarding Sequence","prompt":"Create a 5-email post-purchase onboarding sequence to reduce refunds, increase product usage, and build raving fans.\n\n**Product Info:**\n- Product type: [course/software/template/service]\n- Main value: [what customers bought this to achieve]\n- Common reasons for refunds: [LIST]\n- Average time to first result: [X DAYS/WEEKS]\n\n**Sequence Goals:**\n- Get customers to first win FAST (reduces refund requests)\n- Educate on key features they might miss\n- Build community and social proof\n- Ask for testimonial/referral at the right moment\n\n**Email Structure:**\n\n**Email 1 (Immediate):** Welcome + Quick Start\n- Login credentials / access info\n- ONE simple action to take right now (quick win)\n- Set expectations (what happens next)\n\n**Email 2 (Day 1):** First Win Tutorial\n- Step-by-step guide to achieve first result\n- Video walkthrough\n- Support resources\n\n**Email 3 (Day 3):** Advanced Feature Unlock\n- Show them powerful features they might miss\n- Use case examples\n- Common mistakes to avoid\n\n**Email 4 (Day 7):** Community + Social Proof\n- Invite to community/group\n- Share customer success stories\n- Encourage them to share their progress\n\n**Email 5 (Day 14):** Testimonial Request + Upsell (soft)\n- If they've had success, ask for testimonial\n- Offer related product/upgrade (optional)\n- Referral program introduction","example":"**Email 1: Welcome + Quick Start (Immediate after purchase)**\n\n**Subject:** \"Welcome! Here's your AI Automation Playbook access\"\n\n**Body:**\n\n🎉 **Welcome to The Automation Playbook, [First Name]!**\n\nYou're officially part of the automation revolution. Smart move.\n\n**Here's your access:**\n→ Login: [LINK]\n→ Email: [Their email]\n→ Password: Check separate email (for security)\n\n**Your Quick Win (Do this in the next 10 minutes):**\n\nGo to Workflow #3: \"Auto-Respond to Common Emails\"\n\nFollow the 4-minute video tutorial. By lunch, you'll have your first automation running.\n\n**What happens next:**\n- **Tomorrow:** I'll send you the \"First Automation\" checklist\n- **Day 3:** Advanced workflow tutorials unlock\n- **Day 7:** Invite to our private community (4,200+ members)\n\n**Need help?** Reply to this email or check [Support Page Link].\n\nLet's build something amazing,\n[Your Name]\n\nP.S. The #1 mistake new users make? Trying to automate everything at once. Start with ONE workflow. Master it. Then expand. Trust me on this.","useCase":"Post-purchase emails reduce refund rates by 40-60% and increase lifetime customer value. The first 14 days determine if they become a raving fan or request a refund.","proTip":"Track which workflow customers complete first (analytics). If 70% start with Workflow #3, make that the \"Quick Win\" in Email 1. Data-driven onboarding converts better."}]},{"file":"07-error-handling.md","name":"Error Handling & Debugging","icon":"🛡️","desc":"Build resilient, self-healing workflows","prompts":[{"number":1,"title":"Error Detection Framework","prompt":"Design an error detection system for my [workflow type] automation. I need to catch errors at these stages: [list stages]. Create a monitoring framework that logs error types, timestamps, affected records, and triggers appropriate alerts. Include error severity classification (critical/warning/info).","example":"A structured error detection framework with webhook listeners at each workflow stage, a centralized error logging table with fields for error_type, severity, timestamp, record_id, and automated Slack alerts for critical errors within 30 seconds of detection.","useCase":"When building production automations that need reliable error tracking across multiple workflow steps.","proTip":"Always log the full context (input data, step number, environment) with each error—you'll thank yourself during midnight debugging sessions."},{"number":2,"title":"Intelligent Retry Logic","prompt":"Build an exponential backoff retry system for my [API/webhook/database] integration. Configure: initial retry after [X seconds], max [Y] attempts, exponential multiplier of [Z], and jitter to prevent thundering herd. Define which HTTP status codes should retry (429, 503, 504) vs fail immediately (401, 404).","example":"A retry node configuration with: 1st retry at 2s, 2nd at 4s, 3rd at 8s, 4th at 16s (max 4 attempts), ±20% jitter added to each delay. Retries on 429/503/504, immediately fails on 401/403/404, logs all attempts to error tracking sheet.","useCase":"When dealing with rate-limited APIs or unstable third-party services that occasionally timeout.","proTip":"Add jitter (random delay variance) to retries—if 100 workflows fail simultaneously, you don't want them all retrying at exactly the same moment."},{"number":3,"title":"Workflow Health Dashboard","prompt":"Create a real-time health monitoring dashboard for my automation workflows. Track: success rate (%), average execution time, error count by type, last 24h trend, and current status (healthy/degraded/down). Pull data from [n8n/Make/Zapier] execution logs and display in [Google Sheets/Airtable/Notion].","example":"A Google Sheet dashboard with auto-refreshing metrics: Workflow A (98.5% success, 3.2s avg, 12 errors today, ✅ healthy), Workflow B (87% success, 45s avg, 89 errors today, ⚠️ degraded), with sparkline charts showing 7-day trends and conditional formatting highlighting issues.","useCase":"When managing multiple automation workflows and needing a bird's-eye view of system health.","proTip":"Set up daily digest emails from this dashboard—proactively catch degrading workflows before they fully break."},{"number":4,"title":"Dead Letter Queue Pattern","prompt":"Implement a dead letter queue (DLQ) system for failed workflow records. When a record fails after [X] retry attempts, route it to a quarantine database/sheet with: original data, error message, failure timestamp, retry history. Create a manual review process and re-queue mechanism for fixing and replaying failed records.","example":"A \"Failed Records\" Airtable base with columns for original_data (JSON), error_details, failed_at, retry_count, status (quarantined/reviewing/fixed/replayed). A webhook endpoint allows fixed records to be re-injected into the workflow from step [Y]. Weekly review cycle recovers 85% of failed records.","useCase":"In high-value workflows (payments, customer data) where you can't afford to lose records and need manual intervention for edge cases.","proTip":"Include a \"business impact\" field in your DLQ—prioritize fixing failures that affect revenue or customer experience first."},{"number":5,"title":"Automated Error Pattern Detection","prompt":"Build an AI-powered error analysis system that scans my workflow error logs daily, clusters similar errors using [OpenAI/Claude], identifies patterns (e.g., \"80% of errors happen with records from source X\"), and generates actionable fix recommendations. Create automated reports highlighting: top error patterns, affected volume, suggested solutions, and trend analysis.","example":"Daily AI report: \"Pattern detected: 156 errors (45% of total) occur when customer_email field is empty. Root cause: LinkedIn lead capture doesn't always provide email. Recommendation: Add email validation + fallback enrichment via Clearbit API before CRM sync. Implementing this would prevent ~1,200 monthly errors.\"","useCase":"When you have high error volumes and need intelligent prioritization of what to fix first based on impact.","proTip":"Use vector similarity search on error messages—errors with similar text often have similar root causes, even if exact wording differs."},{"number":6,"title":"Circuit Breaker Implementation","prompt":"Implement a circuit breaker pattern for my [external API/service] integration. Set thresholds: open circuit after [X] failures in [Y] minutes, half-open state after [Z] cooldown period, test with single request before fully closing. While open, immediately fail-fast and queue requests for later retry. Log all state transitions.","example":"Circuit breaker configuration: Opens after 5 failures in 2 minutes, enters cooldown for 10 minutes, then half-open state tests with 1 request. If successful, closes circuit and processes queue. If failed, reopens for another 10 min. Saves 400+ wasted API calls per incident and prevents cascading failures.","useCase":"When integrating with flaky third-party APIs that occasionally go down—prevents your workflow from hammering a dead service.","proTip":"Send alerts when circuit opens/closes—it's often early warning that a vendor's API is having issues."},{"number":7,"title":"Contextual Error Logging","prompt":"Design a comprehensive error logging schema for my automation that captures: error timestamp, workflow name, step ID, input data (sanitized), error message, stack trace, user/record identifier, environment (prod/staging), and session ID for request tracing. Structure this for easy querying and debugging.","example":"JSON error log structure with fields: {timestamp, workflow_id, step_name, error_type, message, input_snapshot (PII redacted), user_id, environment, session_id, severity, resolution_status}. Stored in MongoDB for fast querying. Average debugging time reduced from 25 minutes to 6 minutes with full context available.","useCase":"When debugging complex multi-step workflows where you need to trace exactly what data caused the failure.","proTip":"Always sanitize PII (emails, names, payment info) from error logs before storing—log hashes or IDs instead for GDPR compliance."},{"number":8,"title":"Fallback Workflow Chains","prompt":"Create a fallback hierarchy for my [data enrichment/API call/integration] workflow. Primary: [Service A], if fails → Secondary: [Service B], if fails → Tertiary: [Service C], if all fail → [degraded mode action]. Track which service succeeded, cost per service, and success rates to optimize the fallback order monthly.","example":"Email validation fallback chain: 1) ZeroBounce API (98% success, \\$0.008/check), 2) Hunter.io (95% success, \\$0.01/check), 3) Regex pattern validation (70% accuracy, free). After 30 days: 89% caught by primary, 8% by secondary, 2% by tertiary, 1% failed all (manual review). Avg cost: \\$0.0084 per validation.","useCase":"For critical workflow steps where you need high reliability and can't afford service outages.","proTip":"Include a cost tracking mechanism—sometimes your \"fallback\" service ends up being used so often it becomes more expensive than just upgrading your primary service's plan."},{"number":9,"title":"Smart Alert Routing","prompt":"Build an intelligent alerting system that routes errors to the right people based on: error severity, affected component, time of day, and on-call schedule. Critical errors → Page on-call engineer via PagerDuty, High errors → Slack #engineering, Medium → Daily digest email, Low → Weekly report. Include alert deduplication and escalation if unacknowledged after [X] minutes.","example":"Alert routing logic: Payment failures (critical) → Immediate PagerDuty page + CEO Slack DM, API errors (high) → #dev-alerts Slack channel, Data sync delays (medium) → Daily 9am summary email to ops team, Minor validation warnings (low) → Weekly Friday report. Deduplicate identical errors within 5 minutes. Escalate unacked critical alerts after 10 minutes.","useCase":"When managing production systems with multiple team members and need appropriate escalation without alert fatigue.","proTip":"Implement alert rate limiting—if you get 500 identical errors in 10 seconds, send ONE alert, not 500."},{"number":10,"title":"Self-Healing Automation","prompt":"Design a self-healing workflow that automatically resolves common errors without human intervention. Define error playbooks: \"If error X, then action Y\". Examples: \"API rate limit → wait + retry\", \"missing field → fetch from alternative source\", \"duplicate record → merge using rules\". Log all auto-resolutions for audit. Escalate only novel/unresolvable errors.","example":"Self-healing playbook with 12 automated resolutions: Rate limits → exponential backoff, Empty email fields → enrich via Clearbit, Duplicate contacts → merge by latest update, Invalid phone formats → normalize with libphonenumber, Expired auth tokens → auto-refresh OAuth, etc. Auto-resolved 76% of errors in first month, escalated only 24% to humans. Saved ~15 hours/week of manual fixing.","useCase":"In high-volume automation workflows where manual error fixing doesn't scale and common error patterns emerge.","proTip":"Start with read-only self-healing (log what *would* be fixed) and review for 2 weeks before enabling auto-fixes—prevents runaway automation."}]},{"file":"08-advanced-workflows.md","name":"Advanced Workflows","icon":"🧠","desc":"Complex orchestration & AI agents","prompts":[{"number":1,"title":"Cross-Platform Orchestration Hub","prompt":"Create a central orchestration workflow that coordinates between n8n, Make, and Zapier. Use [n8n] as the master controller that triggers workflows in Make via webhook, waits for completion, then triggers Zapier flows, aggregates all results, and updates a central status dashboard in [Airtable/Notion]. Handle failures in any platform gracefully.","example":"n8n master workflow receives trigger → fires Make scenario via webhook (handles CRM updates) → polls Make status endpoint every 30s → once complete, triggers Zapier workflow (sends customer emails) → aggregates execution data from all 3 platforms → updates Notion dashboard with total records processed, execution times, any errors → sends success notification. Handles partial failures by continuing remaining steps.","useCase":"When you've built workflows across multiple platforms and need them to work together in a specific sequence.","proTip":"Use a correlation ID (UUID) that gets passed through all platforms—makes tracing a single record's journey across systems infinitely easier."},{"number":2,"title":"Dynamic Workflow Router","prompt":"Build an intelligent workflow router that analyzes incoming data and dynamically selects which workflow path to execute. Use AI to classify the input type, urgency, and complexity, then route to: [Express path] for simple cases, [Standard path] for typical cases, [Complex path] for edge cases requiring human review. Log routing decisions and accuracy over time.","example":"Lead comes in → OpenAI analyzes: company size (250 employees), urgency keywords (\"urgent\", \"ASAP\"), complexity score (0.82) → Routes to Complex path → assigns to senior sales rep, creates detailed research brief, schedules call within 24h. Simple leads go to auto-nurture sequence. Routing accuracy: 94% after 1,000 leads. Average deal size 3.2x higher for AI-routed complex leads.","useCase":"When processing heterogeneous inputs (leads, support tickets, applications) that need different handling based on characteristics.","proTip":"Build a feedback loop—let humans flag mis-routed items and use that data to retrain your routing logic monthly."},{"number":3,"title":"Parallel Processing Pipeline","prompt":"Design a parallel processing workflow for [data type] that splits work across multiple simultaneous paths to maximize speed. Split input batch into [X] chunks, process each in parallel using [n8n's split-in-batches + merge], handle varying completion times, aggregate results only when ALL branches complete. Include timeout handling if any branch stalls.","example":"Import 10,000 contacts → Split into 10 parallel branches (1,000 each) → Each branch: validates email, enriches with Clearbit, scores with custom model, updates CRM → All branches process simultaneously → Merge node waits for all 10 to complete (or 5-minute timeout) → Aggregates: 9,847 successful, 153 errors → Final report generated. Completion time: 4 minutes vs 28 minutes sequential.","useCase":"When processing large batches where individual items are independent and can be handled simultaneously.","proTip":"Don't go crazy with parallelization—more than 10-15 simultaneous branches can overwhelm APIs and actually slow things down. Test to find the sweet spot."},{"number":4,"title":"Event-Driven Saga Pattern","prompt":"Implement a saga pattern for my [multi-step business process] that spans multiple services. Each step publishes events on completion, next step subscribes and processes. If any step fails, execute compensating transactions to rollback previous steps. Track saga state in a central database. Example process: [Order → Payment → Inventory → Shipping → Notification].","example":"E-commerce order saga: 1) Create order (event: order.created) → 2) Process payment (event: payment.completed) → 3) Reserve inventory (event: inventory.reserved) → 4) Schedule shipping (event: shipping.scheduled) → 5) Notify customer. If step 3 fails (out of stock), compensating transactions: Refund payment, cancel order, notify customer of failure. State machine tracks: pending → processing → completed OR failed with rollback status.","useCase":"For complex, long-running business processes that involve multiple systems and need transactional integrity without distributed locks.","proTip":"Design your compensating transactions FIRST before building the happy path—rollbacks are where most saga implementations fail in production."},{"number":5,"title":"Workflow Composition Library","prompt":"Create a library of reusable sub-workflows that can be composed into larger workflows. Define: [Enrichment module], [Validation module], [Notification module], [CRM sync module], [Logging module]. Each module has standard input/output contracts. Build 3 complex workflows by mixing these modules in different combinations.","example":"Modular library: 1) Enrich(email) → returns {full_name, company, title, linkedin}, 2) Validate(contact_data) → returns {valid: true/false, issues: []}, 3) CRMSync(contact) → upserts to HubSpot. Complex workflow: Lead Capture = Enrich → Validate → (if valid) CRMSync + NotifySlack → (if invalid) SendToReviewQueue. Reused modules across 8 different workflows. Dev time for new workflows cut by 70%.","useCase":"When building multiple workflows with similar components—avoid copying the same nodes 50 times.","proTip":"Version your modules (v1, v2) and use a registry document to track which workflows use which versions—prevents breaking changes from cascading."},{"number":6,"title":"AI-Powered Decision Trees","prompt":"Build a workflow with AI-driven decision points that replace rigid if/then logic. At each decision node, send context to [OpenAI/Claude] with a specific decision framework, get structured JSON response with the chosen path + reasoning. Implement decisions for: [lead qualification], [priority assignment], [escalation determination], [response template selection].","example":"Support ticket arrives → AI decision node evaluates: urgency (high—customer can't login), sentiment (frustrated), account value (\\$15k/year MRR), issue complexity (medium) → Decision: Route to senior support (not junior), Priority P1 (not P2), Use empathetic tone template (not standard), Escalate to engineering for parallel investigation → Reasoning logged: \"High-value customer, login issue affects revenue, frustration detected in tone\".","useCase":"When your workflow needs nuanced decision-making that's too complex for simple rules but doesn't need human intervention.","proTip":"Give the AI examples of past decisions + outcomes in the prompt—\"Here are 5 examples of good routing decisions and why they worked...\""},{"number":7,"title":"Human-in-the-Loop Approval Gates","prompt":"Design a workflow with strategic human approval gates for high-stakes decisions. Workflow pauses at gate, sends approval request via [Slack/Email] with all context, waits for approve/reject/modify response, then continues or cancels. Include: timeout handling (auto-escalate after X hours), delegation (manager can reassign), and audit trail of all decisions.","example":"Contract workflow: Auto-generated draft → [Pause] Legal review gate (Slack message with preview + approve/reject buttons) → If approved within 24h, proceeds to signing → If no response, escalates to VP Legal → If rejected, returns to AI for revisions with feedback → All approvals logged with timestamp, approver name, decision reason. 87% approved on first review, avg review time 3.2 hours.","useCase":"For workflows handling contracts, large expenditures, customer refunds, or other decisions requiring human judgment and accountability.","proTip":"Include an \"approve with modifications\" option that doesn't restart the whole workflow—just injects changes and continues."},{"number":8,"title":"Multi-Tenant Workflow Engine","prompt":"Create a single workflow that handles multiple clients/customers with different configurations. Load client-specific settings from a config database (API keys, business rules, notification preferences, custom fields), process the request using those settings, ensure complete data isolation between tenants. Include per-tenant rate limiting and error tracking.","example":"SaaS product's \"Generate Report\" workflow: 1) Identify tenant from API request, 2) Load tenant config (report template, branding, data sources, webhook URLs), 3) Fetch data using tenant's API keys, 4) Apply tenant-specific business logic (some exclude weekends, some use custom formulas), 5) Generate branded report, 6) Deliver via tenant's preferred channel (email/Slack/webhook). Serves 50 tenants from one workflow. Per-tenant rate limits prevent one heavy user from affecting others.","useCase":"When building automation products/services that serve multiple clients and you need to manage one workflow instead of duplicating it 100 times.","proTip":"Use a \"config version\" field—when you update a tenant's config, increment the version so you can audit which version was used for any historical workflow run."},{"number":9,"title":"Time-Delayed Multi-Stage Campaign","prompt":"Build a multi-stage drip campaign workflow that spans days or weeks. Stage 1 executes immediately, then schedule Stage 2 for [+X days], Stage 3 for [+Y days], etc. Handle: unsubscribes (cancel remaining stages), engagement-based branching (if email opened, send path A; if not, path B), and calendar-aware scheduling (don't send on weekends).","example":"Lead nurture sequence: Day 0: Welcome email + account setup → Day 2: Educational content + case study → Day 4: Feature highlight video → Day 7: [Branch] If engaged (opened 2+ emails): Book demo offer; If not engaged: Value proposition reminder → Day 10: Final check-in. Includes: timezone-aware sending (9am recipient local time), weekend skipping, unsubscribe handling (stops all future stages), engagement scoring throughout.","useCase":"For email nurture sequences, onboarding campaigns, or any multi-touch process that unfolds over time.","proTip":"Store the entire campaign state in a database row (next_stage, scheduled_for, engagement_score)—makes it trivial to pause/resume or modify someone's journey mid-campaign."},{"number":10,"title":"Adaptive Workflow Optimizer","prompt":"Create a self-optimizing workflow that A/B tests different paths and automatically routes more traffic to better-performing variants. Track conversion metrics for each path (e.g., email template A vs B, processing speed, success rate), use multi-armed bandit algorithm to gradually shift traffic toward winners, generate monthly reports on performance improvements.","example":"Lead conversion workflow with 3 email templates being tested: Template A (15% reply rate, 40% traffic), Template B (22% reply rate, 50% traffic—winner), Template C (8% reply rate, 10% traffic—being phased out). Every 100 leads, algorithm reassesses and redistributes traffic. After 3 months: optimal template discovered (Template B), then tests new variants against it. Conversion rate improved from 15% baseline to 23% through continuous optimization.","useCase":"When you have multiple ways to accomplish something and want data-driven optimization instead of guessing which is best.","proTip":"Don't optimize too fast—you need statistical significance. Wait for at least 100-200 samples per variant before shifting traffic, or you'll chase noise instead of signal."}]},{"file":"09-bonus-templates.md","name":"Workflow Blueprints","icon":"🎁","desc":"10 ready-to-implement templates","prompts":[{"number":1,"title":"Lead Capture → AI Qualification → CRM","prompt":"OVERVIEW:\nAutomatically capture leads from multiple sources (website forms, LinkedIn, ads), use AI to qualify and score them, then sync qualified leads to CRM with enriched data and smart routing to the right sales rep.\n\nTOOLS NEEDED:\n- n8n or Make (workflow engine)\n- OpenAI or Claude (AI qualification)\n- Clearbit or Apollo (data enrichment)\n- HubSpot or Salesforce (CRM)\n- Google Sheets (lead queue/logging)\n\nSTEP-BY-STEP FLOW:\n1. **Trigger:** Webhook receives lead from website form, Zapier, or lead magnet\n2. **Data Enrichment:** Send email to Clearbit API → get company size, industry, tech stack, funding\n3. **AI Qualification:** Send enriched data to OpenAI with prompt: \"Score this lead 0-100 based on: company size (ideal: 50-500 employees), industry fit (SaaS, fintech preferred), budget indicators, urgency signals in message. Return JSON with score, reasoning, recommended next action.\"\n4. **Decision Router:** \n   - Score 80-100: Hot lead → Route to senior sales rep\n   - Score 50-79: Warm lead → Route to SDR team\n   - Score 0-49: Cold lead → Add to nurture campaign\n5. **CRM Sync:** Create/update contact in HubSpot with custom fields: \\`ai_score\\`, \\`qualification_reasoning\\`, \\`enriched_data\\`, \\`assigned_rep\\`\n6. **Notifications:**\n   - Hot leads: Instant Slack DM to assigned rep with lead summary\n   - Warm leads: Daily digest to SDR team\n   - Cold leads: Weekly report\n7. **Logging:** Append to Google Sheet for audit trail and monthly analysis","example":"\\`\\`\\`json\n{\n  \"ai_qualification_prompt\": \"You are a B2B lead qualification expert. Score this lead 0-100...\",\n  \"scoring_weights\": {\n    \"company_size\": 30,\n    \"industry_match\": 25,\n    \"budget_signals\": 25,\n    \"urgency\": 20\n  },\n  \"routing_rules\": {\n    \"hot_threshold\": 80,\n    \"warm_threshold\": 50,\n    \"hot_lead_reps\": [\"john@company.com\", \"sarah@company.com\"],\n    \"sdr_team_channel\": \"#sdr-leads\"\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** 73% reduction in time-to-contact for hot leads, 45% improvement in SDR efficiency by pre-qualifying, 2.3x higher conversion rate on AI-qualified leads vs. manual.","useCase":"","proTip":""},{"number":2,"title":"Content Idea → Draft → Review → Publish","prompt":"OVERVIEW:\nEnd-to-end content production workflow that generates blog post ideas, creates AI drafts, routes to human editors for review/approval, then auto-publishes to your website/blog with SEO optimization.\n\nTOOLS NEEDED:\n- n8n (workflow orchestration)\n- OpenAI GPT-4 or Claude (content generation)\n- Grammarly API or LanguageTool (editing)\n- WordPress or Webflow (publishing)\n- Airtable (content calendar)\n- Slack (review notifications)\n\nSTEP-BY-STEP FLOW:\n1. **Idea Generation (Weekly):** \n   - Cron trigger every Monday 9am\n   - AI analyzes: trending topics (via Google Trends API), competitor content gaps (via SEO tool), audience questions (from support tickets)\n   - Generates 10 content ideas with SEO keywords, estimated traffic potential\n   - Creates records in Airtable \"Content Ideas\" with status: \\`idea\\`\n2. **Draft Creation:**\n   - Human selects idea in Airtable, changes status to \\`drafting\\`\n   - Webhook trigger fires workflow\n   - AI generates 1,500-word draft with: SEO-optimized title, meta description, H2/H3 structure, keyword integration, internal linking suggestions\n   - Runs through grammar checker\n   - Creates Google Doc with draft\n   - Updates Airtable status to \\`review\\`, assigns to editor\n3. **Human Review Gate:**\n   - Slack message to editor with Google Doc link + \"Approve\", \"Request Changes\", \"Reject\" buttons\n   - Editor reviews, makes edits in Google Doc\n   - Clicks Approve → workflow continues\n4. **Publishing:**\n   - Fetches final content from Google Doc\n   - Generates social media snippets (Twitter, LinkedIn) using AI\n   - Creates featured image using DALL-E 3 or pulls from Unsplash\n   - Publishes to WordPress via API\n   - Schedules social posts via Buffer API\n   - Updates Airtable status to \\`published\\` with URL and publish date\n5. **Performance Tracking (7 days later):**\n   - Fetches analytics from Google Analytics API\n   - Updates Airtable with: pageviews, time on page, conversion rate\n   - If performing well (>1,000 views in 7 days), flags for repurposing","example":"\\`\\`\\`json\n{\n  \"content_settings\": {\n    \"target_length\": 1500,\n    \"tone\": \"professional but conversational\",\n    \"target_keywords_per_post\": 3,\n    \"internal_links\": 2-3,\n    \"external_authority_links\": 2-3\n  },\n  \"seo_optimization\": {\n    \"title_length\": \"50-60 characters\",\n    \"meta_description_length\": \"150-160 characters\",\n    \"keyword_density\": \"1-2%\"\n  },\n  \"review_sla\": {\n    \"notification_reminder\": \"24 hours\",\n    \"auto_escalate\": \"48 hours\"\n  }\n}\n\\`\\`\\`\n\n**Expected Results:** Publish 4-6 high-quality blog posts per month, reduce content production time from 8 hours to 2 hours per post, maintain editorial quality with human review, consistent SEO optimization.","useCase":"","proTip":""},{"number":3,"title":"Customer Support Ticket → AI Categorize → Route → Respond","prompt":"OVERVIEW:\nIntelligent support ticket triage system that uses AI to categorize, prioritize, and route tickets to the right team, with automated responses for common issues and escalation for complex cases.\n\nTOOLS NEEDED:\n- n8n or Make\n- OpenAI or Claude (categorization & draft responses)\n- Help Scout, Zendesk, or Intercom (ticketing system)\n- Slack (team notifications)\n- PostgreSQL or Airtable (ticket analytics)\n\nSTEP-BY-STEP FLOW:\n1. **Ticket Received:** Webhook from help desk when new ticket created\n2. **Data Extraction:** Parse ticket content, customer details, account info\n3. **AI Categorization:**\n   - Send to AI with prompt: \"Categorize this support ticket into: Bug Report, Feature Request, Billing Question, How-To, Login Issue, Account Management, Other\"\n   - Extract: urgency (low/medium/high/critical), sentiment (frustrated/neutral/happy), complexity (simple/moderate/complex)\n   - Identify: customer tier (free/paid/enterprise), account status (active/churning/new)\n4. **Smart Routing:**\n   - **Critical + Login Issue:** Immediate assignment to Tier 3 engineer + Slack page\n   - **High urgency + Enterprise customer:** Senior support rep + notify account manager\n   - **Billing + Paid customer:** Billing specialist\n   - **How-To + Simple:** AI attempts auto-resolution\n   - **Bug + Complex:** Engineering team assignment\n5. **Automated Response (for simple cases):**\n   - AI generates draft response based on knowledge base\n   - If confidence >85%, send response automatically and close ticket\n   - If confidence 60-84%, send as \"suggested response\" to agent\n   - If confidence <60%, flag for human writing\n6. **SLA Tracking:**\n   - Set due date based on: 15 min (critical), 2 hours (high), 24 hours (medium), 48 hours (low)\n   - Send reminder notifications at 50% and 80% of SLA time\n7. **Post-Resolution:**\n   - After ticket closed, send CSAT survey\n   - Log ticket data
